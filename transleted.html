<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 Универсальный переводчик | Все языки + Таджикский</title>
    <style>
        /* Стили остаются те же, что и в предыдущем ответе */
        * { box-sizing: border-box; margin: 0; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
        .translator-card { max-width: 1200px; width: 100%; background: rgba(255,255,255,0.07); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 36px; padding: 24px; box-shadow: 0 25px 50px -8px rgba(0,0,0,0.6); }
        h1 { font-weight: 600; font-size: 2.2rem; color: white; margin: 0 0 8px; display: flex; align-items: center; gap: 10px; }
        h1 span { background: #3b82f6; font-size: 1rem; padding: 4px 12px; border-radius: 40px; color: white; }
        .subtitle { color: #94a3b8; padding-left: 12px; margin-bottom: 28px; border-left: 3px solid #3b82f6; }
        .lang-panel { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 24px; background: rgba(0,0,0,0.2); padding: 14px 20px; border-radius: 60px; }
        .lang-box { flex: 2 1 200px; min-width: 180px; }
        .lang-box label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; }
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-wrapper input { width: 100%; padding: 12px 16px 12px 40px; background: #1e293b; border: 1.5px solid #334155; border-radius: 40px; font-size: 1rem; color: white; outline: none; }
        .search-wrapper input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .search-icon { position: absolute; left: 14px; color: #64748b; }
        .dropdown-list { position: absolute; top: 100%; left: 0; right: 0; background: #0f172a; border: 1px solid #334155; border-radius: 24px; margin-top: 8px; max-height: 260px; overflow-y: auto; z-index: 30; display: none; }
        .dropdown-list.active { display: block; }
        .lang-option { padding: 12px 18px; color: #e2e8f0; cursor: pointer; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; }
        .lang-option:hover { background: #2563eb; }
        .lang-option .code { opacity: 0.7; font-family: monospace; background: #1e293b; padding: 2px 8px; border-radius: 40px; }
        .swap-btn { background: #334155; border: none; width: 48px; height: 48px; border-radius: 40px; font-size: 1.6rem; cursor: pointer; color: white; margin-top: 20px; }
        .swap-btn:hover { background: #3b82f6; }
        .text-areas { display: flex; flex-wrap: wrap; gap: 20px; margin: 16px 0 24px; }
        .textarea-container { flex: 1 1 300px; }
        .textarea-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .char-count { color: #64748b; }
        .copy-btn { background: none; border: 1px solid #334155; color: #cbd5e1; padding: 6px 14px; border-radius: 40px; cursor: pointer; }
        .copy-btn:hover { background: #2563eb; color: white; }
        textarea { width: 100%; height: 200px; padding: 18px; font-size: 1.1rem; background: #0b1120; border: 1.5px solid #334155; border-radius: 28px; color: #f1f5f9; resize: vertical; outline: none; }
        textarea:focus { border-color: #3b82f6; }
        .action-bar { display: flex; justify-content: center; margin-top: 8px; }
        .translate-btn { background: #3b82f6; color: white; border: none; padding: 16px 42px; font-size: 1.25rem; font-weight: 600; border-radius: 60px; cursor: pointer; }
        .translate-btn:hover { background: #2563eb; }
        .status { text-align: center; margin-top: 18px; color: #94a3b8; }
        .error { color: #f87171; }
    </style>
</head>
<body>
<div class="translator-card">
    <h1>🌍 Языковой мост <span>все языки</span></h1>
    <div class="subtitle"> Translate </div>

    <div class="lang-panel">
        <div class="lang-box">
            <label>🇦🇱 Исходный язык</label>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="sourceSearch" placeholder="Поиск..." autocomplete="off" value="Русский">
                <div id="sourceDropdown" class="dropdown-list"></div>
            </div>
        </div>
        <button class="swap-btn" id="swapLangBtn">⇄</button>
        <div class="lang-box">
            <label>🎯 Целевой язык</label>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="targetSearch" placeholder="Поиск..." autocomplete="off" value="Таджикский">
                <div id="targetDropdown" class="dropdown-list"></div>
            </div>
        </div>
    </div>

    <div class="text-areas">
        <div class="textarea-container">
            <div class="textarea-header">
                <span class="char-count" id="sourceCount">0 / 5000</span>
                <button class="copy-btn" id="copySourceBtn">📋 Копировать</button>
            </div>
            <textarea id="sourceText" placeholder="Введите текст..."></textarea>
        </div>
        <div class="textarea-container">
            <div class="textarea-header">
                <span class="char-count" id="targetCount">0 / 5000</span>
                <button class="copy-btn" id="copyTargetBtn">📋 Копировать</button>
            </div>
            <textarea id="outputText" placeholder="Перевод..." readonly></textarea>
        </div>
    </div>

    <div class="action-bar">
        <button class="translate-btn" id="translateBtn">⚡ Перевести</button>
    </div>
    <div id="statusMessage" class="status">✅ Готов к переводу (включая таджикский)</div>
</div>

<script>
    (function(){
        // Расширенный список с таджикским
        const LANGUAGES = [
            { code: "af", name: "Африкаанс" }, { code: "sq", name: "Албанский" }, { code: "am", name: "Амхарский" },
            { code: "ar", name: "Арабский" }, { code: "hy", name: "Армянский" }, { code: "az", name: "Азербайджанский" },
            { code: "eu", name: "Баскский" }, { code: "be", name: "Белорусский" }, { code: "bn", name: "Бенгальский" },
            { code: "bs", name: "Боснийский" }, { code: "bg", name: "Болгарский" }, { code: "ca", name: "Каталанский" },
            { code: "ceb", name: "Себуанский" }, { code: "ny", name: "Чичева" }, { code: "zh-CN", name: "Китайский (упрощ.)" },
            { code: "zh-TW", name: "Китайский (традиц.)" }, { code: "co", name: "Корсиканский" }, { code: "hr", name: "Хорватский" },
            { code: "cs", name: "Чешский" }, { code: "da", name: "Датский" }, { code: "nl", name: "Нидерландский" },
            { code: "en", name: "Английский" }, { code: "eo", name: "Эсперанто" }, { code: "et", name: "Эстонский" },
            { code: "tl", name: "Филиппинский" }, { code: "fi", name: "Финский" }, { code: "fr", name: "Французский" },
            { code: "fy", name: "Фризский" }, { code: "gl", name: "Галисийский" }, { code: "ka", name: "Грузинский" },
            { code: "de", name: "Немецкий" }, { code: "el", name: "Греческий" }, { code: "gu", name: "Гуджарати" },
            { code: "ht", name: "Гаитянский" }, { code: "ha", name: "Хауса" }, { code: "haw", name: "Гавайский" },
            { code: "iw", name: "Иврит" }, { code: "hi", name: "Хинди" }, { code: "hmn", name: "Хмонг" },
            { code: "hu", name: "Венгерский" }, { code: "is", name: "Исландский" }, { code: "ig", name: "Игбо" },
            { code: "id", name: "Индонезийский" }, { code: "ga", name: "Ирландский" }, { code: "it", name: "Итальянский" },
            { code: "ja", name: "Японский" }, { code: "jw", name: "Яванский" }, { code: "kn", name: "Каннада" },
            { code: "kk", name: "Казахский" }, { code: "km", name: "Кхмерский" }, { code: "rw", name: "Киньяруанда" },
            { code: "ko", name: "Корейский" }, { code: "ku", name: "Курдский" }, { code: "ky", name: "Кыргызский" },
            { code: "lo", name: "Лаосский" }, { code: "la", name: "Латынь" }, { code: "lv", name: "Латышский" },
            { code: "lt", name: "Литовский" }, { code: "lb", name: "Люксембургский" }, { code: "mk", name: "Македонский" },
            { code: "mg", name: "Малагасийский" }, { code: "ms", name: "Малайский" }, { code: "ml", name: "Малаялам" },
            { code: "mt", name: "Мальтийский" }, { code: "mi", name: "Маори" }, { code: "mr", name: "Маратхи" },
            { code: "mn", name: "Монгольский" }, { code: "my", name: "Мьянма" }, { code: "ne", name: "Непальский" },
            { code: "no", name: "Норвежский" }, { code: "or", name: "Ория" }, { code: "ps", name: "Пушту" },
            { code: "fa", name: "Персидский" }, { code: "pl", name: "Польский" }, { code: "pt", name: "Португальский" },
            { code: "pa", name: "Панджаби" }, { code: "ro", name: "Румынский" }, { code: "ru", name: "Русский" },
            { code: "sm", name: "Самоанский" }, { code: "gd", name: "Шотландский" }, { code: "sr", name: "Сербский" },
            { code: "st", name: "Сесото" }, { code: "sn", name: "Шона" }, { code: "sd", name: "Синдхи" },
            { code: "si", name: "Сингальский" }, { code: "sk", name: "Словацкий" }, { code: "sl", name: "Словенский" },
            { code: "so", name: "Сомали" }, { code: "es", name: "Испанский" }, { code: "su", name: "Сунданский" },
            { code: "sw", name: "Суахили" }, { code: "sv", name: "Шведский" }, { code: "tg", name: "Таджикский" },
            { code: "ta", name: "Тамильский" }, { code: "tt", name: "Татарский" }, { code: "te", name: "Телугу" },
            { code: "th", name: "Тайский" }, { code: "tr", name: "Турецкий" }, { code: "tk", name: "Туркменский" },
            { code: "uk", name: "Украинский" }, { code: "ur", name: "Урду" }, { code: "ug", name: "Уйгурский" },
            { code: "uz", name: "Узбекский" }, { code: "vi", name: "Вьетнамский" }, { code: "cy", name: "Валлийский" },
            { code: "xh", name: "Коса" }, { code: "yi", name: "Идиш" }, { code: "yo", name: "Йоруба" },
            { code: "zu", name: "Зулу" }
        ].sort((a,b) => a.name.localeCompare(b.name));

        const sourceSearch = document.getElementById('sourceSearch');
        const targetSearch = document.getElementById('targetSearch');
        const sourceDropdown = document.getElementById('sourceDropdown');
        const targetDropdown = document.getElementById('targetDropdown');
        const sourceText = document.getElementById('sourceText');
        const outputText = document.getElementById('outputText');
        const translateBtn = document.getElementById('translateBtn');
        const swapBtn = document.getElementById('swapLangBtn');
        const statusMsg = document.getElementById('statusMessage');
        const sourceCount = document.getElementById('sourceCount');
        const targetCount = document.getElementById('targetCount');

        let currentSourceLang = 'ru';
        let currentTargetLang = 'tg'; // таджикский по умолчанию

        function renderDropdown(filterText, dropdownEl, inputEl, isSource) {
            const filter = filterText.toLowerCase().trim();
            const filtered = LANGUAGES.filter(l => l.name.toLowerCase().includes(filter) || l.code.toLowerCase().includes(filter));
            dropdownEl.innerHTML = '';
            if (filtered.length === 0) {
                dropdownEl.innerHTML = '<div class="lang-option" style="justify-content:center;">❌ Не найдено</div>';
            } else {
                filtered.forEach(lang => {
                    const div = document.createElement('div');
                    div.className = 'lang-option';
                    div.innerHTML = `${lang.name} <span class="code">${lang.code}</span>`;
                    div.addEventListener('click', () => {
                        if (isSource) { currentSourceLang = lang.code; sourceSearch.value = lang.name; }
                        else { currentTargetLang = lang.code; targetSearch.value = lang.name; }
                        dropdownEl.classList.remove('active');
                        updateStatus(`🌐 ${lang.name}`, false);
                    });
                    dropdownEl.appendChild(div);
                });
            }
            dropdownEl.classList.add('active');
        }

        function updateCharCount() {
            sourceCount.textContent = `${sourceText.value.length} / 5000`;
            targetCount.textContent = `${outputText.value.length} / 5000`;
        }

        function updateStatus(msg, isError = false) {
            statusMsg.innerHTML = msg;
            statusMsg.classList.toggle('error', isError);
        }

        // GOOGLE TRANSLATE API (неофициальный, но работает с таджикским)
        async function performTranslation() {
            const text = sourceText.value.trim();
            if (!text) { updateStatus('⚠️ Введите текст', true); return; }
            if (currentSourceLang === currentTargetLang) {
                outputText.value = text;
                updateStatus('ℹ️ Языки совпадают', false);
                updateCharCount();
                return;
            }

            updateStatus('⏳ ...', false);
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${currentSourceLang}&tl=${currentTargetLang}&dt=t&q=${encodeURIComponent(text)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                //  возвращает массив, собираем перевод
                const translated = data[0].map(item => item[0]).join('');
                outputText.value = translated;
                updateStatus('✅ Перевод выполнен', false);
            } catch (error) {
                outputText.value = '';
                updateStatus('❌ Ошибка сети или API', true);
            }
            updateCharCount();
        }

        // Инициализация имён
        function setInitialNames() {
            const src = LANGUAGES.find(l => l.code === currentSourceLang);
            const tgt = LANGUAGES.find(l => l.code === currentTargetLang);
            if (src) sourceSearch.value = src.name;
            if (tgt) targetSearch.value = tgt.name;
        }

        sourceSearch.addEventListener('input', e => renderDropdown(e.target.value, sourceDropdown, sourceSearch, true));
        targetSearch.addEventListener('input', e => renderDropdown(e.target.value, targetDropdown, targetSearch, false));
        sourceSearch.addEventListener('focus', () => renderDropdown(sourceSearch.value, sourceDropdown, sourceSearch, true));
        targetSearch.addEventListener('focus', () => renderDropdown(targetSearch.value, targetDropdown, targetSearch, false));
        
        document.addEventListener('click', (e) => {
            if (!sourceSearch.contains(e.target) && !sourceDropdown.contains(e.target)) sourceDropdown.classList.remove('active');
            if (!targetSearch.contains(e.target) && !targetDropdown.contains(e.target)) targetDropdown.classList.remove('active');
        });

        swapBtn.addEventListener('click', () => {
            [currentSourceLang, currentTargetLang] = [currentTargetLang, currentSourceLang];
            setInitialNames();
            if (outputText.value.trim()) {
                sourceText.value = outputText.value;
                outputText.value = '';
                updateCharCount();
            }
            updateStatus('🔄 Языки поменялись', false);
        });

        translateBtn.addEventListener('click', performTranslation);
        sourceText.addEventListener('input', updateCharCount);
        
        document.getElementById('copySourceBtn').addEventListener('click', () => {
            if (sourceText.value) navigator.clipboard?.writeText(sourceText.value).then(() => updateStatus('📋 Скопировано', false));
        });
        document.getElementById('copyTargetBtn').addEventListener('click', () => {
            if (outputText.value) navigator.clipboard?.writeText(outputText.value).then(() => updateStatus('📋 Скопировано', false));
        });

        setInitialNames();
        updateCharCount();
        updateStatus('✅  Translate ', false);
    })();
</script>
</body>
</html>
