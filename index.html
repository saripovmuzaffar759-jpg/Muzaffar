async function askAI(question) {
    const messagesDiv = document.getElementById('aiMessages');
    messagesDiv.innerHTML += `<div class="message user">${escapeHtml(question)}</div>`;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    const loadingId = Date.now();
    messagesDiv.innerHTML += `<div class="message bot" id="msg-${loadingId}">🤔 Думаю...</div>`;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    try {
        let model = "gpt-4o-mini";
        if (currentModel === "llama") model = "llama-3.3-70b";
        else if (currentModel === "mistral") model = "mistral-7b";
        else if (currentModel === "gemini") model = "gemini-2.0-flash-exp";
        const response = await fetch(`https://text.pollinations.ai/generate?model=${model}&prompt=${encodeURIComponent(question)}`);
        const data = await response.json();
        let answer = data.response || "Извините, не смог ответить.";
        document.getElementById(`msg-${loadingId}`)?.remove();
        messagesDiv.innerHTML += `<div class="message bot">${escapeHtml(answer)}</div>`;
    } catch (error) {
        document.getElementById(`msg-${loadingId}`)?.remove();
        messagesDiv.innerHTML += `<div class="message bot">⚠️ Ошибка соединения. Попробуйте позже.</div>`;
    }
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function createSearchTab() {
    const id = nextTabId++;
    const div = document.createElement('div');
    div.className = 'search-tab-content';
    div.id = `search-tab-${id}`;
    div.innerHTML = `<div class="search-container"><div class="logo"><div class="logo-icon">🦊</div><div class="logo-text">Muzaffar Pro</div><div class="logo-sub">80+ проектов · ИИ-помощник · Google вход</div></div><div class="gcse-search"></div></div>`;
    tabs.push({ id, title: "Поиск", type: "search", element: div });
    document.getElementById('tabsContainerIframes').appendChild(div);
    updateTabsBar();
    switchToTab(id);
    return id;
}

function createWebTab(url, title) {
    let finalUrl = url;
    if(vpnActive && !url.includes('github.io') && !url.includes('netlify.app') && !url.includes('google.com')) finalUrl = `https://cors-anywhere.herokuapp.com/${url}`;
    const id = nextTabId++;
    const iframe = document.createElement('iframe');
    iframe.className = 'tab-frame';
    iframe.src = finalUrl;
    iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-storage-access-by-user-activation');
    tabs.push({ id, title: title.length > 25 ? title.slice(0,22)+'...' : title, type: "web", iframe });
    document.getElementById('tabsContainerIframes').appendChild(iframe);
    updateTabsBar();
    switchToTab(id);
    return id;
}

function switchToTab(id) { activeTabId = id; tabs.forEach(t => { if(t.type === "web") t.iframe.classList.toggle('active', t.id === id); else t.element.classList.toggle('active', t.id === id); }); updateTabsBar(); }
function closeTab(id) { const idx = tabs.findIndex(t => t.id === id); if(idx === -1) return; const t = tabs[idx]; if(t.type === "web") t.iframe.remove(); else t.element.remove(); tabs.splice(idx,1); if(tabs.length === 0) createSearchTab(); else if(activeTabId === id) switchToTab(tabs[Math.min(idx, tabs.length-1)].id); updateTabsBar(); }
function updateTabsBar() { const cont = document.getElementById('tabsContainer'); cont.innerHTML = ''; tabs.forEach(t => { const btn = document.createElement('div'); btn.className = `tab ${t.id === activeTabId ? 'active' : ''}`; btn.onclick = () => switchToTab(t.id); btn.innerHTML = `<span class="tab-title">${t.type === 'search' ? '🔍 ' + t.title : '🌐 ' + t.title}</span><button class="tab-close" onclick="event.stopPropagation(); closeTab(${t.id})">✕</button>`; cont.appendChild(btn); }); }

function renderProjectsGrid() {
    const container = document.getElementById('projectsGrid');
    const searchInput = document.getElementById('projectSearch');
    function render(term='') {
        container.innerHTML = '';
        const lowerTerm = term.toLowerCase();
        categoryOrder.forEach(catName => {
            const projectsInCat = categories[catName];
            if(!projectsInCat) return;
            const filtered = projectsInCat.filter(p => p.name.toLowerCase().includes(lowerTerm));
            if(filtered.length === 0) return;
            const catDiv = document.createElement('div'); catDiv.style.marginBottom = '14px';
            catDiv.innerHTML = `<div class="category-title">${catName}</div><div class="projects-grid-category"></div>`;
            container.appendChild(catDiv);
            const grid = catDiv.querySelector('.projects-grid-category');
            filtered.forEach(p => { 
                const card = document.createElement('div'); 
                card.className = 'project-card'; 
                card.onclick = () => createWebTab(p.url, p.name);
                card.oncontextmenu = (e) => { e.preventDefault(); if(confirm(`Добавить "${p.name}" в закладки?`)) { bookmarks.push({name:p.name, url:p.url, icon:p.icon}); saveBookmarks(); } return false; };
                card.innerHTML = `<div class="project-card-icon">${p.icon}</div><div class="project-card-name">${escapeHtml(p.name)}</div>`; 
                grid.appendChild(card); 
            });
        });
        if(container.children.length === 0) container.innerHTML = '<div style="text-align:center; padding:30px; color:#94a3b8;">🔍 Проект не найден</div>';
    }
    render();
    searchInput.addEventListener('input', (e) => render(e.target.value));
}

function saveBookmarks() { localStorage.setItem('muzaffar_bookmarks', JSON.stringify(bookmarks)); renderBookmarks(); }
function renderBookmarks() {
    const container = document.getElementById('bookmarksList');
    if(!container) return;
    container.innerHTML = '';
    bookmarks.forEach(b => {
        const div = document.createElement('div');
        div.className = 'bookmark-item';
        div.innerHTML = `<span>${b.icon || '🔖'}</span><span>${escapeHtml(b.name)}</span><button class="bookmark-remove" data-url="${b.url}" style="background:transparent; border:none; color:#94a3b8; cursor:pointer;">✕</button>`;
        div.onclick = (e) => { if (!e.target.classList.contains('bookmark-remove')) createWebTab(b.url, b.name); };
        div.querySelector('.bookmark-remove').onclick = (e) => { e.stopPropagation(); bookmarks = bookmarks.filter(bk => bk.url !== b.url); saveBookmarks(); };
        container.appendChild(div);
    });
}

function loadHistory() { const s = localStorage.getItem('muzaffar_history'); if(s) historyStore = JSON.parse(s); renderHistory(); }
function addToHistory(q) { if(!q?.trim()) return; historyStore = historyStore.filter(i=>i.query!==q); historyStore.unshift({query:q, date:new Date().toLocaleString()}); if(historyStore.length>50) historyStore.pop(); localStorage.setItem('muzaffar_history', JSON.stringify(historyStore)); renderHistory(); }
function renderHistory() { const container = document.getElementById('historyList'); if(!historyStore.length){ container.innerHTML='<div style="padding:30px;text-align:center;">✨ История пуста</div>'; return; } container.innerHTML = ''; historyStore.forEach(item=>{ const d=document.createElement('div'); d.className='history-item'; d.innerHTML=`🔍 ${escapeHtml(item.query)}<div style="font-size:0.7rem; color:#a78bfa;">${item.date}</div>`; d.onclick=()=>{ const activeDiv = document.querySelector('.search-tab-content.active'); if(activeDiv){ const inp = activeDiv.querySelector('.gsc-input input'); if(inp){ inp.value=item.query; inp.dispatchEvent(new Event('input',{bubbles:true})); activeDiv.querySelector('.gsc-search-button')?.click(); } } closeHistory(); }; container.appendChild(d); }); }
function clearHistory() { if(confirm('Очистить историю?')){ historyStore=[]; localStorage.setItem('muzaffar_history','[]'); renderHistory(); } }

function closeHistory() { document.getElementById('historySidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; }

function enterReadingMode() {
    const activeFrame = document.querySelector('.tab-frame.active');
    if(activeFrame) {
        try {
            const doc = activeFrame.contentDocument || activeFrame.contentWindow.document;
            const text = doc.body.innerText;
            const title = doc.title;
            const win = window.open('', '_blank', 'width=900,height=700');
            win.document.write(`<html><head><title>${title} - Режим чтения</title><style>body{font-family:Georgia;max-width:800px;margin:40px auto;padding:30px;line-height:1.8;font-size:18px;background:#1e1e2e;color:#e2e8f0;}h1{color:#a78bfa;}button{position:fixed;top:20px;right:20px;padding:10px 20px;background:#8b5cf6;color:white;border:none;border-radius:30px;cursor:pointer;}</style></head><body><button onclick="window.close()">✕ Закрыть</button><h1>${escapeHtml(title)}</h1><p>${escapeHtml(text.slice(0,15000)).replace(/\n/g,'<br>')}</p></body></html>`);
        } catch(e) { alert('Не удалось открыть режим чтения'); }
    } else alert('Сначала откройте страницу для чтения');
}

function toggleTheme() { isDark = !isDark; applyTheme(); }
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

document.getElementById('togglePanelBtn').onclick = ()=> document.getElementById('projectsPanel').classList.add('collapsed');
document.getElementById('panelToggleBtn').onclick = ()=> document.getElementById('projectsPanel').classList.remove('collapsed');
document.getElementById('newTabBtn').onclick = () => createSearchTab();
document.getElementById('themeBtnHeader').onclick = toggleTheme;
document.getElementById('historyBtnHeader').onclick = openHistory;
document.getElementById('closeHistoryBtn').onclick = closeHistory;
document.getElementById('overlay').onclick = closeHistory;
document.getElementById('clearHistoryBtn').onclick = clearHistory;
document.getElementById('addBookmarkBtn').onclick = () => { const activeTab = tabs.find(t => t.id === activeTabId); if(activeTab && activeTab.type === 'web') { const name = prompt('Название закладки:', activeTab.title); if(name) { bookmarks.push({name, url:activeTab.iframe.src, icon:'🔖'}); saveBookmarks(); } } else alert('Откройте сайт для добавления'); };
document.getElementById('readingModeBtn').onclick = enterReadingMode;
document.getElementById('wallpaperBtn').onclick = changeWallpaper;
document.getElementById('vpnStatus').onclick = toggleVPN;

document.getElementById('aiToggle').onclick = () => document.getElementById('aiModal').classList.toggle('open');
document.getElementById('closeAiModal').onclick = () => document.getElementById('aiModal').classList.remove('open');
document.getElementById('aiSend').onclick = () => { const input = document.getElementById('aiInput'); if(input.value) { askAI(input.value); input.value = ''; } };
document.getElementById('aiInput').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('aiSend').click(); };
document.querySelectorAll('.model-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentModel = btn.dataset.model;
    };
});

(function init(){
    renderProjectsGrid();
    createSearchTab();
    loadHistory();
    renderBookmarks();
    updateUIForUser();
    const savedTheme = localStorage.getItem('muzaffar_theme');
    if(savedTheme === 'light'){ isDark=false; applyTheme(); } else { isDark=true; applyTheme(); }
    const savedWallpaper = localStorage.getItem('muzaffar_wallpaper');
    if(savedWallpaper) { document.body.style.background = `url(${savedWallpaper}) center/cover no-repeat`; document.body.classList.add('custom-bg'); }
    setInterval(() => { document.querySelectorAll('.gsc-branding, .gcsc-branding').forEach(el => el.style.display='none'); }, 1000);
})();
</script>
</body>
</html>
