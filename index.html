<script>
// ==================== ТВОЙ РАБОЧИЙ API URL ====================
const API_URL = 'https://script.google.com/macros/s/AKfycbxnC4Ejt1EpV1xnQF4UKB1Dni6GvZUbcTEceMX4dWirHJ8PEGinaAVIEdNmjs7baF8f/exec';

let projects = [];
let tabs = [], activeTabId = null, nextTabId = 1, isDark = true, historyStore = [];
let bookmarks = JSON.parse(localStorage.getItem('muzaffar_bookmarks') || '[]');
let vpnActive = false;
let currentUser = JSON.parse(localStorage.getItem('muzaffar_user')) || null;

// ==================== АНАЛИТИКА ====================
let analytics = JSON.parse(localStorage.getItem('muzaffar_analytics')) || {};

function incrementAnalytics(projectName) {
    if (!projectName) return;
    analytics[projectName] = (analytics[projectName] || 0) + 1;
    localStorage.setItem('muzaffar_analytics', JSON.stringify(analytics));
    renderTopProjects();
}

function renderTopProjects() {
    const container = document.getElementById('topProjectsList');
    if (!container) return;
    const sorted = Object.entries(analytics).sort((a, b) => b[1] - a[1]).slice(0, 5);
    if (sorted.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:8px; color:#94a3b8; font-size:0.7rem;">Нет данных. Кликайте на проекты!</div>';
        return;
    }
    container.innerHTML = '';
    sorted.forEach(([name, count], idx) => {
        const div = document.createElement('div');
        div.className = 'top-project-item';
        div.innerHTML = `<div class="top-project-rank">${idx + 1}</div><div class="top-project-name" title="${escapeHtml(name)}">${escapeHtml(name.length > 30 ? name.slice(0,27)+'...' : name)}</div><div class="top-project-count">${count} раз</div>`;
        container.appendChild(div);
    });
}

function resetAnalytics() {
    if (confirm('Сбросить статистику использования проектов?')) {
        analytics = {};
        localStorage.setItem('muzaffar_analytics', JSON.stringify(analytics));
        renderTopProjects();
        alert('✅ Статистика сброшена');
    }
}

// ==================== ПОЛЬЗОВАТЕЛЬ ====================
function updateUIForUser() {
    if(currentUser) {
        document.getElementById('loginBtn').classList.add('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('userAvatar').innerText = currentUser.name[0].toUpperCase();
    } else {
        document.getElementById('loginBtn').classList.remove('hidden');
        document.getElementById('userInfo').classList.add('hidden');
    }
}

function showLoginModal() { document.getElementById('loginModal').classList.add('open'); }
function hideLoginModal() { document.getElementById('loginModal').classList.remove('open'); }

document.getElementById('loginBtn').onclick = showLoginModal;
document.getElementById('closeLoginModal').onclick = hideLoginModal;
document.getElementById('loginSubmitBtn').onclick = () => {
    const name = document.getElementById('userNameInput').value;
    if(name) {
        currentUser = { name: name };
        localStorage.setItem('muzaffar_user', JSON.stringify(currentUser));
        updateUIForUser();
        hideLoginModal();
        alert(`✅ Добро пожаловать, ${name}!`);
    } else { alert('Введите имя'); }
};
document.getElementById('guestLoginBtn').onclick = () => {
    currentUser = { name: 'Гость' };
    localStorage.setItem('muzaffar_user', JSON.stringify(currentUser));
    updateUIForUser();
    hideLoginModal();
};
document.getElementById('logoutBtn').onclick = () => {
    currentUser = null;
    localStorage.removeItem('muzaffar_user');
    updateUIForUser();
};

// ==================== ЗАГРУЗКА ПРОЕКТОВ ИЗ API ====================
async function loadProjects() {
    try {
        const response = await fetch(`${API_URL}?action=get`);
        const data = await response.json();
        
        if (data.success && data.projects && data.projects.length > 0) {
            projects = data.projects;
            document.getElementById('projectCount').innerText = projects.length;
            renderProjectsGrid();
            return projects;
        } else {
            document.getElementById('projectsGrid').innerHTML = '<div style="text-align:center; padding:40px;">❌ Нет проектов в API. Проверьте таблицу.</div>';
            return [];
        }
    } catch (error) {
        console.error('Ошибка:', error);
        document.getElementById('projectsGrid').innerHTML = '<div style="text-align:center; padding:40px;">❌ Ошибка соединения. Проверьте API URL.</div>';
        return [];
    }
}

const categoryOrder = ["⭐ Главные", "💸 Платежи", "🚚 Доставка", "🛍️ Торговля", "👤 Профиль", "💰 Кошелёк", "📈 Акции", "💱 Обмен", "🤖 AI", "🛠️ Инструменты", "🎮 Игры", "🎬 Медиа", "🎨 Творчество", "📚 Образование", "📞 Связь", "🚕 Сервисы", "📱 Соцсети", "🧭 Навигация", "📁 Другое"];

function renderProjectsGrid() {
    const container = document.getElementById('projectsGrid');
    const searchInput = document.getElementById('projectSearch');
    
    function render(term='') {
        container.innerHTML = '';
        const lowerTerm = term.toLowerCase();
        const cats = {};
        projects.forEach(p => { if (!cats[p.category]) cats[p.category] = []; cats[p.category].push(p); });
        
        categoryOrder.forEach(catName => {
            const projectsInCat = cats[catName];
            if (!projectsInCat) return;
            const filtered = projectsInCat.filter(p => p.name.toLowerCase().includes(lowerTerm));
            if (filtered.length === 0) return;
            
            const catDiv = document.createElement('div'); catDiv.style.marginBottom = '14px';
            catDiv.innerHTML = `<div class="category-title">${catName}</div><div class="projects-grid-category"></div>`;
            container.appendChild(catDiv);
            const grid = catDiv.querySelector('.projects-grid-category');
            
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => { incrementAnalytics(p.name); createWebTab(p.url, p.name); };
                card.innerHTML = `<div class="project-card-icon">${p.icon || '📄'}</div><div class="project-card-name">${escapeHtml(p.name)}</div>`;
                grid.appendChild(card);
            });
        });
        
        if (container.children.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:30px; color:#94a3b8;">🔍 Проект не найден</div>';
        }
    }
    
    render();
    if (searchInput) searchInput.addEventListener('input', (e) => render(e.target.value));
}

// ==================== ВКЛАДКИ ====================
function createSearchTab() {
    const id = nextTabId++;
    const div = document.createElement('div');
    div.className = 'search-tab-content';
    div.id = `search-tab-${id}`;
    div.innerHTML = `<div class="search-center"><div class="logo-icon-big"><img src="https://saripovmuzaffar759-jpg.github.io/Muzaffar/logo.png" alt="Logo"></div><div class="logo-text-big">Muzaffar Pro</div><div class="sub-text">${projects.length} проектов · Аналитика · Поиск</div><div class="gcse-search"></div></div>`;
    tabs.push({ id, title: "Поиск", type: "search", element: div });
    document.getElementById('tabsContainerIframes').appendChild(div);
    updateTabsBar();
    switchToTab(id);
    return id;
}

function createWebTab(url, title) {
    let finalUrl = url;
    if (vpnActive && !url.includes('github.io') && !url.includes('netlify.app')) finalUrl = `https://cors-anywhere.herokuapp.com/${url}`;
    const id = nextTabId++;
    const iframe = document.createElement('iframe');
    iframe.className = 'tab-frame';
    iframe.src = finalUrl;
    iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-storage-access-by-user-activation');
    tabs.push({ id, title: title.length > 25 ? title.slice(0,22)+'...' : title, type: "web", iframe });
    document.getElementById('tabsContainerIframes').appendChild(iframe);
    updateTabsBar();
    switchToTab(id);
    return id;
}

function switchToTab(id) { activeTabId = id; tabs.forEach(t => { if(t.type === "web") t.iframe.classList.toggle('active', t.id === id); else t.element.classList.toggle('active', t.id === id); }); updateTabsBar(); }
function closeTab(id) { const idx = tabs.findIndex(t => t.id === id); if(idx === -1) return; const t = tabs[idx]; if(t.type === "web") t.iframe.remove(); else t.element.remove(); tabs.splice(idx,1); if(tabs.length === 0) createSearchTab(); else if(activeTabId === id) switchToTab(tabs[Math.min(idx, tabs.length-1)].id); updateTabsBar(); }
function updateTabsBar() { const cont = document.getElementById('tabsContainer'); cont.innerHTML = ''; tabs.forEach(t => { const btn = document.createElement('div'); btn.className = `tab ${t.id === activeTabId ? 'active' : ''}`; btn.onclick = () => switchToTab(t.id); btn.innerHTML = `<span class="tab-title">${t.type === 'search' ? '🔍 ' + t.title : '🌐 ' + t.title}</span><button class="tab-close" onclick="event.stopPropagation(); closeTab(${t.id})">✕</button>`; cont.appendChild(btn); }); }

// ==================== ЗАКЛАДКИ ====================
function saveBookmarks() { localStorage.setItem('muzaffar_bookmarks', JSON.stringify(bookmarks)); renderBookmarks(); }
function renderBookmarks() {
    const container = document.getElementById('bookmarksList');
    if (!container) return;
    container.innerHTML = '';
    bookmarks.forEach(b => {
        const div = document.createElement('div');
        div.className = 'bookmark-item';
        div.innerHTML = `<span>${b.icon || '🔖'}</span><span>${escapeHtml(b.name)}</span><button class="bookmark-remove" style="background:transparent; border:none; color:#94a3b8; cursor:pointer; margin-left:5px;">✕</button>`;
        div.onclick = (e) => { if (!e.target.classList.contains('bookmark-remove')) createWebTab(b.url, b.name); };
        div.querySelector('.bookmark-remove').onclick = (e) => { e.stopPropagation(); bookmarks = bookmarks.filter(bk => bk.url !== b.url); saveBookmarks(); };
        container.appendChild(div);
    });
}

// ==================== ИСТОРИЯ ====================
function loadHistory() { const s = localStorage.getItem('muzaffar_history'); if(s) historyStore = JSON.parse(s); renderHistory(); }
function addToHistory(q) { if(!q?.trim()) return; historyStore = historyStore.filter(i=>i.query!==q); historyStore.unshift({query:q, date:new Date().toLocaleString()}); if(historyStore.length>50) historyStore.pop(); localStorage.setItem('muzaffar_history', JSON.stringify(historyStore)); renderHistory(); }
function renderHistory() { const container = document.getElementById('historyList'); if(!historyStore.length){ container.innerHTML='<div style="padding:30px;text-align:center; color:#94a3b8;">✨ История пуста</div>'; return; } container.innerHTML = ''; historyStore.forEach(item=>{ const d=document.createElement('div'); d.className='history-item'; d.innerHTML=`🔍 ${escapeHtml(item.query)}<div style="font-size:0.7rem; color:#a78bfa;">${item.date}</div>`; d.onclick=()=>{ const activeDiv = document.querySelector('.search-tab-content.active'); if(activeDiv){ const inp = activeDiv.querySelector('.gsc-input input'); if(inp){ inp.value=item.query; inp.dispatchEvent(new Event('input',{bubbles:true})); activeDiv.querySelector('.gsc-search-button')?.click(); } } closeHistory(); }; container.appendChild(d); }); }
function clearHistory() { if(confirm('Очистить историю?')){ historyStore=[]; localStorage.setItem('muzaffar_history','[]'); renderHistory(); } }
function openHistory() { document.getElementById('historySidebar').classList.add('open'); document.getElementById('overlay').style.display='block'; }
function closeHistory() { document.getElementById('historySidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; }

// ==================== ДРУГИЕ ФУНКЦИИ ====================
function toggleVPN() { vpnActive = !vpnActive; const btn = document.getElementById('vpnBtn'); if(vpnActive) { btn.innerHTML = '<i class="fas fa-shield-alt"></i> VPN ВКЛ'; btn.classList.add('active'); } else { btn.innerHTML = '<i class="fas fa-shield-alt"></i> VPN'; btn.classList.remove('active'); } }
function enterReadingMode() {
    const activeFrame = document.querySelector('.tab-frame.active');
    if(activeFrame) {
        try {
            const doc = activeFrame.contentDocument || activeFrame.contentWindow.document;
            const text = doc.body.innerText;
            const title = doc.title;
            const win = window.open('', '_blank', 'width=900,height=700');
            win.document.write(`<html><head><title>${title} - Режим чтения</title><style>body{font-family:Georgia;max-width:800px;margin:40px auto;padding:30px;line-height:1.8;font-size:18px;background:#1e1e2e;color:#e2e8f0;}h1{color:#a78bfa;}button{position:fixed;top:20px;right:20px;padding:10px 20px;background:#8b5cf6;color:white;border:none;border-radius:30px;cursor:pointer;}</style></head><body><button onclick="window.close()">✕ Закрыть</button><h1>${escapeHtml(title)}</h1><p>${escapeHtml(text.slice(0,15000)).replace(/\n/g,'<br>')}</p></body></html>`);
        } catch(e) { alert('Ошибка'); }
    } else alert('Откройте страницу');
}
function changeWallpaper() { const url = prompt('Введите URL картинки:'); if(url) { document.body.style.background = `url(${url}) center/cover no-repeat`; document.body.classList.add('custom-bg'); localStorage.setItem('muzaffar_wallpaper', url); } }
function applyTheme() { if(isDark) { document.body.classList.remove('light'); document.getElementById('themeBtnHeader').innerHTML = '<i class="fas fa-sun"></i>'; } else { document.body.classList.add('light'); document.getElementById('themeBtnHeader').innerHTML = '<i class="fas fa-moon"></i>'; } localStorage.setItem('muzaffar_theme', isDark ? 'dark' : 'light'); }
function toggleTheme() { isDark = !isDark; applyTheme(); }
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

document.getElementById('togglePanelBtn').onclick = ()=> document.getElementById('projectsPanel').classList.add('collapsed');
document.getElementById('panelToggleBtn').onclick = ()=> document.getElementById('projectsPanel').classList.remove('collapsed');
document.getElementById('newTabBtn').onclick = () => createSearchTab();
document.getElementById('themeBtnHeader').onclick = toggleTheme;
document.getElementById('historyBtnHeader').onclick = openHistory;
document.getElementById('closeHistoryBtn').onclick = closeHistory;
document.getElementById('overlay').onclick = closeHistory;
document.getElementById('clearHistoryBtn').onclick = clearHistory;
document.getElementById('readingModeBtn').onclick = enterReadingMode;
document.getElementById('wallpaperBtn').onclick = changeWallpaper;
document.getElementById('vpnBtn').onclick = toggleVPN;
document.getElementById('resetWallpaperBtn').onclick = () => { document.body.style.background = ''; document.body.classList.remove('custom-bg'); localStorage.removeItem('muzaffar_wallpaper'); alert('Фон возвращён'); };
document.getElementById('addBookmarkBtn').onclick = () => { const activeTab = tabs.find(t => t.id === activeTabId); if(activeTab && activeTab.type === 'web') { const name = prompt('Название закладки:', activeTab.title); if(name) { bookmarks.push({name, url:activeTab.iframe.src, icon:'🔖'}); saveBookmarks(); } } else alert('Откройте сайт'); };
document.getElementById('resetAnalyticsBtn').onclick = resetAnalytics;
document.getElementById('aiIntegrationToggle').onclick = () => document.getElementById('aiIntegrationModal').classList.toggle('open');
document.getElementById('closeAiIntegrationBtn').onclick = () => document.getElementById('aiIntegrationModal').classList.remove('open');

function loadGoogleSearch() {
    const script = document.createElement('script');
    script.src = 'https://cse.google.com/cse.js?cx=40fe40e6028d84ece';
    script.async = true;
    document.head.appendChild(script);
}

setInterval(() => {
    const searchInputs = document.querySelectorAll('.gsc-input input');
    searchInputs.forEach(input => {
        if(input && !input.hasAttribute('data-history-listener')) {
            input.setAttribute('data-history-listener', 'true');
            const form = input.closest('form');
            if(form) form.addEventListener('submit', (e) => { setTimeout(() => { if(input.value) addToHistory(input.value); }, 100); });
            input.addEventListener('keypress', (e) => { if(e.key === 'Enter') setTimeout(() => { if(input.value) addToHistory(input.value); }, 100); });
        }
    });
}, 1000);

(async function init() {
    await loadProjects();
    createSearchTab();
    loadGoogleSearch();
    loadHistory();
    renderBookmarks();
    renderTopProjects();
    updateUIForUser();
    const savedTheme = localStorage.getItem('muzaffar_theme');
    if(savedTheme === 'light'){ isDark=false; applyTheme(); } else { isDark=true; applyTheme(); }
    const savedWallpaper = localStorage.getItem('muzaffar_wallpaper');
    if(savedWallpaper) { document.body.style.background = `url(${savedWallpaper}) center/cover no-repeat`; document.body.classList.add('custom-bg'); }
})();
</script>
