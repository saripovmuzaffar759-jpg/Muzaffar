<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Javoni · Премиум расписание</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-start: #eef4ff;
      --bg-end: #dce9f5;
      --glass: rgba(255, 255, 255, 0.72);
      --glass-hover: rgba(255, 255, 255, 0.88);
      --accent: #0f3b5c;
      --accent-light: #2c6e8f;
      --accent-gold: #c9a03d;
      --text-dark: #1a2c3c;
      --text-soft: #4a6276;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 20px 35px -12px rgba(15, 59, 92, 0.2);
      --shadow-lg: 0 30px 50px -18px rgba(15, 59, 92, 0.3);
      --radius-full: 60px;
      --radius-card: 32px;
      --transition: all 0.3s cubic-bezier(0.2, 0.95, 0.4, 1.05);
    }

    body {
      background: radial-gradient(circle at 15% 25%, var(--bg-start), var(--bg-end));
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      padding-bottom: 30px;
    }

    .bg-ornament {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }
    .bg-ornament::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 40%, rgba(44, 110, 143, 0.06) 0%, transparent 60%);
      animation: slowFloat 28s infinite alternate;
    }
    @keyframes slowFloat {
      0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
      100% { transform: translate(2%, 1%) scale(1.08); opacity: 0.7; }
    }

    .lux-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px;
      margin: 20px 24px 0;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-sm), 0 1px 0 0 rgba(255,255,255,0.7) inset;
      border: 1px solid rgba(255,255,255,0.6);
      transition: var(--transition);
    }
    .lux-header:hover {
      background: var(--glass-hover);
      box-shadow: var(--shadow-md);
    }
    .logo-lux {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #0f3b5c, #2c6e8f, #3a8c6e);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge-lux {
      background: rgba(201, 160, 61, 0.2);
      backdrop-filter: blur(4px);
      padding: 4px 14px;
      border-radius: var(--radius-full);
      font-size: 0.7rem;
      font-weight: 700;
      color: #b87c2e;
      border: 1px solid rgba(201,160,61,0.4);
      margin-left: 12px;
    }
    .icon-lux {
      background: rgba(255,255,255,0.9);
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 1.3rem;
      border: 1px solid rgba(255,255,255,0.9);
      cursor: pointer;
      transition: var(--transition);
    }
    .icon-lux:hover {
      transform: translateY(-3px);
      background: white;
      box-shadow: 0 12px 22px -12px var(--accent);
      color: var(--accent-light);
    }

    .filter-lux {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(24px);
      border-radius: 80px;
      padding: 6px 20px;
      margin: 24px 24px 32px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.7);
    }
    .chip-lux {
      background: rgba(255, 248, 235, 0.85);
      border-radius: 60px;
      padding: 8px 22px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid rgba(15,59,92,0.12);
      transition: var(--transition);
    }
    .chip-lux select, .chip-lux input {
      background: transparent;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      outline: none;
      color: var(--text-dark);
    }
    .search-chip {
      flex: 2 1 260px;
    }
    .search-chip input {
      width: 100%;
    }
    .btn-lux {
      background: rgba(15,59,92,0.1);
      border-radius: 60px;
      padding: 8px 24px;
      border: 1px solid rgba(15,59,92,0.2);
      font-weight: 700;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--accent);
    }
    .btn-lux:hover {
      background: var(--accent);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -8px var(--accent);
    }

    .container-lux {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .skeleton-lux {
      display: flex;
      gap: 26px;
      flex-wrap: wrap;
    }
    .sk-lux {
      flex: 1 1 280px;
      height: 130px;
      background: linear-gradient(120deg, #e2edf5 30%, #f0f7fc 50%, #e2edf5 70%);
      background-size: 200% 100%;
      border-radius: 40px;
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .day-lux {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(18px);
      border-radius: 44px;
      margin-bottom: 28px;
      padding: 28px 32px;
      transition: var(--transition);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 12px 28px -16px rgba(0,0,0,0.06);
    }
    .day-lux:hover {
      background: rgba(255, 255, 255, 0.85);
      transform: translateY(-5px);
      box-shadow: 0 30px 45px -20px rgba(15,59,92,0.2);
      border-color: rgba(201,160,61,0.3);
    }
    .day-head-lux {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 14px;
      margin-bottom: 22px;
      border-bottom: 2px solid rgba(15,59,92,0.2);
    }
    .day-name-lux {
      font-size: 1.9rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(125deg, #0f3b5c, #2c6e8f);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .lesson-count-lux {
      background: rgba(201,160,61,0.15);
      padding: 5px 18px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #a0762c;
    }

    .lesson-lux {
      display: flex;
      align-items: center;
      gap: 24px;
      background: white;
      margin: 16px 0;
      padding: 18px 28px;
      border-radius: 28px;
      transition: all 0.25s;
      border: 1px solid rgba(0,0,0,0.02);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .lesson-lux:hover {
      border-color: var(--accent-light);
      transform: translateX(8px) scale(1.01);
      box-shadow: 0 18px 32px -18px var(--accent);
    }
    .icon-lux-lesson {
      background: linear-gradient(145deg, #0f3b5c, #2c6e8f);
      width: 60px;
      height: 60px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      color: white;
      box-shadow: 0 12px 18px -8px rgba(15,59,92,0.4);
    }
    .lesson-content-lux {
      flex: 1;
    }
    .lesson-title-lux {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
      color: #0a2f4d;
    }
    .lesson-note-lux {
      font-size: 0.85rem;
      color: #4f6f8a;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .note-badge {
      background: #ecfdf5;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #2c6e5c;
    }
    .empty-lux {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255,255,240,0.7);
      backdrop-filter: blur(12px);
      border-radius: 56px;
      font-weight: 500;
    }

    .hidden {
      display: none !important;
    }

    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.7rem;
      opacity: 0.6;
    }

    @media (max-width: 680px) {
      .lux-header { margin: 12px 12px 0; padding: 8px 18px; }
      .filter-lux { margin: 16px 12px; border-radius: 40px; padding: 10px 16px; }
      .day-lux { padding: 20px; }
      .lesson-title-lux { font-size: 1rem; }
      .icon-lux-lesson { width: 48px; height: 48px; font-size: 1.3rem; }
      .day-name-lux { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="bg-ornament"></div>

<header class="lux-header">
  <div style="display: flex; align-items: center; gap: 16px;">
    <button id="menuBtn" class="icon-lux"><i class="fas fa-gem"></i></button>
    <div>
      <span class="logo-lux">Javoni</span>
      <span class="badge-lux"><i class="fas fa-crown"></i> премиум</span>
    </div>
  </div>
  <div style="display: flex; gap: 12px;">
    <button id="todayBtn" class="icon-lux" title="Сегодня"><i class="fas fa-sun"></i></button>
    <button id="refreshBtn" class="icon-lux" title="Обновить"><i class="fas fa-arrow-rotate-right"></i></button>
  </div>
</header>

<div class="filter-lux">
  <div class="chip-lux"><i class="fas fa-graduation-cap"></i><select id="classSelect"></select></div>
  <div class="chip-lux"><i class="fas fa-calendar-week"></i><select id="daySelect"><option value="all">Все дни</option><option value="пн">Пн</option><option value="вт">Вт</option><option value="ср">Ср</option><option value="чт">Чт</option><option value="пт">Пт</option><option value="сб">Сб</option></select></div>
  <div class="chip-lux search-chip"><i class="fas fa-magnifying-glass"></i><input id="searchInput" placeholder="Поиск урока..."></div>
  <button id="onlineBtn" class="btn-lux"><i class="fas fa-video"></i> <span>Онлайн</span></button>
</div>

<div class="container-lux">
  <div id="skeleton" class="skeleton-lux">
    <div class="sk-lux"></div><div class="sk-lux"></div><div class="sk-lux"></div>
  </div>
  <div id="scheduleList"></div>
</div>

<footer>Javoni · премиум расписание — данные из вашей Google таблицы</footer>

<script>
  (function() {
    // ID вашей таблицы (из ссылки)
    const SPREADSHEET_ID = "1IQ-5HM6m0WMwIl5KKDzZsbId6mL026dh1jyRrMCLSRA";
    
    // Прокси-сервер для обхода CORS и получения данных (бесплатный публичный)
    const PROXY_URL = "https://api.allorigins.win/raw?url=";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
    
    let scheduleData = {};
    let onlineOnly = false;
    
    const classSelect = document.getElementById('classSelect');
    const daySelect = document.getElementById('daySelect');
    const searchInput = document.getElementById('searchInput');
    const scheduleDiv = document.getElementById('scheduleList');
    const skeleton = document.getElementById('skeleton');
    const refreshBtn = document.getElementById('refreshBtn');
    const todayBtn = document.getElementById('todayBtn');
    const onlineBtn = document.getElementById('onlineBtn');
    const menuBtn = document.getElementById('menuBtn');
    
    const daysMap = ['пн','вт','ср','чт','пт','сб'];
    const daysPretty = { 'пн':'Понедельник', 'вт':'Вторник', 'ср':'Среда', 'чт':'Четверг', 'пт':'Пятница', 'сб':'Суббота' };
    
    function parseCSV(text) {
      const rows = [];
      const lines = text.split(/\r?\n/);
      for (let line of lines) {
        if (!line.trim()) continue;
        let cells = [], cur = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuotes && line[i+1] === '"') { cur += '"'; i++; continue; }
            inQuotes = !inQuotes;
            continue;
          }
          if (ch === ',' && !inQuotes) { cells.push(cur); cur = ''; continue; }
          cur += ch;
        }
        cells.push(cur);
        rows.push(cells.map(c => c.trim()));
      }
      if (rows.length === 0) return [];
      const maxCols = Math.max(...rows.map(r => r.length));
      rows.forEach(r => { while (r.length < maxCols) r.push(''); });
      return rows;
    }
    
    function buildSchedule(rows) {
      if (!rows.length || rows.length < 3) return {};
      const classes = rows[0];
      const daysRow = rows[1];
      const schedule = {};
      
      for (let col = 0; col < classes.length; col++) {
        const className = classes[col];
        if (!className || className === '') continue;
        let currentDay = daysRow[col] ? daysRow[col].toLowerCase() : null;
        if (currentDay && !daysMap.includes(currentDay)) currentDay = null;
        
        schedule[className] = {};
        daysMap.forEach(d => { schedule[className][d] = []; });
        
        for (let row = 2; row < rows.length; row++) {
          let cell = rows[row][col] || '';
          if (!cell.trim()) continue;
          const lowerCell = cell.toLowerCase().trim();
          if (daysMap.includes(lowerCell)) {
            currentDay = lowerCell;
            continue;
          }
          if (currentDay && cell.trim()) {
            let title = cell.trim();
            let note = '';
            if (title.includes(':')) {
              const parts = title.split(':');
              title = parts[0].trim();
              note = parts.slice(1).join(':').trim();
            }
            schedule[className][currentDay].push({ title, note });
          }
        }
        for (let d of daysMap) {
          schedule[className][d] = schedule[className][d].filter(l => l.title && l.title !== '');
        }
      }
      return schedule;
    }
    
    function render() {
      const selectedClass = classSelect.value;
      if (!selectedClass || !scheduleData[selectedClass]) {
        scheduleDiv.innerHTML = '<div class="empty-lux"><i class="fas fa-chalkboard-user"></i> Выберите класс</div>';
        return;
      }
      const selectedDay = daySelect.value;
      const query = searchInput.value.trim().toLowerCase();
      const classInfo = scheduleData[selectedClass];
      
      let days = selectedDay === 'all' ? daysMap.filter(d => classInfo[d] && classInfo[d].length) : [selectedDay];
      days = days.filter(d => classInfo[d] && classInfo[d].length);
      
      if (days.length === 0) {
        scheduleDiv.innerHTML = '<div class="empty-lux"><i class="far fa-calendar-times"></i> Нет уроков</div>';
        return;
      }
      
      let html = '';
      for (let day of days) {
        let lessons = [...classInfo[day]];
        if (query) lessons = lessons.filter(l => l.title.toLowerCase().includes(query) || l.note.toLowerCase().includes(query));
        if (onlineOnly) lessons = lessons.filter(l => l.note.toLowerCase().includes('zoom') || l.note.toLowerCase().includes('meet') || l.note.includes('https'));
        if (lessons.length === 0) continue;
        
        html += `<div class="day-lux">
          <div class="day-head-lux">
            <div class="day-name-lux"><i class="fas fa-star-of-life"></i> ${daysPretty[day] || day.toUpperCase()}</div>
            <div class="lesson-count-lux">${lessons.length} ${lessons.length === 1 ? 'урок' : (lessons.length < 5 ? 'урока' : 'уроков')}</div>
          </div>`;
        
        for (let l of lessons) {
          html += `<div class="lesson-lux">
            <div class="icon-lux-lesson"><i class="fas fa-book-open"></i></div>
            <div class="lesson-content-lux">
              <div class="lesson-title-lux">${escapeHtml(l.title)}</div>
              ${l.note ? `<div class="lesson-note-lux"><i class="fas fa-pen-fancy"></i> <span class="note-badge">${escapeHtml(l.note.substring(0, 90))}${l.note.length > 90 ? '…' : ''}</span></div>` : '<div class="lesson-note-lux"><i class="fas fa-check-circle" style="color:#2c6e5c;"></i> <span style="font-size:0.75rem;">Без заметок</span></div>'}
            </div>
          </div>`;
        }
        html += `</div>`;
      }
      if (html === '') scheduleDiv.innerHTML = '<div class="empty-lux"><i class="fas fa-filter"></i> Ничего не найдено</div>';
      else scheduleDiv.innerHTML = html;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
    
    function fillClasses() {
      classSelect.innerHTML = '';
      const classes = Object.keys(scheduleData);
      if (classes.length === 0) {
        classSelect.innerHTML = '<option>Нет данных</option>';
        return;
      }
      classes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        classSelect.appendChild(opt);
      });
    }
    
    async function loadData() {
      skeleton.classList.remove('hidden');
      scheduleDiv.innerHTML = '';
      
      try {
        // Используем прокси для обхода CORS
        const response = await fetch(PROXY_URL + encodeURIComponent(CSV_URL), {
          cache: 'no-store'
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const text = await response.text();
        
        // Проверка, не вернулся ли HTML вместо CSV
        if (text.includes('<!DOCTYPE html>') || text.includes('Login') || text.includes('accounts.google.com')) {
          throw new Error('Требуется авторизация');
        }
        
        const rows = parseCSV(text);
        if (rows.length < 3) {
          throw new Error('Таблица пуста или имеет неверный формат');
        }
        
        scheduleData = buildSchedule(rows);
        fillClasses();
        
        if (Object.keys(scheduleData).length === 0) {
          scheduleDiv.innerHTML = '<div class="empty-lux">⚠️ Не удалось распознать структуру таблицы. Убедитесь, что первая строка — классы, вторая — дни (пн, вт, ср, чт, пт, сб), а дальше — уроки.</div>';
        } else if (classSelect.options.length) {
          render();
        } else {
          scheduleDiv.innerHTML = '<div class="empty-lux">⚠️ Классы не найдены. Первая строка должна содержать названия классов.</div>';
        }
        
        // Сохраняем в кэш
        localStorage.setItem('schedule_cache', JSON.stringify(scheduleData));
        localStorage.setItem('schedule_cache_time', Date.now().toString());
        
      } catch (err) {
        console.error('Ошибка загрузки:', err);
        
        // Пытаемся загрузить из кэша
        const cached = localStorage.getItem('schedule_cache');
        const cacheTime = localStorage.getItem('schedule_cache_time');
        
        if (cached && cacheTime && (Date.now() - parseInt(cacheTime) < 24 * 60 * 60 * 1000)) {
          scheduleData = JSON.parse(cached);
          fillClasses();
          render();
          scheduleDiv.innerHTML += '<div style="margin-top:12px;text-align:center;font-size:0.75rem;background:rgba(255,255,200,0.8);padding:8px;border-radius:40px;">📡 Данные из кэша (последнее обновление)</div>';
        } else {
          let errorMessage = '';
          if (err.message === 'Требуется авторизация') {
            errorMessage = `
              <div class="empty-lux" style="background:#ffe6e6;">
                <i class="fas fa-lock"></i><br>
                <strong>Доступ к таблице закрыт!</strong><br><br>
                📌 Чтобы открыть доступ:<br>
                1. Нажмите <strong>"Поделиться"</strong> в правом верхнем углу таблицы<br>
                2. Выберите <strong>"Все, у кого есть ссылка"</strong><br>
                3. Установите доступ <strong>"Читатель"</strong><br>
                4. Нажмите <strong>"Готово"</strong><br><br>
                🔄 После этого обновите страницу
              </div>
            `;
          } else {
            errorMessage = `
              <div class="empty-lux" style="background:#ffe6e6;">
                <i class="fas fa-cloud-arrow-down"></i><br>
                <strong>Ошибка загрузки данных</strong><br><br>
                ${err.message}<br><br>
                📌 Возможные решения:<br>
                1. Проверьте, что таблица существует<br>
                2. Откройте доступ к таблице (кнопка "Поделиться")<br>
                3. Нажмите <strong>Обновить</strong> 🔄
              </div>
            `;
          }
          scheduleDiv.innerHTML = errorMessage;
        }
      } finally {
        skeleton.classList.add('hidden');
      }
    }
    
    onlineBtn.addEventListener('click', () => {
      onlineOnly = !onlineOnly;
      if (onlineOnly) {
        onlineBtn.style.background = '#0f3b5c';
        onlineBtn.style.color = 'white';
      } else {
        onlineBtn.style.background = '';
        onlineBtn.style.color = '#0f3b5c';
      }
      render();
    });
    
    classSelect.addEventListener('change', render);
    daySelect.addEventListener('change', render);
    searchInput.addEventListener('input', render);
    refreshBtn.addEventListener('click', () => {
      loadData();
    });
    
    todayBtn.addEventListener('click', () => {
      const day = new Date().getDay();
      const map = {1:'пн',2:'вт',3:'ср',4:'чт',5:'пт',6:'сб',0:'вс'};
      const today = map[day];
      if (today === 'вс') {
        daySelect.value = 'all';
      } else if (Array.from(daySelect.options).some(o => o.value === today)) {
        daySelect.value = today;
      } else {
        daySelect.value = 'all';
      }
      render();
