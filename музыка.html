<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZAFFAR Music — моя музыка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg-primary: #0a0b0e;
            --bg-secondary: #14151b;
            --bg-card: #1e1f2a;
            --accent: #7c3aed;
            --accent-secondary: #10b981;
            --accent-glow: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --border: #2c2e3a;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Шапка с профилем */
        header {
            position: sticky;
            top: 0;
            background: rgba(10, 11, 14, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .profile-btn:hover {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--bg-card), #2a2c3a);
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-name {
            font-weight: 600;
        }

        .saved-count {
            background: var(--accent);
            color: white;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Табы */
        .tabs {
            padding: 20px 32px 0;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Поиск (только в режиме поиска) */
        .search-section {
            padding: 20px 32px;
            display: none;
        }

        .search-section.active {
            display: block;
        }

        .search-container {
            display: flex;
            max-width: 700px;
            margin: 0 auto;
        }

        .search-container input {
            flex: 1;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 40px 0 0 40px;
            padding: 14px 24px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }

        .search-container input:focus {
            border-color: var(--accent);
        }

        .search-container button {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border: 2px solid var(--accent);
            border-left: none;
            border-radius: 0 40px 40px 0;
            padding: 14px 32px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Быстрые жанры */
        .quick-genres {
            padding: 0 32px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .genre-btn {
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.2s;
        }

        .genre-btn:hover {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
        }

        /* Сетка треков */
        .tracks-grid {
            padding: 0 32px 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .track-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            position: relative;
        }

        .track-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .track-card.playing {
            border-color: var(--accent);
            background: linear-gradient(145deg, var(--bg-card), #2a2c3a);
        }

        .track-card.saved {
            border-color: var(--accent-secondary);
        }

        .cover {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: white;
            opacity: 0;
            transition: 0.2s;
            text-shadow: 0 2px 10px black;
        }

        .track-card:hover .play-icon {
            opacity: 1;
        }

        .save-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            z-index: 10;
        }

        .save-btn:hover {
            transform: scale(1.1);
            background: var(--accent);
        }

        .save-btn.saved {
            background: var(--accent-secondary);
            color: white;
        }

        .track-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 30px;
        }

        .track-artist {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Пустое состояние */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state button {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Плеер */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 21, 27, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            z-index: 1000;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 250px;
        }

        .now-playing img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }

        .track-info h4 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .track-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .controls button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .controls button:hover {
            background: rgba(124, 58, 237, 0.2);
            color: var(--accent);
        }

        .play-pause {
            background: var(--accent) !important;
            width: 50px !important;
            height: 50px !important;
            font-size: 1.5rem !important;
        }

        .play-pause:hover {
            transform: scale(1.05);
        }

        .progress {
            flex: 1;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            cursor: pointer;
        }

        .progress-current {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            width: 0%;
        }

        .volume {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 150px;
        }

        .volume-bar {
            width: 80px;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            cursor: pointer;
        }

        .volume-level {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            width: 70%;
        }

        /* Загрузка */
        .loading {
            grid-column: 1/-1;
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Адаптивность */
        @media (max-width: 900px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            
            .player-bar {
                flex-direction: column;
                padding: 15px;
            }
            
            .volume {
                display: none;
            }
            
            .tabs {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <i class="fas fa-headphones-alt"></i>
        MUZAFFAR
    </div>
    
    <div class="profile-menu">
        <div class="saved-count" id="savedCount">
            <i class="fas fa-bookmark"></i>
            <span>0</span>
        </div>
        <div class="profile-btn" onclick="switchTab('profile')">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <span class="profile-name">Мой профиль</span>
        </div>
    </div>
</header>

<!-- Табы -->
<div class="tabs">
    <div class="tab active" onclick="switchTab('search')" id="tabSearch">
        <i class="fas fa-search"></i> Поиск музыки
    </div>
    <div class="tab" onclick="switchTab('saved')" id="tabSaved">
        <i class="fas fa-bookmark"></i> Моя музыка
    </div>
</div>

<!-- Секция поиска -->
<div id="searchSection" class="search-section active">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Найди музыку..." value="pop music">
        <button id="searchBtn">
            <i class="fas fa-search"></i> Найти
        </button>
    </div>
</div>

<!-- Быстрые жанры (только в поиске) -->
<div id="genresSection" class="quick-genres">
    <span class="genre-btn" onclick="loadGenre('pop', this)">Pop</span>
    <span class="genre-btn" onclick="loadGenre('rock', this)">Rock</span>
    <span class="genre-btn" onclick="loadGenre('hip hop', this)">Hip Hop</span>
    <span class="genre-btn" onclick="loadGenre('electronic', this)">Electronic</span>
    <span class="genre-btn" onclick="loadGenre('jazz', this)">Jazz</span>
    <span class="genre-btn" onclick="loadGenre('classical', this)">Classical</span>
    <span class="genre-btn" onclick="loadGenre('lofi', this)">Lo-Fi</span>
</div>

<!-- Сетка треков -->
<div class="tracks-grid" id="tracksGrid">
    <div class="loading">
        <div class="spinner"></div>
        Загрузка...
    </div>
</div>

<!-- Плеер -->
<div class="player-bar">
    <div class="now-playing">
        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&h=100&fit=crop" id="nowPlayingImg">
        <div class="track-info">
            <h4 id="trackName">Выбери трек</h4>
            <p id="artistName">Нажми на любую песню</p>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevTrack()"><i class="fas fa-step-backward"></i></button>
        <button class="play-pause" onclick="playPause()" id="playPauseBtn"><i class="fas fa-play"></i></button>
        <button onclick="nextTrack()"><i class="fas fa-step-forward"></i></button>
    </div>

    <div class="progress">
        <span id="currentTime">0:00</span>
        <div class="progress-bar" onclick="seek(event)">
            <div class="progress-current" id="progressCurrent"></div>
        </div>
        <span id="totalTime">0:00</span>
    </div>

    <div class="volume">
        <i class="fas fa-volume-up"></i>
        <div class="volume-bar" onclick="changeVolume(event)">
            <div class="volume-level" id="volumeLevel"></div>
        </div>
    </div>
</div>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script>
    // API ключ
    const API_KEY = 'AIzaSyBQ_jnhCrhJFpTFMNMitoxGggIYv96bfBI';
    const API_URL = 'https://www.googleapis.com/youtube/v3';

    // Элементы
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const tracksGrid = document.getElementById('tracksGrid');
    const savedCount = document.getElementById('savedCount').querySelector('span');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const trackName = document.getElementById('trackName');
    const artistName = document.getElementById('artistName');
    const nowPlayingImg = document.getElementById('nowPlayingImg');
    const currentTime = document.getElementById('currentTime');
    const totalTime = document.getElementById('totalTime');
    const progressCurrent = document.getElementById('progressCurrent');
    const volumeLevel = document.getElementById('volumeLevel');

    // Переменные
    let player;
    let searchTracks = [];
    let savedTracks = JSON.parse(localStorage.getItem('savedTracks')) || [];
    let currentTracks = []; // Текущий отображаемый список
    let currentIndex = 0;
    let isPlaying = false;
    let currentMode = 'search'; // 'search' или 'saved'
    let progressInterval;

    // Скрытый плеер
    const playerContainer = document.createElement('div');
    playerContainer.id = 'youtube-player';
    playerContainer.style.display = 'none';
    document.body.appendChild(playerContainer);

    // Загрузка YouTube API
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = () => {
        console.log('YouTube API готов');
        updateSavedCount();
        loadGenre('pop', document.querySelector('.genre-btn'));
    };

    // Переключение табов
    window.switchTab = (mode) => {
        currentMode = mode;
        
        document.getElementById('tabSearch').classList.toggle('active', mode === 'search');
        document.getElementById('tabSaved').classList.toggle('active', mode === 'saved');
        document.getElementById('searchSection').classList.toggle('active', mode === 'search');
        document.getElementById('genresSection').style.display = mode === 'search' ? 'flex' : 'none';
        
        if (mode === 'saved') {
            showSavedTracks();
        } else {
            if (searchTracks.length > 0) {
                currentTracks = searchTracks;
                renderTracks(searchTracks);
            } else {
                loadGenre('pop', document.querySelector('.genre-btn'));
            }
        }
    };

    // Показать сохраненные треки
    function showSavedTracks() {
        if (savedTracks.length === 0) {
            tracksGrid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-bookmark"></i>
                    <h3>У тебя пока нет сохраненных треков</h3>
                    <p>Найди музыку в поиске и сохраняй ❤️</p>
                    <button onclick="switchTab('search')">
                        <i class="fas fa-search"></i> Найти музыку
                    </button>
                </div>
            `;
            currentTracks = [];
        } else {
            currentTracks = savedTracks;
            renderTracks(savedTracks);
        }
    }

    // Обновить счетчик сохраненных
    function updateSavedCount() {
        savedCount.textContent = savedTracks.length;
    }

    // Сохранить/удалить трек
    window.toggleSave = (trackId, event) => {
        event.stopPropagation();
        
        const track = currentTracks.find(t => t.id === trackId);
        if (!track) return;
        
        const index = savedTracks.findIndex(t => t.id === trackId);
        
        if (index === -1) {
            // Сохраняем
            savedTracks.push(track);
            showNotification('✅ Добавлено в мою музыку');
        } else {
            // Удаляем
            savedTracks.splice(index, 1);
            showNotification('❌ Удалено из моей музыки');
            
            // Если мы в режиме сохраненных, обновляем список
            if (currentMode === 'saved') {
                showSavedTracks();
            }
        }
        
        localStorage.setItem('savedTracks', JSON.stringify(savedTracks));
        updateSavedCount();
        
        // Обновляем отображение кнопок сохранения
        if (currentMode === 'search') {
            renderTracks(currentTracks);
        }
    };

    // Поиск
    searchBtn.addEventListener('click', () => {
        const query = searchInput.value.trim();
        if (query) searchMusic(query);
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (query) searchMusic(query);
        }
    });

    // Загрузка по жанру
    window.loadGenre = (genre, btn) => {
        document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        searchInput.value = genre + ' music';
        searchMusic(genre + ' music');
    };

    // Поиск музыки
    async function searchMusic(query) {
        tracksGrid.innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка...</div>';
        
        try {
            const searchUrl = `${API_URL}/search?part=snippet&type=video&videoCategoryId=10&maxResults=30&q=${encodeURIComponent(query)}&key=${API_KEY}`;
            const searchResp = await fetch(searchUrl);
            const searchData = await searchResp.json();

            if (!searchData.items) {
                tracksGrid.innerHTML = '<div class="loading">Ничего не найдено</div>';
                return;
            }

            const videoIds = searchData.items.map(item => item.id.videoId).join(',');
            const detailsUrl = `${API_URL}/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`;
            const detailsResp = await fetch(detailsUrl);
            const detailsData = await detailsResp.json();

            searchTracks = searchData.items.map(item => {
                const details = detailsData.items?.find(d => d.id === item.id.videoId) || {};
                return {
                    id: item.id.videoId,
                    title: item.snippet.title,
                    artist: item.snippet.channelTitle,
                    thumbnail: item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url,
                    duration: details.contentDetails?.duration || 'PT3M0S'
                };
            });

            currentTracks = searchTracks;
            renderTracks(searchTracks);
            
        } catch (err) {
            tracksGrid.innerHTML = '<div class="loading">Ошибка загрузки</div>';
        }
    }

    // Отображение треков
    function renderTracks(tracks) {
        tracksGrid.innerHTML = tracks.map((track, index) => {
            const isActive = index === currentIndex;
            const isSaved = savedTracks.some(t => t.id === track.id);
            
            return `
                <div class="track-card ${isActive ? 'playing' : ''} ${isSaved ? 'saved' : ''}" onclick="playTrack(${index})">
                    <div class="cover">
                        <img src="${track.thumbnail}" alt="${track.title}" loading="lazy">
                        <div class="play-icon"><i class="fas fa-play-circle"></i></div>
                    </div>
                    <div class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave('${track.id}', event)">
                        <i class="fas fa-bookmark"></i>
                    </div>
                    <div class="track-title">${track.title.substring(0, 30)}</div>
                    <div class="track-artist">${track.artist}</div>
                </div>
            `;
        }).join('');
    }

    // Воспроизведение трека
    window.playTrack = (index) => {
        currentIndex = index;
        const track = currentTracks[index];
        
        trackName.textContent = track.title.substring(0, 30);
        artistName.textContent = track.artist;
        nowPlayingImg.src = track.thumbnail;
        
        renderTracks(currentTracks);

        if (player) {
            player.loadVideoById(track.id);
        } else {
            player = new YT.Player('youtube-player', {
                videoId: track.id,
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    disablekb: 1
                },
                events: {
                    onReady: () => player.playVideo(),
                    onStateChange: handlePlayerState
                }
            });
        }
    };

    // Обработка состояний плеера
    function handlePlayerState(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            startProgress();
            
        } else if (event.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        } else if (event.data === YT.PlayerState.ENDED) {
            nextTrack();
        }
    }

    // Прогресс
    function startProgress() {
        if (progressInterval) clearInterval(progressInterval);
        
        progressInterval = setInterval(() => {
            if (player && player.getCurrentTime) {
                const current = player.getCurrentTime();
                const duration = player.getDuration();
                
                if (duration > 0) {
                    const progress = (current / duration) * 100;
                    progressCurrent.style.width = progress + '%';
                    
                    currentTime.textContent = formatTime(current);
                    totalTime.textContent = formatTime(duration);
                }
            }
        }, 100);
    }

    // Управление
    window.playPause = () => {
        if (!player) return;
        
        if (isPlaying) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    };

    window.nextTrack = () => {
        if (currentTracks.length === 0) return;
        let next = currentIndex + 1;
        if (next >= currentTracks.length) next = 0;
        playTrack(next);
    };

    window.prevTrack = () => {
        if (currentTracks.length === 0) return;
        let prev = currentIndex - 1;
        if (prev < 0) prev = currentTracks.length - 1;
        playTrack(prev);
    };

    window.seek = (event) => {
        if (!player) return;
        
        const bar = event.currentTarget;
        const rect = bar.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        const duration = player.getDuration();
        player.seekTo(percent * duration);
    };

    window.changeVolume = (event) => {
        if (!player) return;
        
        const bar = event.currentTarget;
        const rect = bar.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        player.setVolume(percent * 100);
        volumeLevel.style.width = (percent * 100) + '%';
    };

    // Уведомление
    function showNotification(message) {
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 2000;
            animation: slideUp 0.3s ease;
        `;
        notification.textContent = message;
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.animation = 'slideDown 0.3s ease';
            setTimeout(() => notification.remove(), 300);
        }, 2000);
    }

    // Форматирование времени
    function formatTime(seconds) {
        if (!seconds) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Добавляем стили для анимации
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(0); opacity: 1; }
            to { transform: translateX(-50%) translateY(100px); opacity: 0; }
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
