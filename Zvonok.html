<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZAFFARcall — приватные встречи</title>
    <!-- Подключаем современный шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src='https://meet.jit.si/external_api.js'></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #5f9eff;
            --primary-glow: rgba(95, 158, 255, 0.4);
            --bg-gradient: linear-gradient(145deg, #0b0f17 0%, #1a1f2e 100%);
            --card-bg: rgba(30, 35, 48, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --surface: rgba(20, 25, 36, 0.9);
            --text: #ffffff;
            --text-secondary: #b3b9d0;
            --error: #ff5f6d;
            --success: #5fec9e;
            --border-radius: 28px;
            --transition: 0.25s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(2px);
        }

        /* Анимированный фоновый эффект */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(95, 158, 255, 0.15) 0%, transparent 60%),
                        radial-gradient(circle at 70% 80%, rgba(95, 158, 255, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Экраны */
        .screen {
            display: none;
            height: 100%;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            padding: 16px;
            position: relative;
            z-index: 2;
        }
        .screen.active {
            display: flex;
            opacity: 1;
        }

        /* Карточки с глянцевым эффектом */
        .card {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 36px 28px;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--card-border);
            border: 1px solid rgba(255, 255, 255, 0.03);
            animation: fadeScale 0.5s ease;
        }

        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            margin: 0 0 8px 0;
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #ffffff, #c0ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 0.95rem;
            font-weight: 400;
            opacity: 0.8;
        }

        /* Поля ввода и селекты */
        input, select {
            width: 100%;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            border-radius: 18px;
            color: white;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            margin-bottom: 18px;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition), background 0.2s;
            backdrop-filter: blur(10px);
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(30, 35, 48, 0.9);
        }

        input::placeholder {
            color: #5f6a84;
            font-weight: 400;
            opacity: 0.7;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a7eff, #2b4ecf);
            box-shadow: 0 10px 20px -8px rgba(0, 102, 255, 0.6);
            border: none;
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 24px -6px rgba(0, 102, 255, 0.8);
        }

        .btn-secondary {
            background: rgba(30, 35, 48, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(45, 50, 68, 0.9);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Компактная строка с селектом и кнопкой */
        .row-select {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        .row-select select {
            flex: 1;
            margin-bottom: 0;
        }
        .row-select .btn {
            flex: 0 0 auto;
            width: auto;
            margin-bottom: 0;
            padding: 16px 22px;
        }

        /* Видео-контейнер */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: #0a0c12;
        }

        /* Плавающие элементы поверх видео — стеклянные */
        .floating-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            pointer-events: none;
        }
        .floating-controls > * {
            pointer-events: auto;
        }

        .ctrl-group {
            display: flex;
            gap: 6px;
            background: rgba(15, 18, 25, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 8px 10px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .user-name {
            padding: 0 20px 0 16px;
            font-weight: 500;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            line-height: 42px;
            white-space: nowrap;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            margin-right: 6px;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .ctrl-btn {
            background: transparent;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            white-space: nowrap;
            line-height: 1;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .ctrl-btn.red {
            color: #ff9b9b;
        }
        .ctrl-btn.red:hover {
            background: rgba(255, 100, 100, 0.2);
        }

        .participant-count {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 8px 20px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: 500;
        }

        /* Тосты */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(20, 25, 36, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Лоадер */
        .loader {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Адаптация */
        @media (max-width: 500px) {
            .card { padding: 28px 20px; }
            h2 { font-size: 1.9rem; }
            .floating-controls {
                top: 12px;
                left: 12px;
                right: 12px;
                flex-direction: column;
                align-items: stretch;
            }
            .ctrl-group {
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 40px;
            }
            .user-name { max-width: 130px; }
            .ctrl-btn { padding: 10px 14px; }
            .participant-count { align-self: flex-start; }
        }

        /* Дополнительные акценты */
        .note {
            font-size: 12px;
            color: #5f6a84;
            margin-top: 24px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- Тосты -->
    <div id="toast"></div>

    <!-- Экран входа -->
    <div id="login-screen" class="screen active">
        <div class="card">
            <h2>🔐 MUZAFFARcall</h2>
            <div class="subtitle">Введите ваше имя для входа</div>
            <input type="text" id="username" placeholder="Например: Алексей" autocomplete="off" autofocus>
            <button class="btn btn-primary" onclick="handleLogin()">Продолжить</button>
        </div>
    </div>

    <!-- Дашборд -->
    <div id="dashboard-screen" class="screen">
        <div class="card">
            <h2 id="greet">👋 добро пожаловать!</h2>
            <div class="subtitle">Название комнаты (латиница, цифры, дефис)</div>

            <input type="text" id="room-name" placeholder="например: proekt-1" autocomplete="off">

            <div class="row-select">
                <select id="server-select">
                    <option value="meet.guifi.net" selected>🌐 Сервер 1 (guifi)</option>
                    <option value="meet.jit.si">🌐 Сервер 2 (jit.si)</option>
                    <option value="framatalk.org">🌐 Сервер 3 (framatalk)</option>
                </select>
                <button class="btn btn-secondary" onclick="createRandomRoom()" title="Случайная комната">🎲</button>
            </div>

            <button class="btn btn-primary" onclick="createNamedRoom()">📹 Создать / войти</button>
            <button class="btn btn-secondary" onclick="continueLastRoom()" id="continue-last-btn" style="display: none;">↩️ Вернуться в последнюю комнату</button>

            <div class="note">
                Отправьте ссылку — собеседник попадёт сразу к вам.
            </div>
        </div>
    </div>

    <!-- Экран видео -->
    <div id="video-screen">
        <div class="floating-controls">
            <div class="ctrl-group">
                <span class="user-name" id="video-user-name">Загрузка...</span>
                <button class="ctrl-btn red" onclick="leaveRoom()">✕ Выйти</button>
                <button class="ctrl-btn" onclick="copyLink()">🔗 Скопировать ссылку</button>
            </div>
            <div class="ctrl-group">
                <button class="ctrl-btn" id="mic-toggle" onclick="toggleMic()">🎤 Выкл.</button>
                <button class="ctrl-btn" id="cam-toggle" onclick="toggleCam()">📷 Выкл.</button>
            </div>
            <div class="participant-count">
                <span>👥</span> <span id="participant-num">1</span>
            </div>
        </div>
        <div id="video-container"></div>
    </div>

    <script>
        (function() {
            // ==================== КОНФИГУРАЦИЯ ====================
            const DEFAULT_DOMAIN = 'meet.guifi.net';
            const ROOM_PREFIX = "MUZ_V1_";

            // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
            let api = null;
            let userName = localStorage.getItem('user_name') || '';
            let currentRoom = null;
            let currentDomain = localStorage.getItem('preferred_server') || DEFAULT_DOMAIN;
            let participantInterval = null;

            // DOM элементы
            const loginScreen = document.getElementById('login-screen');
            const dashboardScreen = document.getElementById('dashboard-screen');
            const videoScreen = document.getElementById('video-screen');
            const toastEl = document.getElementById('toast');
            const greetSpan = document.getElementById('greet');
            const roomInput = document.getElementById('room-name');
            const serverSelect = document.getElementById('server-select');
            const continueBtn = document.getElementById('continue-last-btn');
            const micBtn = document.getElementById('mic-toggle');
            const camBtn = document.getElementById('cam-toggle');
            const participantNumSpan = document.getElementById('participant-num');
            const videoUserNameSpan = document.getElementById('video-user-name');

            serverSelect.value = currentDomain;

            window.addEventListener('load', () => {
                const hash = window.location.hash.replace('#', '');
                if (userName) {
                    if (hash) {
                        startMeeting(hash);
                    } else {
                        showDashboard();
                    }
                } else {
                    loginScreen.classList.add('active');
                }

                const lastRoom = localStorage.getItem('last_room');
                if (lastRoom && userName) {
                    continueBtn.style.display = 'inline-flex';
                } else {
                    continueBtn.style.display = 'none';
                }
            });

            // ==================== УТИЛИТЫ ====================
            function showToast(text, duration = 3000) {
                toastEl.textContent = text;
                toastEl.classList.add('show');
                clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(() => {
                    toastEl.classList.remove('show');
                }, duration);
            }

            function sanitizeName(input) {
                return input.trim().replace(/[<>/\\]/g, '').substring(0, 30);
            }

            function sanitizeRoom(input) {
                return input.replace(/[^a-zA-Z0-9_-]/g, '').substring(0, 50);
            }

            function handleLogin() {
                const raw = document.getElementById('username').value;
                const clean = sanitizeName(raw);
                if (!clean) {
                    showToast('Введите имя', 2000);
                    return;
                }
                userName = clean;
                localStorage.setItem('user_name', userName);

                const hash = window.location.hash.replace('#', '');
                if (hash) {
                    startMeeting(hash);
                } else {
                    showDashboard();
                }
            }

            function showDashboard() {
                if (participantInterval) {
                    clearInterval(participantInterval);
                    participantInterval = null;
                }

                loginScreen.classList.remove('active');
                videoScreen.style.display = 'none';
                dashboardScreen.classList.add('active');
                greetSpan.innerText = `👋 Привет, ${userName}!`;

                history.pushState("", document.title, window.location.pathname);

                const lastRoom = localStorage.getItem('last_room');
                continueBtn.style.display = (lastRoom && userName) ? 'inline-flex' : 'none';
            }

            function createNamedRoom() {
                let name = roomInput.value;
                if (!name) {
                    showToast('Введите название комнаты', 2000);
                    return;
                }
                name = sanitizeRoom(name);
                if (!name) {
                    showToast('Только латиница, цифры, дефис', 2000);
                    return;
                }
                startMeeting(name);
            }

            function createRandomRoom() {
                const id = Math.random().toString(36).substring(2, 10);
                startMeeting(id);
            }

            function continueLastRoom() {
                const last = localStorage.getItem('last_room');
                if (last) startMeeting(last);
            }

            // ==================== ОСНОВНАЯ ФУНКЦИЯ ЗАПУСКА КОМНАТЫ ====================
            function startMeeting(roomID) {
                localStorage.setItem('last_room', roomID);
                currentRoom = roomID;

                currentDomain = serverSelect.value;
                localStorage.setItem('preferred_server', currentDomain);

                dashboardScreen.classList.remove('active');
                loginScreen.classList.remove('active');
                videoScreen.style.display = 'block';

                window.location.hash = roomID;

                // Отображаем имя пользователя на видео-экране
                videoUserNameSpan.textContent = userName;

                showToast(`Подключаемся к ${roomID}...`, 2000);

                if (api) {
                    api.dispose();
                    api = null;
                }

                const options = {
                    roomName: ROOM_PREFIX + roomID,
                    width: '100%',
                    height: '100%',
                    parentNode: document.querySelector('#video-container'),
                    userInfo: { displayName: userName },
                    configOverwrite: {
                        prejoinPageEnabled: false,
                        startWithAudioMuted: false,
                        startWithVideoMuted: false,
                        disableDeepLinking: true,
                        enableWelcomePage: false
                    },
                    interfaceConfigOverwrite: {
                        MOBILE_APP_PROMO: false,
                        SHOW_JITSI_WATERMARK: false,
                        SHOW_WATERMARK_FOR_GUESTS: false,
                        DEFAULT_BACKGROUND: '#111'
                    }
                };

                try {
                    api = new JitsiMeetExternalAPI(currentDomain, options);
                } catch (e) {
                    showToast('Ошибка подключения к серверу. Попробуйте другой.', 4000);
                    console.error(e);
                    showDashboard();
                    return;
                }

                api.addEventListeners({
                    readyToClose: () => leaveRoom(),
                    videoConferenceLeft: () => leaveRoom(),
                    videoConferenceJoined: () => {
                        showToast('Вы в комнате', 2000);
                        if (participantInterval) clearInterval(participantInterval);
                        participantInterval = setInterval(() => {
                            if (api) {
                                try {
                                    const participants = api.getNumberOfParticipants();
                                    participantNumSpan.innerText = participants + 1;
                                } catch (e) {}
                            }
                        }, 3000);
                        updateMediaButtons(); // первое обновление состояния
                    },
                    participantJoined: () => {
                        if (api) {
                            try {
                                const participants = api.getNumberOfParticipants();
                                participantNumSpan.innerText = participants + 1;
                            } catch (e) {}
                        }
                    },
                    participantLeft: () => {
                        if (api) {
                            try {
                                const participants = api.getNumberOfParticipants();
                                participantNumSpan.innerText = participants + 1;
                            } catch (e) {}
                        }
                    },
                    audioMuteStatusChanged: (muted) => {
                        micBtn.innerHTML = muted ? '🎤 Вкл.' : '🎤 Выкл.';
                    },
                    videoMuteStatusChanged: (muted) => {
                        camBtn.innerHTML = muted ? '📷 Вкл.' : '📷 Выкл.';
                    }
                });
            }

            // ==================== УПРАВЛЕНИЕ МИКРОФОНОМ/КАМЕРОЙ ====================
            function toggleMic() {
                if (!api) return;
                api.executeCommand('toggleAudio');
                // Состояние обновится через событие audioMuteStatusChanged
            }

            function toggleCam() {
                if (!api) return;
                api.executeCommand('toggleVideo');
                // Состояние обновится через событие videoMuteStatusChanged
            }

            function updateMediaButtons() {
                if (!api) return;
                // Попробуем получить текущее состояние (если API поддерживает)
                try {
                    api.isAudioMuted().then(muted => {
                        micBtn.innerHTML = muted ? '🎤 Вкл.' : '🎤 Выкл.';
                    }).catch(() => {});
                    api.isVideoMuted().then(muted => {
                        camBtn.innerHTML = muted ? '📷 Вкл.' : '📷 Выкл.';
                    }).catch(() => {});
                } catch (e) {}
            }

            // ==================== КОПИРОВАНИЕ ССЫЛКИ ====================
            function copyLink() {
                navigator.clipboard.writeText(window.location.href)
                    .then(() => showToast('🔗 Ссылка скопирована!', 2000))
                    .catch(() => showToast('Не удалось скопировать. Скопируйте вручную.', 3000));
            }

            // ==================== ВЫХОД ====================
            function leaveRoom() {
                if (api) {
                    api.dispose();
                    api = null;
                }
                if (participantInterval) {
                    clearInterval(participantInterval);
                    participantInterval = null;
                }
                showDashboard();
            }

            // Экспортируем функции
            window.handleLogin = handleLogin;
            window.createNamedRoom = createNamedRoom;
            window.createRandomRoom = createRandomRoom;
            window.continueLastRoom = continueLastRoom;
            window.leaveRoom = leaveRoom;
            window.copyLink = copyLink;
            window.toggleMic = toggleMic;
            window.toggleCam = toggleCam;
            window.startMeeting = startMeeting;
        })();
    </script>
</body>
</html>
