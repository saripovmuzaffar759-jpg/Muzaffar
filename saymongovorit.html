<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Саймон говорит (6 цветов)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ffc8;
            --secondary-color: #00aaff;
            --bg-color: #0d0d1a;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(45deg, var(--bg-color) 0%, #1a0d1a 100%);
            animation: background-glow 20s infinite alternate ease-in-out;
            text-align: center;
        }

        @keyframes background-glow {
            from {
                filter: hue-rotate(0deg);
            }
            to {
                filter: hue-rotate(360deg);
            }
        }

        h1 {
            font-size: 2.5em;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
            margin-bottom: 10px;
        }

        #level-display {
            font-size: 1.5em;
            color: var(--secondary-color);
            margin-bottom: 30px;
            text-shadow: 0 0 5px var(--secondary-color);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 350px;
            height: 250px;
        }

        .game-pad {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: transform 0.1s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .game-pad.red { background-color: #ff0000; }
        .game-pad.green { background-color: #00ff00; }
        .game-pad.blue { background-color: #0000ff; }
        .game-pad.yellow { background-color: #ffff00; }
        .game-pad.purple { background-color: #800080; }
        .game-pad.orange { background-color: #ffa500; }

        .game-pad:active {
            transform: scale(0.95);
        }

        .game-pad.active {
            box-shadow: 0 0 20px #fff;
            opacity: 1;
        }

        #start-btn {
            margin-top: 30px;
            padding: 15px 30px;
            background-color: var(--primary-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #start-btn:hover {
            background-color: #00e5b3;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            font-size: 1em;
            color: var(--secondary-color);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Саймон говорит</h1>
        <p id="level-display">Уровень: 0</p>
        <div class="game-board">
            <div class="game-pad red" data-color="red"></div>
            <div class="game-pad green" data-color="green"></div>
            <div class="game-pad blue" data-color="blue"></div>
            <div class="game-pad yellow" data-color="yellow"></div>
            <div class="game-pad purple" data-color="purple"></div>
            <div class="game-pad orange" data-color="orange"></div>
        </div>
        <button id="start-btn">Начать игру</button>
        <a href="index.html" class="back-link">&larr; Вернуться на главный портал</a>
    </div>

    <script>
        const pads = document.querySelectorAll('.game-pad');
        const startBtn = document.getElementById('start-btn');
        const levelDisplay = document.getElementById('level-display');
        
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(frequency) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(1, audioContext.currentTime + 0.01);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            
            setTimeout(() => {
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.2);
                oscillator.stop(audioContext.currentTime + 0.2);
            }, 200);
        }
        
        const frequencies = {
            red: 261.63,    // C4
            green: 329.63,  // E4
            blue: 392.00,   // G4
            yellow: 440.00,  // A4
            purple: 493.88,  // B4
            orange: 523.25   // C5
        };
        
        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let isPlayerTurn = false;
        
        function startGame() {
            isPlayerTurn = false;
            sequence = [];
            playerSequence = [];
            level = 0;
            levelDisplay.textContent = `Уровень: ${level}`;
            startBtn.disabled = true;
            nextRound();
        }
        
        function nextRound() {
            isPlayerTurn = false;
            playerSequence = [];
            level++;
            levelDisplay.textContent = `Уровень: ${level}`;
            
            const randomPad = pads[Math.floor(Math.random() * pads.length)];
            sequence.push(randomPad.getAttribute('data-color'));
            
            playSequence();
        }
        
        function playSequence() {
            let i = 0;
            const interval = setInterval(() => {
                if (i < sequence.length) {
                    const color = sequence[i];
                    const pad = document.querySelector(`.game-pad.${color}`);
                    
                    if (pad) {
                        pad.classList.add('active');
                        playSound(frequencies[color]);
                        setTimeout(() => {
                            pad.classList.remove('active');
                        }, 200);
                    }
                    i++;
                } else {
                    clearInterval(interval);
                    isPlayerTurn = true;
                }
            }, 500);
        }
        
        function handlePlayerClick(e) {
            if (!isPlayerTurn) return;
            
            const clickedColor = e.target.getAttribute('data-color');
            playerSequence.push(clickedColor);
            playSound(frequencies[clickedColor]);
            
            if (playerSequence[playerSequence.length - 1] !== sequence[playerSequence.length - 1]) {
                gameOver();
                return;
            }
            
            if (playerSequence.length === sequence.length) {
                setTimeout(() => {
                    nextRound();
                }, 1000);
            }
        }
        
        function gameOver() {
            isPlayerTurn = false;
            levelDisplay.textContent = `Игра окончена! Твой уровень: ${level}`;
            startBtn.disabled = false;
        }
        
        pads.forEach(pad => {
            pad.addEventListener('click', handlePlayerClick);
        });
        
        startBtn.addEventListener('click', startGame);
        
    </script>
</body>
</html>
