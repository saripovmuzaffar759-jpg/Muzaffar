<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUZAFFAR NEWS | Современный портал</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.01);
      --border-color: #e2e8f0;
      --category-tech: #3b82f6;
      --category-science: #8b5cf6;
      --category-world: #10b981;
      --category-business: #f59e0b;
    }

    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      --border-color: #334155;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.2s ease;
      line-height: 1.5;
      min-height: 100vh;
      position: relative;
    }

    /* Градиентный фон */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 100% 0%, rgba(139, 92, 246, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 0% 100%, rgba(245, 158, 11, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    /* Шапка с блюром */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(var(--bg-primary-rgb), 0.8);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 0;
    }

    /* Для поддержки rgba в теме */
    :root {
      --bg-primary-rgb: 248, 250, 252;
    }
    [data-theme="dark"] {
      --bg-primary-rgb: 15, 23, 42;
    }

    .header-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .nav-menu {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
      position: relative;
    }

    .nav-link:hover {
      color: var(--accent);
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.2s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .theme-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Hero секция */
    .hero {
      margin-bottom: 3rem;
      position: relative;
      border-radius: 2rem;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      padding: 3rem 2rem;
      color: white;
    }

    .hero h2 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.9;
      max-width: 600px;
    }

    /* Категории */
    .categories {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }

    .category-btn:hover,
    .category-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.3);
    }

    /* Сетка новостей */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 2rem;
    }

    /* Карточка новости */
    .news-card {
      background: var(--bg-secondary);
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
      border: 1px solid var(--border-color);
      backdrop-filter: blur(4px);
      animation: fadeInUp 0.6s ease-out;
      display: flex;
      flex-direction: column;
    }

    .news-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 35px -10px rgba(59, 130, 246, 0.2);
      border-color: var(--accent);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-image {
      height: 200px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      position: relative;
      overflow: hidden;
    }

    .card-image::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
      z-index: 1;
    }

    .card-image svg {
      width: 100%;
      height: 100%;
      opacity: 0.3;
      transform: scale(1.2);
    }

    .card-content {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-meta {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      flex-wrap: wrap;
    }

    .card-category {
      background: var(--category-world);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .card-category.tech { background: var(--category-tech); }
    .card-category.science { background: var(--category-science); }
    .card-category.world { background: var(--category-world); }
    .card-category.business { background: var(--category-business); }

    .card-date {
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      line-height: 1.4;
      color: var(--text-primary);
    }

    .card-description {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      line-height: 1.6;
      font-size: 0.95rem;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: gap 0.2s ease;
    }

    .read-more:hover {
      gap: 0.75rem;
    }

    .source-badge {
      color: var(--text-secondary);
      font-size: 0.85rem;
      background: var(--bg-primary);
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
    }

    /* Подвал */
    footer {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 2rem 0;
      margin-top: 4rem;
    }

    .footer-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .footer-links {
      display: flex;
      gap: 2rem;
    }

    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .footer-links a:hover {
      color: var(--accent);
    }

    /* Загрузка и ошибки */
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      background: var(--bg-secondary);
      border-radius: 1rem;
      border: 1px solid #ef4444;
    }

    /* Адаптивность */
    @media (max-width: 968px) {
      .news-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .hero h2 {
        font-size: 2.5rem;
      }
    }

    @media (max-width: 640px) {
      .news-grid {
        grid-template-columns: 1fr;
      }
      
      .header-content {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }
      
      .nav-menu {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
      }
      
      .hero h2 {
        font-size: 2rem;
      }
      
      .footer-content {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
      
      .footer-links {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">MUZAFFAR NEWS</div>
      <nav class="nav-menu">
        <a href="#" class="nav-link">Главная</a>
        <a href="#" class="nav-link">Категории</a>
        <a href="#" class="nav-link">Популярное</a>
        <button class="theme-toggle" onclick="toggleTheme()">
          <span>🌙</span> Тема
        </button>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <h2>Последние новости России и мира</h2>
      <p>Актуальные события, эксклюзивные репортажи и аналитика от лучших мировых изданий</p>
    </section>

    <div class="categories">
      <button class="category-btn active" data-category="all">Все</button>
      <button class="category-btn" data-category="world">Мир</button>
      <button class="category-btn" data-category="tech">Технологии</button>
      <button class="category-btn" data-category="science">Наука</button>
      <button class="category-btn" data-category="business">Бизнес</button>
    </div>

    <div id="news-grid" class="news-grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>Загружаем свежие новости...</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>© 2026 MUZAFFAR NEWS. Все права защищены.</p>
      <div class="footer-links">
        <a href="#">О проекте</a>
        <a href="#">Контакты</a>
        <a href="#">Реклама</a>
      </div>
    </div>
  </footer>

  <script>
    // Переключение темы
    function toggleTheme() {
      const body = document.body;
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    // Загружаем сохраненную тему
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      document.body.setAttribute('data-theme', savedTheme);
    }

    // Категории для демо (можно рандомно распределять новости)
    const categories = ['world', 'tech', 'science', 'business'];
    
    function getRandomCategory() {
      return categories[Math.floor(Math.random() * categories.length)];
    }

    // Загрузка новостей через RSS2JSON прокси
    async function fetchNews() {
      const grid = document.getElementById('news-grid');
      
      try {
        // Используем RSS2JSON как прокси для Google News RSS
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=новости&hl=ru&gl=RU&ceid=RU:ru');
        const data = await response.json();
        
        if (data.status !== 'ok') {
          throw new Error('Ошибка загрузки новостей');
        }

        // Ограничиваем до 12 новостей и добавляем категории
        const articles = data.items.slice(0, 12).map(item => ({
          ...item,
          category: getRandomCategory()
        }));

        displayNews(articles);
      } catch (error) {
        console.error('Ошибка:', error);
        grid.innerHTML = `
          <div class="error-message">
            <h3>😕 Не удалось загрузить новости</h3>
            <p>Попробуйте обновить страницу или зайдите позже</p>
            <p style="margin-top: 1rem; font-size: 0.9rem;">${error.message}</p>
          </div>
        `;
      }
    }

    // Отображение новостей
    function displayNews(articles) {
      const grid = document.getElementById('news-grid');
      
      const newsHtml = articles.map((article, index) => {
        // Очищаем заголовок от лишних символов
        const title = article.title
          .replace(/<!\[CDATA\[|\]\]>/g, '')
          .replace(/&quot;/g, '"')
          .replace(/&amp;/g, '&');
        
        // Очищаем описание
        let description = article.description || 'Новость без описания';
        description = description
          .replace(/<!\[CDATA\[|\]\]>/g, '')
          .replace(/<[^>]*>/g, '')
          .replace(/&quot;/g, '"')
          .replace(/&amp;/g, '&')
          .substring(0, 150) + '...';
        
        // Форматируем дату
        const pubDate = article.pubDate ? new Date(article.pubDate).toLocaleDateString('ru-RU', {
          day: 'numeric',
          month: 'long',
          hour: '2-digit',
          minute: '2-digit'
        }) : 'Дата неизвестна';
        
        // Анимация с задержкой
        const delay = index * 0.1;
        
        return `
          <div class="news-card" style="animation-delay: ${delay}s">
            <div class="card-image">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4H20V20H4V4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 8H16V12H8V8Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 14H16V16H8V14Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="card-content">
              <div class="card-meta">
                <span class="card-category ${article.category}">${article.category}</span>
                <span class="card-date">📅 ${pubDate}</span>
              </div>
              <h3 class="card-title">${title}</h3>
              <p class="card-description">${description}</p>
              <div class="card-footer">
                <a href="${article.link}" target="_blank" class="read-more">
                  Читать далее <span>→</span>
                </a>
                <span class="source-badge">Google News</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      grid.innerHTML = newsHtml;
      
      // Добавляем обработчики для категорий
      setupCategoryFilters(articles);
    }

    // Фильтрация по категориям
    function setupCategoryFilters(articles) {
      const categoryBtns = document.querySelectorAll('.category-btn');
      
      categoryBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          // Убираем активный класс у всех
          categoryBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          const category = btn.dataset.category;
          const cards = document.querySelectorAll('.news-card');
          
          cards.forEach(card => {
            if (category === 'all') {
              card.style.display = 'flex';
            } else {
              const cardCategory = card.querySelector('.card-category')?.textContent;
              if (cardCategory === category) {
                card.style.display = 'flex';
              } else {
                card.style.display = 'none';
              }
            }
          });
        });
      });
    }

    // Загружаем новости при старте
    fetchNews();
    
    // Обновляем каждые 10 минут
    setInterval(fetchNews, 600000);
  </script>
</body>
</html>
