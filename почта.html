<!DOCTYPE html>
<html>
<head>
    <title>MuzaffarMail - Твоя почта с любым доменом</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
        }

        /* Анимации */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Основные стили */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Экран входа */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: slideIn 0.5s ease;
        }

        .auth-card h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .auth-card .subtitle {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }

        .domain-builder {
            background: linear-gradient(135deg, #f5f7fb 0%, #e9ecef 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .domain-builder h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .domain-input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .domain-input-group input, .domain-input-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .domain-input-group input:focus, .domain-input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .domain-preview {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            word-break: break-all;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            transition: transform 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
        }

        .link-btn {
            background: none;
            color: #667eea;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            margin: 10px 0;
        }

        /* Главный интерфейс почты */
        .main-layout {
            display: flex;
            gap: 20px;
            min-height: calc(100vh - 40px);
        }

        /* Боковая панель */
        .sidebar {
            width: 280px;
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .sidebar-logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }

        .user-info-sidebar {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 24px;
            color: white;
        }

        .user-email-sidebar {
            font-size: 14px;
            color: #666;
            word-break: break-all;
        }

        .nav-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #555;
        }

        .nav-item:hover {
            background: #f0f2f5;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            color: #667eea;
            font-weight: bold;
        }

        /* Основной контент */
        .main-content {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 25px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* Письма */
        .email-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .email-item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .email-item:hover {
            background: #f8f9fa;
            transform: translateX(5px);
        }

        .email-item.unread {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
        }

        .email-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .email-from {
            font-weight: bold;
            color: #333;
        }

        .email-date {
            color: #999;
            font-size: 12px;
        }

        .email-subject {
            font-weight: 500;
            margin-bottom: 5px;
        }

        .email-preview {
            color: #666;
            font-size: 14px;
        }

        /* Форма отправки */
        .compose-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .compose-form input, .compose-form textarea, .compose-form select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }

        .compose-form textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* Чаты */
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-item {
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .chat-item:hover {
            background: #e9ecef;
        }

        .chat-item.unread {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .chat-name {
            font-weight: bold;
            color: #333;
        }

        .chat-last-message {
            color: #666;
            font-size: 14px;
        }

        .chat-window {
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .message-bubble {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message-bubble.sent {
            align-items: flex-end;
        }

        .message-bubble.received {
            align-items: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            margin: 5px 0;
        }

        .sent .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .received .bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin: 0 10px;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
        }

        /* Коды */
        .codes-grid {
            display: grid;
            gap: 15px;
        }

        .code-card {
            background: linear-gradient(135deg, #f8f9fa, white);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        .code-info h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .code-info p {
            color: #999;
            font-size: 12px;
        }

        .code-number {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            color: #667eea;
            letter-spacing: 3px;
        }

        .copy-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .notification.success {
            background: #10b981;
        }

        .notification.error {
            background: #ef4444;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .auth-card {
                padding: 30px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Экран входа -->
        <div id="authScreen" class="auth-wrapper">
            <div class="auth-card">
                <h1>📧 MuzaffarMail</h1>
                <p class="subtitle">Твоя почта с любым доменом</p>
                
                <div class="domain-builder">
                    <h3>🔨 Создай свой email</h3>
                    <div class="domain-input-group">
                        <input type="text" id="buildName" placeholder="имя" value="muzaffar" style="width: 120px;">
                        <span>@</span>
                        <input type="text" id="buildDomain" placeholder="домен" value="muzaffarmail" style="width: 150px;">
                        <span>.</span>
                        <select id="buildTld" style="width: 80px;">
                            <option>ru</option>
                            <option selected>com</option>
                            <option>net</option>
                            <option>org</option>
                            <option>me</option>
                            <option>io</option>
                        </select>
                    </div>
                    <div class="domain-preview" id="emailPreview">muzaffar@muzaffarmail.com</div>
                    <button class="auth-btn" onclick="useCustomEmail()" style="margin-top: 15px;">✅ Использовать этот email</button>
                </div>

                <input type="email" id="loginEmail" class="auth-input" placeholder="Твой email">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль (минимум 3 символа)">
                <button class="auth-btn" onclick="handleLogin()">🚀 Войти в MuzaffarMail</button>
                <div id="authMessage" style="text-align: center; margin-top: 15px; color: #ef4444;"></div>
            </div>
        </div>

        <!-- Главный интерфейс -->
        <div id="mainScreen" class="container hidden">
            <div class="main-layout">
                <!-- Боковая панель -->
                <div class="sidebar">
                    <div class="sidebar-logo">📧 MuzaffarMail</div>
                    <div class="user-info-sidebar">
                        <div class="user-avatar" id="userAvatar">📧</div>
                        <div class="user-email-sidebar" id="sidebarUserEmail"></div>
                    </div>
                    <div class="nav-item active" onclick="switchSection('inbox')">
                        <span>📥</span> Входящие
                        <span id="unreadCount" style="margin-left: auto; background: #667eea; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px;">0</span>
                    </div>
                    <div class="nav-item" onclick="switchSection('compose')">
                        <span>✏️</span> Написать
                    </div>
                    <div class="nav-item" onclick="switchSection('chats')">
                        <span>💬</span> Чаты
                        <span id="chatUnreadCount" style="margin-left: auto; background: #667eea; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px;">0</span>
                    </div>
                    <div class="nav-item" onclick="switchSection('codes')">
                        <span>🔐</span> Коды
                    </div>
                    <div class="nav-item" onclick="switchSection('settings')">
                        <span>⚙️</span> Настройки
                    </div>
                    <div class="nav-item" onclick="logout()">
                        <span>🚪</span> Выйти
                    </div>
                </div>

                <!-- Основной контент -->
                <div class="main-content">
                    <!-- Входящие -->
                    <div id="inboxSection" class="tab-content active">
                        <h2 style="margin-bottom: 20px;">📥 Входящие</h2>
                        <div id="emailsList" class="email-list"></div>
                    </div>

                    <!-- Написать письмо -->
                    <div id="composeSection" class="tab-content">
                        <h2 style="margin-bottom: 20px;">✏️ Новое письмо</h2>
                        <div class="compose-form">
                            <input type="email" id="composeTo" placeholder="Кому *">
                            <input type="text" id="composeSubject" placeholder="Тема *">
                            <textarea id="composeMessage" placeholder="Твоё сообщение..."></textarea>
                            <button class="auth-btn" onclick="sendRealEmail()">📨 Отправить письмо</button>
                            <div id="composeMessageStatus"></div>
                        </div>
                    </div>

                    <!-- Чаты -->
                    <div id="chatsSection" class="tab-content">
                        <h2 style="margin-bottom: 20px;">💬 Чаты</h2>
                        <div id="chatsView">
                            <div class="chat-list" id="chatList"></div>
                        </div>
                    </div>

                    <!-- Коды -->
                    <div id="codesSection" class="tab-content">
                        <h2 style="margin-bottom: 20px;">🔐 Коды подтверждения</h2>
                        <button class="auth-btn" onclick="generateNewCode()" style="margin-bottom: 20px;">➕ Сгенерировать новый код</button>
                        <div id="codesList" class="codes-grid"></div>
                    </div>

                    <!-- Настройки -->
                    <div id="settingsSection" class="tab-content">
                        <h2 style="margin-bottom: 20px;">⚙️ Настройки</h2>
                        <div class="domain-builder" style="margin-bottom: 20px;">
                            <h3>Изменить email</h3>
                            <div class="domain-input-group">
                                <input type="text" id="settingsName" placeholder="имя">
                                <span>@</span>
                                <input type="text" id="settingsDomain" placeholder="домен">
                                <span>.</span>
                                <select id="settingsTld">
                                    <option>ru</option>
                                    <option>com</option>
                                    <option>net</option>
                                    <option>org</option>
                                </select>
                            </div>
                            <button class="auth-btn" onclick="updateEmail()" style="margin-top: 15px;">Обновить email</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification hidden"></div>

    <script>
        // Данные
        let currentUser = null;
        let emails = [];
        let chats = [];
        let verificationCodes = [];
        let currentChat = null;

        // Сохранение в localStorage
        function saveData() {
            if (currentUser) {
                localStorage.setItem(`muzaffar_${currentUser.email}_emails`, JSON.stringify(emails));
                localStorage.setItem(`muzaffar_${currentUser.email}_chats`, JSON.stringify(chats));
                localStorage.setItem(`muzaffar_${currentUser.email}_codes`, JSON.stringify(verificationCodes));
            }
        }

        function loadData() {
            if (currentUser) {
                const savedEmails = localStorage.getItem(`muzaffar_${currentUser.email}_emails`);
                const savedChats = localStorage.getItem(`muzaffar_${currentUser.email}_chats`);
                const savedCodes = localStorage.getItem(`muzaffar_${currentUser.email}_codes`);
                
                emails = savedEmails ? JSON.parse(savedEmails) : [];
                chats = savedChats ? JSON.parse(savedChats) : [];
                verificationCodes = savedCodes ? JSON.parse(savedCodes) : [];
                
                // Добавляем демо-письма если пусто
                if (emails.length === 0) {
                    emails = [
                        { id: 1, from: "google@verify.com", subject: "Код подтверждения Google", message: "Ваш код: 584392", date: new Date(Date.now() - 3600000), read: false },
                        { id: 2, from: "instagram@mail.com", subject: "Код для входа в Instagram", message: "Код: 762145", date: new Date(Date.now() - 7200000), read: false },
                        { id: 3, from: "github@noreply.com", subject: "Подтверждение email", message: "Ваш код подтверждения: 391784", date: new Date(Date.now() - 86400000), read: true }
                    ];
                    saveData();
                }
                
                if (chats.length === 0) {
                    chats = [
                        { id: 1, name: "Анна", email: "anna@example.com", messages: [], unread: 0 },
                        { id: 2, name: "Дмитрий", email: "dmitry@example.com", messages: [], unread: 0 }
                    ];
                    saveData();
                }
                
                if (verificationCodes.length === 0) {
                    verificationCodes = [
                        { site: "Google", code: "584392", time: new Date(Date.now() - 3600000), timeText: "1 час назад" },
                        { site: "Instagram", code: "762145", time: new Date(Date.now() - 7200000), timeText: "2 часа назад" }
                    ];
                    saveData();
                }
            }
        }

        // Обновление превью
        function updatePreview() {
            const name = document.getElementById('buildName')?.value || 'name';
            const domain = document.getElementById('buildDomain')?.value || 'domain';
            const tld = document.getElementById('buildTld')?.value;
            const preview = document.getElementById('emailPreview');
            if (preview) preview.textContent = `${name}@${domain}.${tld}`;
        }

        document.getElementById('buildName')?.addEventListener('input', updatePreview);
        document.getElementById('buildDomain')?.addEventListener('input', updatePreview);
        document.getElementById('buildTld')?.addEventListener('change', updatePreview);
        if (document.getElementById('emailPreview')) updatePreview();

        function useCustomEmail() {
            const email = document.getElementById('emailPreview').textContent;
            document.getElementById('loginEmail').value = email;
            showNotification(`✅ Email ${email} установлен!`, 'success');
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                document.getElementById('authMessage').textContent = '❌ Заполни все поля';
                return;
            }

            if (password.length < 3) {
                document.getElementById('authMessage').textContent = '❌ Пароль должен быть минимум 3 символа';
                return;
            }

            currentUser = { email: email, password: password };
            loadData();
            
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('sidebarUserEmail').textContent = email;
            document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase();
            
            renderEmails();
            renderChats();
            renderCodes();
            updateUnreadCounts();
        }

        function logout() {
            currentUser = null;
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
            showNotification('Вы вышли из аккаунта', 'success');
        }

        function switchSection(section) {
            // Скрыть все
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            // Показать выбранное
            document.getElementById(`${section}Section`).classList.add('active');
            event.target.closest('.nav-item').classList.add('active');
            
            if (section === 'inbox') renderEmails();
            if (section === 'chats') renderChats();
            if (section === 'codes') renderCodes();
        }

        function renderEmails() {
            const container = document.getElementById('emailsList');
            if (!container) return;
            
            if (emails.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">📭 Писем пока нет</div>';
                return;
            }
            
            container.innerHTML = emails.map(email => `
                <div class="email-item ${!email.read ? 'unread' : ''}" onclick="openEmail(${email.id})">
                    <div class="email-header">
                        <span class="email-from">📧 ${email.from}</span>
                        <span class="email-date">${formatDate(email.date)}</span>
                    </div>
                    <div class="email-subject">${email.subject}</div>
                    <div class="email-preview">${email.message.substring(0, 80)}...</div>
                </div>
            `).join('');
        }

        function openEmail(id) {
            const email = emails.find(e => e.id === id);
            if (email) {
                email.read = true;
                saveData();
                renderEmails();
                updateUnreadCounts();
                
                alert(`📧 От: ${email.from}\n📝 Тема: ${email.subject}\n\n💬 Сообщение:\n${email.message}`);
            }
        }

        function renderChats() {
            const container = document.getElementById('chatList');
            if (!container) return;
            
            if (chats.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">💬 Нет чатов</div>';
                return;
            }
            
            container.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.unread > 0 ? 'unread' : ''}" onclick="openChat(${chat.id})">
                    <div class="chat-header">
                        <span class="chat-name">👤 ${chat.name}</span>
                        ${chat.unread > 0 ? `<span style="background: #667eea; color: white; padding: 2px 8px; border-radius: 10px;">${chat.unread}</span>` : ''}
                    </div>
                    <div class="chat-last-message">${chat.messages.length > 0 ? chat.messages[chat.messages.length-1].text : 'Нет сообщений'}</div>
                </div>
            `).join('');
        }

        function openChat(chatId) {
            currentChat = chats.find(c => c.id === chatId);
            if (!currentChat) return;
            
            // Сброс непрочитанных
            currentChat.unread = 0;
            saveData();
            renderChats();
            updateUnreadCounts();
            
            // Показываем окно чата
            const messagesHtml = currentChat.messages.map(msg => `
                <div class="message-bubble ${msg.sender === currentUser.email ? 'sent' : 'received'}">
                    <div class="bubble">${msg.text}</div>
                    <div class="message-time">${formatTime(msg.time)}</div>
                </div>
            `).join('');
            
            const response = prompt(`💬 Чат с ${currentChat.name}\n\n${messagesHtml}\n\nНапиши сообщение:`);
            if (response && response.trim()) {
                currentChat.messages.push({
                    sender: currentUser.email,
                    text: response,
                    time: new Date()
                });
                saveData();
                
                // Имитация ответа через 2 секунды
                setTimeout(() => {
                    const autoReplies = ["👍", "Спасибо!", "Понял", "Окей", "Хорошо"];
                    currentChat.messages.push({
                        sender: currentChat.email,
                        text: autoReplies[Math.floor(Math.random() * autoReplies.length)],
                        time: new Date()
                    });
                    saveData();
                    showNotification(`Новое сообщение от ${currentChat.name}`, 'success');
                    if (document.getElementById('chatsSection').classList.contains('active')) {
                        renderChats();
                    }
                    updateUnreadCounts();
                }, 2000);
                
                showNotification('Сообщение отправлено!', 'success');
            }
        }

        function renderCodes() {
            const container = document.getElementById('codesList');
            if (!container) return;
            
            if (verificationCodes.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">🔐 Нет кодов</div>';
                return;
            }
            
            container.innerHTML = verificationCodes.map(code => `
                <div class="code-card">
                    <div class="code-info">
                        <h4>${code.site}</h4>
                        <p>${code.timeText}</p>
                    </div>
                    <div class="code-number">${code.code}</div>
                    <button class="copy-btn" onclick="copyCode('${code.code}')">📋 Копировать</button>
                </div>
            `).join('');
        }

        function generateNewCode() {
            const sites = ['Google', 'Instagram', 'Telegram', 'WhatsApp', 'GitHub', 'X.com', 'Facebook', 'Apple ID', 'Microsoft', 'Amazon', 'VK', 'TikTok'];
            const randomSite = sites[Math.floor(Math.random() * sites.length)];
            const newCode = {
                site: randomSite,
                code: Math.floor(100000 + Math.random() * 900000).toString(),
                time: new Date(),
                timeText: 'Только что'
            };
            verificationCodes.unshift(newCode);
            saveData();
            renderCodes();
            showNotification(`🔐 Новый код для ${randomSite}: ${newCode.code}`, 'success');
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code);
            showNotification('✅ Код скопирован!', 'success');
        }

        function sendRealEmail() {
            const to = document.getElementById('composeTo').value;
            const subject = document.getElementById('composeSubject').value;
            const message = document.getElementById('composeMessage').value;
            
            if (!to || !subject || !message) {
                showNotification('❌ Заполни все поля', 'error');
                return;
            }
            
            // Добавляем в отправленные
            emails.unshift({
                id: Date.now(),
                from: currentUser.email,
                to: to,
                subject: subject,
                message: message,
                date: new Date(),
                read: false
            });
            saveData();
            renderEmails();
            
            // Реальная отправка через FormSubmit
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://formsubmit.co/ms8096181@gmail.com';
            
            const content = `От: ${currentUser.email}\nКому: ${to}\n\n${message}`;
            
            const fields = {
                '_subject': `📨 ${subject} (от ${currentUser.email})`,
                'message': content,
                '_captcha': 'false',
                '_replyto': currentUser.email,
                '_cc': to
            };
            
            for (const [name, value] of Object.entries(fields)) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = name;
                input.value = value;
                form.appendChild(input);
            }
            
            document.body.appendChild(form);
            form.submit();
            setTimeout(() => document.body.removeChild(form), 1000);
            
            document.getElementById('composeTo').value = '';
            document.getElementById('composeSubject').value = '';
            document.getElementById('composeMessage').value = '';
            showNotification(`✅ Письмо отправлено на ${to}!`, 'success');
        }

        function updateEmail() {
            const name = document.getElementById('settingsName').value;
            const domain = document.getElementById('settingsDomain').value;
            const tld = document.getElementById('settingsTld').value;
            
            if (name && domain) {
                const newEmail = `${name}@${domain}.${tld}`;
                currentUser.email = newEmail;
                document.getElementById('sidebarUserEmail').textContent = newEmail;
                document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
                showNotification(`✅ Email изменён на ${newEmail}`, 'success');
                saveData();
            }
        }

        function updateUnreadCounts() {
            const unreadEmails = emails.filter(e => !e.read).length;
            const unreadChats = chats.reduce((sum, c) => sum + (c.unread || 0), 0);
            
            const unreadSpan = document.getElementById('unreadCount');
            const chatUnreadSpan = document.getElementById('chatUnreadCount');
            if (unreadSpan) unreadSpan.textContent = unreadEmails;
            if (chatUnreadSpan) chatUnreadSpan.textContent = unreadChats;
        }

        function formatDate(date) {
            const d = new Date(date);
            const now = new Date();
            if (d.toDateString() === now.toDateString()) {
                return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            }
            return d.toLocaleDateString('ru-RU');
        }

        function formatTime(date) {
            return new Date(date).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function showNotification(text, type) {
            const notif = document.getElementById('notification');
            notif.textContent = text;
            notif.className = `notification ${type}`;
            notif.classList.remove('hidden');
            setTimeout(() => notif.classList.add('hidden'), 3000);
        }

        // Инициализация настроек
        setInterval(() => {
            if (currentUser) updateUnreadCounts();
        }, 1000);
    </script>
</body>
</html>
