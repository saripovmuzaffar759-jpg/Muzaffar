<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MUZAFFARGRAM | ULTRA</title>
    <!-- Подключаем библиотеку версии 2.0 (стабильная для браузеров) -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #0f1721; color: white; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #17212b; width: 320px; padding: 35px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #2b3744; }
        h2 { color: #5288c1; margin-bottom: 20px; font-weight: 500; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #242f3d; background: #242f3d; border-radius: 8px; color: white; box-sizing: border-box; outline: none; font-size: 16px; }
        input:focus { border-color: #5288c1; }
        button { width: 100%; padding: 12px; background: #5288c1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        button:hover { background: #6199d1; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #log { margin-top: 15px; font-size: 12px; color: #7f91a4; min-height: 1.5em; }
        .hidden { display: none; }
        #chats { text-align: left; margin-top: 15px; font-size: 13px; max-height: 150px; overflow-y: auto; color: #aeb7c2; }
    </style>
</head>
<body>

<div class="box">
    <h2>MUZAFFARGRAM</h2>
    <div id="step1">
        <input type="text" id="phone" placeholder="+992XXXXXXXXX" value="+992">
        <button id="btn1" onclick="startAuth()">ПОЛУЧИТЬ КОД</button>
    </div>
    <div id="step2" class="hidden">
        <input type="text" id="code" placeholder="Код из Telegram">
        <button id="btn2" onclick="confirmCode()">ВОЙТИ</button>
    </div>
    <div id="step3" class="hidden">
        <h3 style="color: #4CAF50;">ВХОД ВЫПОЛНЕН!</h3>
        <div id="chats"></div>
    </div>
    <div id="log">Загрузка системы...</div>
</div>

<script>
    const apiId = 39447226;
    const apiHash = "6bc48eb39c020be4d3cbbdda2cae5acf";
    let client;

    // Инициализация при загрузке страницы
    (async () => {
        try {
            const { TelegramClient } = window.telegram;
            const { StringSession } = window.telegram.sessions;
            client = new TelegramClient(new StringSession(""), apiId, apiHash, { 
                connectionRetries: 5,
                useWSS: true // Критично для работы в браузере через HTTPS
            });
            document.getElementById('log').innerText = "Система готова к работе";
        } catch (e) {
            document.getElementById('log').innerText = "Ошибка: " + e.message;
        }
    })();

    async function startAuth() {
        const phone = document.getElementById('phone').value;
        const log = document.getElementById('log');
        const btn = document.getElementById('btn1');
        
        try {
            btn.disabled = true;
            log.innerText = "Подключение...";
            await client.connect();
            
            log.innerText = "Запрос кода...";
            await client.sendCode({ apiId, apiHash }, phone);
            
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            log.innerText = "Код отправлен в ваш аккаунт";
        } catch (e) {
            btn.disabled = false;
            log.innerText = "Ошибка: " + e.message;
            console.error(e);
        }
    }

    async function confirmCode() {
        const code = document.getElementById('code').value;
        const phone = document.getElementById('phone').value;
        const log = document.getElementById('log');
        
        try {
            log.innerText = "Проверка кода...";
            await client.signIn({
                phoneNumber: phone,
                phoneCode: async () => code
            });
            
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            log.innerText = "Загрузка ваших чатов...";
            
            const dialogs = await client.getDialogs({ limit: 10 });
            const chatDiv = document.getElementById('chats');
            chatDiv.innerHTML = dialogs.map(d => `<div>• ${d.title || 'Личный чат'}</div>`).join('');
            log.innerText = "Добро пожаловать!";
        } catch (e) {
            log.innerText = "Ошибка входа: " + e.message;
        }
    }
</script>

</body>
</html>
