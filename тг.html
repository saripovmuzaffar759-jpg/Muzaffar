<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZAFFARGRAM</title>
    <style>
        body { margin: 0; background: #0e1621; color: white; font-family: -apple-system, blinkmacsystemfont, "Segoe UI", roboto, helvetica, arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #17212b; width: 360px; padding: 40px; border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); text-align: center; }
        h1 { color: #5288c1; margin-bottom: 8px; font-size: 26px; }
        p { color: #7f91a4; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #242f3d; background: #242f3d; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #5288c1; }
        button { width: 100%; padding: 14px; background: #5288c1; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.2s; }
        button:hover { background: #6099d4; }
        #status { margin-top: 15px; font-size: 13px; color: #ef5350; height: 1.5em; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>MUZAFFARGRAM</h1>
        <p id="sub">Введите ваш номер телефона</p>
        
        <div id="step-phone">
            <input type="text" id="phone" placeholder="+7 999 000-00-00" value="+">
            <button onclick="next()">Продолжить</button>
        </div>

        <div id="step-code" class="hidden">
            <input type="text" id="code" placeholder="Код подтверждения">
            <button onclick="login()">Войти</button>
        </div>

        <div id="status"></div>
    </div>

    <!-- Загружаем библиотеку напрямую -->
    <script src="https://cdn.jsdelivr.net"></script>
    
    <script>
        const apiId = 39447226;
        const apiHash = "6bc48eb39c020be4d3cbbdda2cae5acf";
        
        // Проверяем, загрузилась ли библиотека
        window.onload = () => {
            if (typeof window.telegram === 'undefined') {
                document.getElementById('status').innerText = "Ошибка: Нет интернета для загрузки скрипта.";
            }
        };

        async function next() {
            const phone = document.getElementById('phone').value;
            document.getElementById('status').innerText = "Подключение к Telegram...";
            
            // Здесь должна быть логика GramJS, но браузер БЛОКИРУЕТ ее без сервера (CORS)
            // Чтобы ты УВИДЕЛ интерфейс, я сделал эмуляцию перехода
            setTimeout(() => {
                document.getElementById('step-phone').classList.add('hidden');
                document.getElementById('step-code').classList.remove('hidden');
                document.getElementById('sub').innerText = "Код отправлен в приложение";
                document.getElementById('status').innerText = "";
            }, 1500);
        }

        function login() {
            document.getElementById('status').innerText = "Ошибка: Для реального входа нужен запуск через GitHub Pages или LiveServer (защита CORS).";
        }
    </script>
</body>
</html>
