<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MUZAFFARGRAM | LIVE</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #17212b; width: 350px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #5288c1; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #242f3d; background: #242f3d; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5288c1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; font-size: 13px; color: #ef5350; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>MUZAFFARGRAM</h1>
    <p id="sub">Введите номер телефона</p>
    
    <div id="step-phone">
        <input type="text" id="phone" placeholder="+79990000000" value="+">
        <button onclick="connectAndSend()">Получить код</button>
    </div>

    <div id="step-code" class="hidden">
        <input type="text" id="code" placeholder="Код из Telegram">
        <button onclick="finishLogin()">Войти</button>
    </div>

    <div id="step-final" class="hidden">
        <h2 style="color: #4CAF50;">Вы вошли!</h2>
        <p>Проверьте консоль (F12) — там ваша сессия.</p>
    </div>

    <div id="status"></div>
</div>

<script>
    const { TelegramClient } = window.telegram;
    const { StringSession } = window.telegram.sessions;

    const apiId = 39447226;
    const apiHash = "6bc48eb39c020be4d3cbbdda2cae5acf";
    const session = new StringSession(""); // Пустая сессия для начала

    const client = new TelegramClient(session, apiId, apiHash, { connectionRetries: 5 });

    async function connectAndSend() {
        const phone = document.getElementById('phone').value;
        const status = document.getElementById('status');
        status.style.color = "#5288c1";
        status.innerText = "Связь с Telegram...";

        try {
            await client.connect();
            await client.sendCode({ apiId, apiHash }, phone);
            
            document.getElementById('step-phone').classList.add('hidden');
            document.getElementById('step-code').classList.remove('hidden');
            document.getElementById('sub').innerText = "Введите код";
            status.innerText = "";
        } catch (e) {
            status.style.color = "#ef5350";
            status.innerText = "Ошибка: " + e.message;
        }
    }

    async function finishLogin() {
        const code = document.getElementById('code').value;
        const phone = document.getElementById('phone').value;
        const status = document.getElementById('status');

        try {
            await client.signIn({
                phoneNumber: phone,
                phoneCode: async () => code,
            });

            document.getElementById('step-code').classList.add('hidden');
            document.getElementById('step-final').classList.remove('hidden');
            status.innerText = "Авторизация успешна!";
            console.log("Твоя сессия (сохрани её):", client.session.save());
        } catch (e) {
            status.innerText = "Ошибка кода: " + e.message;
        }
    }
</script>
</body>
</html>
