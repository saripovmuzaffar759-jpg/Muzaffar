<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUZAFFAR Taxi - Клиент</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mapbox-polyline/1.1.1/polyline.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        jura: '#2ecc71',
                        juraDark: '#27ae60',
                        dark: '#1a1a1a',
                        gold: '#FFD700',
                        purple: '#8B5CF6'
                    }
                }
            }
        }
    </script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100dvh;
            overflow: hidden;
        }
        
        .dark body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        #map {
            position: absolute;
            inset: 0;
            z-index: 0;
            border-radius: 24px;
            margin: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .bottom-panel {
            position: absolute;
            bottom: 16px;
            left: 12px;
            right: 12px;
            max-height: 50%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            z-index: 20;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .dark .bottom-panel {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-color: rgba(255,255,255,0.1);
        }
        
        .tariff-card {
            transition: all 0.3s;
            border: 2px solid transparent;
            min-width: 110px;
            background: white;
            border-radius: 24px;
            padding: 16px 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .dark .tariff-card {
            background: #1e293b;
        }
        
        .tariff-card.selected {
            border-color: #8B5CF6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.4);
        }
        
        .tariff-card.selected .tariff-name,
        .tariff-card.selected .tariff-price {
            color: white;
        }
        
        .driver-icon {
            background: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #8B5CF6;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .client-icon {
            background: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #FFD700;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }
        
        .chat-container {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transform: translateY(120%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        .dark .chat-container {
            background: #1e293b;
        }
        
        .chat-container.visible {
            transform: translateY(0);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8fafc;
        }
        
        .dark .chat-messages {
            background: #0f172a;
        }
        
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 24px;
            position: relative;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .message-received {
            background: white;
            color: #1f2937;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .dark .message-received {
            background: #334155;
            color: #f3f4f6;
        }
        
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .glass-button {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        
        .glass-button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .route-point {
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        
        .route-point.start {
            border-left-color: #1a1a1a;
        }
        
        .route-point.end {
            border-left-color: #2ecc71;
        }
        
        .route-point.middle {
            border-left-color: #3498db;
        }
    </style>
</head>
<body class="relative">
    <!-- Аутентификация с новым дизайном -->
    <div id="authScreen" class="absolute inset-0 bg-gradient-to-br from-purple-600 to-blue-500 dark:from-purple-900 dark:to-blue-900 z-[3000] flex flex-col items-center justify-center p-6">

            <button onclick="login()" class="w-full bg-gold hover:bg-yellow-400 text-purple-900 font-bold py-4 rounded-2xl shadow-lg shadow-gold/30 text-lg transition-all transform hover:scale-105">

    <!-- Регистрация с обновленным дизайном -->
    <div id="registerScreen" class="hidden absolute inset-0 bg-gradient-to-br from-purple-600 to-blue-500 dark:from-purple-900 dark:to-blue-900 z-[3000] flex flex-col items-center justify-center p-6 overflow-y-auto">
        <div class="w-32 h-32 bg-white/20 backdrop-blur-lg rounded-3xl flex items-center justify-center mb-8 shadow-2xl">
            <i class="fa-solid fa-user-plus text-5xl text-gold"></i>
        </div>

        <p class="text-white/80 mb-8 text-center">Заполните данные</p>

            <input type="text" id="regName" placeholder="Ваше имя"

            <input type="text" id="regLastName" placeholder="Ваша фамилия"

            <input type="tel" id="regPhone" placeholder="+992XXXXXXXXX"

            <input type="password" id="regPass" placeholder="Пароль"

            <input type="password" id="regPassConfirm" placeholder="Подтвердите пароль"

            <div class="text-center">

    </div>

    <!-- Основной экран -->
    <div id="appScreen" class="hidden w-full h-full relative">
        <div id="map"></div>

        <!-- Верхняя панель с новым дизайном -->
        <div class="absolute top-4 left-4 right-4 flex justify-between z-10">
            <div class="flex gap-3">
                <button onclick="toggleDarkMode()" class="glass-button text-white p-3.5 rounded-2xl shadow-lg">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button id="chatBtn" onclick="openChat()" class="glass-button text-white p-3.5 rounded-2xl shadow-lg relative hidden">
                    <i class="fa-solid fa-comment-dots"></i>
                    <span id="chatBadge" class="notification-badge hidden">0</span>
                </button>
            </div>
            <div class="flex gap-3">
                <button onclick="locateMe()" class="glass-button text-white p-3.5 rounded-2xl shadow-lg">
                    <i class="fa-solid fa-location-crosshairs"></i>
                </button>
            </div>
        </div>

        <!-- Панель заказа с обновленным дизайном -->
        <div id="bookingPanel" class="bottom-panel">
            <div class="w-full h-8 flex justify-center items-center pt-2">
                <div class="w-14 h-1.5 bg-white/50 rounded-full"></div>
            </div>
            
            <div class="px-5 overflow-y-auto pb-20">
                <div class="mb-5">
                    <div class="relative mb-4">
                        <div class="flex items-center bg-white/90 dark:bg-gray-800/90 rounded-2xl px-4 py-3 shadow-lg">
                            <i class="fa-solid fa-magnifying-glass text-purple-500"></i>
                            <input type="text" id="addrInput" placeholder="Куда едем?" 
                                   class="w-full bg-transparent p-2 pl-3 outline-none dark:text-white">

                    </div>
                    
                    <div id="routeList" class="space-y-3 mb-3"></div>

                <div class="flex gap-3 overflow-x-auto pb-3 mb-4">
                    <div onclick="selectTariff('standart', 1.0)" class="tariff-card selected cursor-pointer">

                        <div class="tariff-price text-xs text-gray-500 text-center">От 10 с.</div>
                    </div>
                    <div onclick="selectTariff('comfort', 1.15)" class="tariff-card cursor-pointer">
                        <img src="https://cdn-icons-png.flaticon.com/512/3095/3095581.png" class="w-12 h-12 object-contain mb-2 mx-auto">
                        <div class="tariff-name font-bold text-sm text-center">Комфорт</div>
                        <div class="tariff-price text-xs text-gray-500 text-center">От 12 с.</div>
                    </div>
                    <div onclick="selectTariff('minivan', 1.15)" class="tariff-card cursor-pointer">
                        <img src="https://cdn-icons-png.flaticon.com/512/3095/3095579.png" class="w-12 h-12 object-contain mb-2 mx-auto">
                        <div class="tariff-name font-bold text-sm text-center">Минивэн</div>
                        <div class="tariff-price text-xs text-gray-500 text-center">От 15 с.</div>
                    </div>
                </div>

                <div class="space-y-3 mb-6">
                    <label class="flex items-center justify-between p-3 bg-white/90 dark:bg-gray-800/90 rounded-2xl shadow-lg">
                        <span class="flex items-center gap-2 text-sm font-bold">
                            <i class="fa-solid fa-snowflake text-cyan-500"></i> Кондиционер (+10%)
                        </span>
                        <input type="checkbox" id="optAC" class="w-5 h-5 accent-purple-600" onchange="updatePrice()">
                    </label>
                    
                    <select id="optLuggage" onchange="updatePrice()" class="w-full p-3 bg-white/90 dark:bg-gray-800/90 rounded-2xl outline-none shadow-lg">
                        <option value="0">Без багажа</option>
                        <option value="3">Малый багаж (+3с)</option>
                        <option value="5">Большой багаж (+5с)</option>
                    </select>
                    
                    <label class="flex items-center justify-between p-3 bg-white/90 dark:bg-gray-800/90 rounded-2xl shadow-lg">
                        <span class="flex items-center gap-2 text-sm font-bold">
                            <i class="fa-solid fa-paw text-orange-500"></i> Питомцы (+5с)
                        </span>
                        <input type="checkbox" id="optPets" class="w-5 h-5 accent-purple-600" onchange="updatePrice()">
                    </label>
                    
                    <input type="text" id="optComment" placeholder="Комментарий для водителя" 
                           class="w-full p-3 bg-white/90 dark:bg-gray-800/90 rounded-2xl outline-none shadow-lg">
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-white via-white to-transparent dark:from-gray-900 dark:via-gray-900 dark:to-transparent">
                <button id="orderBtn" onclick="createOrder()" class="w-full bg-gradient-to-r from-purple-600 to-blue-500 hover:from-purple-700 hover:to-blue-600 text-white py-4 text-lg rounded-2xl shadow-lg shadow-purple-500/30 flex justify-between px-6 items-center font-bold transition-all transform hover:scale-105">
                    <span><i class="fa-solid fa-taxi mr-2"></i> ЗАКАЗАТЬ</span>
                    <span id="totalPrice" class="bg-white/20 px-4 py-2 rounded-xl">~ 0 с.</span>
                </button>
            </div>
        </div>

        <!-- Панель активного заказа с обновленным дизайном -->
        <div id="activeOrderPanel" class="hidden fixed inset-0 z-30 bg-gradient-to-br from-purple-600 to-blue-500 p-4">
            <div class="h-1/2 rounded-3xl overflow-hidden shadow-2xl" id="activeMap"></div>
            
            <div class="h-1/2 bg-white/95 dark:bg-gray-800/95 backdrop-blur-lg rounded-t-3xl p-6 mt-4 overflow-y-auto shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-500 bg-clip-text text-transparent">Активный заказ</h2>
                    <button onclick="closeActiveOrder()" class="p-2 bg-white/20 rounded-full hover:bg-white/30 transition">
                        <i class="fa-solid fa-xmark text-xl dark:text-white"></i>
                    </button>
                </div>
                
                <div id="activeOrderInfo" class="space-y-4">
                    <!-- Информация о заказе -->
                </div>
            </div>
        </div>
        
        <!-- Чат с обновленным дизайном -->
        <div id="chatContainer" class="chat-container">
            <div class="p-4 bg-gradient-to-r from-purple-600 to-blue-500 text-white flex items-center justify-between">
                <button onclick="closeChat()" class="p-2 hover:bg-white/20 rounded-full transition">
                    <i class="fa-solid fa-arrow-left text-xl"></i>
                </button>
                <h2 class="font-bold">Чат с водителем</h2>
                <div class="w-10"></div>

            <div id="chatMessages" class="chat-messages"></div>
            
            <div class="p-4 border-t dark:border-gray-700 bg-white dark:bg-gray-800">

                           class="flex-1 border-2 border-purple-200 rounded-full px-4 py-3 outline-none focus:border-purple-600 dark:bg-gray-800 dark:text-white"

                    <button onclick="sendMessage()" class="w-12 h-12 bg-gradient-to-r from-purple-600 to-blue-500 text-white rounded-full hover:from-purple-700 hover:to-blue-600 transition transform hover:scale-110">

    <!-- Здесь оставляем весь JavaScript без изменений, как в исходном коде -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, serverTimestamp, updateDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Конфигурация Firebase для MUZAFFAR Taxi
        
        const firebaseConfig = {
            apiKey: "AIzaSyD2WI73n-9bsmHYXCNOzEkgDveugY_sY_Q",
            authDomain: "chat-48f78.firebaseapp.com",
            projectId: "chat-48f78",
            storageBucket: "chat-48f78.firebasestorage.app",
            messagingSenderId: "571479343738",
            appId: "1:571479343738:web:0ed35acef69ec8d31371c3"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Глобальные переменные
        let map = null;
        let currentUser = null;
        let activeOrderId = null;
        let waypoints = [];
        let markers = [];
        let currentTariff = { id: 'standart', mult: 1.0 };
        let orderUnsub = null;
        let chatUnsub = null;
        
        // Проверка сохраненной сессии
        const savedUser = localStorage.getItem('muzaffar_user');
        if (savedUser) {
            try {
                currentUser = JSON.parse(savedUser);
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                initMap();
                checkActiveOrder();
            } catch (e) {
                localStorage.removeItem('muzaffar_user');
            }
        }

        window.showRegister = () => {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('registerScreen').classList.remove('hidden');
        };

        window.showLogin = () => {
            document.getElementById('registerScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
        };

        window.login = async () => {
            const phone = document.getElementById('phoneInput').value.trim();
            const password = document.getElementById('passInput').value.trim();
            
            if (!phone || !password) {
                alert('Введите телефон и пароль');
                return;
            }
            
            try {
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('phone', '==', phone));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    alert('Пользователь не найден');
                    return;
                }
                
                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();
                
                if (userData.password !== password) {
                    alert('Неверный пароль');
                    return;
                }
                
                currentUser = {
                    id: userDoc.id,
                    ...userData
                };
                
                localStorage.setItem('muzaffar_user', JSON.stringify(currentUser));
                
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                
                initMap();
                checkActiveOrder();
                
            } catch (error) {
                console.error('Login error:', error);
                alert('Ошибка входа');
            }
        };

        window.register = async () => {
            const name = document.getElementById('regName').value.trim();
            const lastName = document.getElementById('regLastName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPass').value.trim();
            const confirm = document.getElementById('regPassConfirm').value.trim();
            
            if (!name || !lastName || !phone || !password) {
                alert('Заполните все поля');
                return;
            }
            
            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }
            
            if (!phone.match(/^\+992[0-9]{9}$/)) {
                alert('Введите корректный номер телефона в формате +992XXXXXXXXX');
                return;
            }
            
            try {
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('phone', '==', phone));
                const snapshot = await getDocs(q);
                
                if (!snapshot.empty) {
                    alert('Пользователь с таким номером уже существует');
                    return;
                }
                
                const userData = {
                    name: name,
                    lastName: lastName,
                    phone: phone,
                    password: password,
                    role: 'client',
                    createdAt: serverTimestamp(),
                    orders: []
                };
                
                const docRef = await addDoc(usersRef, userData);
                
                currentUser = {
                    id: docRef.id,
                    ...userData
                };
                
                localStorage.setItem('muzaffar_user', JSON.stringify(currentUser));
                
                alert('Регистрация успешна!');
                
                document.getElementById('registerScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                
                initMap();
                
            } catch (error) {
                console.error('Registration error:', error);
                alert('Ошибка регистрации');
            }
        };

        function initMap() {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([38.5598, 68.7870], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19
                }).addTo(map);
                
                map.on('click', async (e) => {
                    if (!activeOrderId && waypoints.length < 6) {
                        await addWaypoint(e.latlng);
                    }
                });
            }
            
            locateMe();
        }

        async function addWaypoint(latlng, name = null) {
            if (waypoints.length >= 6) {
                alert('Максимум 6 точек');
                return;
            }
            
            waypoints.push({ lat: latlng.lat, lng: latlng.lng, address: name || 'Загрузка...' });
            updateMarkers();
            
            if (!name) {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`);
                    const data = await res.json();
                    waypoints[waypoints.length-1].address = data.display_name?.substring(0, 60) || 'Точка на карте';
                    updateMarkers();
                } catch (e) {
                    console.error('Geocoding error:', e);
                }
            }
        }

        window.removePoint = (index) => {
            waypoints.splice(index, 1);
            updateMarkers();
        };

        function updateMarkers() {
            markers.forEach(m => map?.removeLayer(m));
            markers = [];
            
            const list = document.getElementById('routeList');
            
            if (waypoints.length === 0) {
                list.innerHTML = '<div class="p-4 bg-gradient-to-r from-purple-50 to-blue-50 dark:from-purple-900/20 dark:to-blue-900/20 rounded-xl text-center text-purple-600 text-sm">Нажмите на карту для добавления точек</div>';
                return;
            }
            
            list.innerHTML = '';
            waypoints.forEach((pt, i) => {
                const markerIcon = L.divIcon({
                    html: `<div class="w-10 h-10 ${i === 0 ? 'bg-gray-900' : i === waypoints.length-1 ? 'bg-green-500' : 'bg-blue-500'} text-white rounded-full flex items-center justify-center font-bold border-2 border-white shadow-lg">${i+1}</div>`,
                    iconSize: [40, 40]
                });
                
                const marker = L.marker([pt.lat, pt.lng], { icon: markerIcon }).addTo(map);
                markers.push(marker);
                
                list.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white/90 dark:bg-gray-800/90 rounded-xl shadow-lg route-point ${i === 0 ? 'start' : i === waypoints.length-1 ? 'end' : 'middle'}">
                        <div class="flex items-center gap-3 overflow-hidden flex-1">
                            <div class="w-8 h-8 ${i === 0 ? 'bg-gray-900' : i === waypoints.length-1 ? 'bg-green-500' : 'bg-blue-500'} text-white rounded-full flex items-center justify-center font-bold text-xs shrink-0">
                                ${i+1}
                            </div>
                            <div class="truncate text-sm dark:text-white">${pt.address || 'Загрузка...'}</div>
                        </div>
                        <button onclick="removePoint(${i})" class="text-red-400 p-2 hover:text-red-500 transition">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>`;
            });
            
            if (waypoints.length >= 2) {
                buildRoute();
            }
            
            updatePrice();
        }

        async function buildRoute() {
            if (waypoints.length < 2) return;
            
            const str = waypoints.map(p => `${p.lng},${p.lat}`).join(';');
            
            try {
                const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${str}?overview=full&geometries=polyline`);
                const data = await res.json();
                
                if (data.routes?.[0]) {
                    const pts = polyline.decode(data.routes[0].geometry);
                    if (window.routeLayer) map.removeLayer(window.routeLayer);
                    window.routeLayer = L.polyline(pts, { color: '#8B5CF6', weight: 5, opacity: 0.8 }).addTo(map);
                    map.fitBounds(window.routeLayer.getBounds(), { padding: [50, 50] });
                }
            } catch (e) {
                console.error('Route error:', e);
            }
        }

        window.selectTariff = (id, mult) => {
            document.querySelectorAll('.tariff-card').forEach(e => e.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            currentTariff = { id, mult };
            updatePrice();
        };

        window.updatePrice = () => {
            let base = 10 * currentTariff.mult;
            
            if (document.getElementById('optPets')?.checked) base += 5;
            base += parseInt(document.getElementById('optLuggage')?.value || 0);
            if (document.getElementById('optAC')?.checked) base *= 1.1;
            
            document.getElementById('totalPrice').innerText = `~ ${base.toFixed(2)} с.`;
            return base;
        };

        window.createOrder = async () => {
            if (waypoints.length < 2) {
                alert('Добавьте минимум 2 точки');
                return;
            }
            
            if (!currentUser) {
                alert('Авторизуйтесь');
                return;
            }
            
            const price = updatePrice();
            
            try {
                const orderData = {
                    clientId: currentUser.id,
                    clientPhone: currentUser.phone,
                    clientName: `${currentUser.name} ${currentUser.lastName}`,
                    status: 'pending',
                    createdAt: serverTimestamp(),
                    points: waypoints,
                    tariff: currentTariff,
                    estPrice: price,
                    currentPrice: price,
                    options: {
                        pets: document.getElementById('optPets').checked,
                        luggage: parseInt(document.getElementById('optLuggage').value),
                        ac: document.getElementById('optAC').checked,
                        comment: document.getElementById('optComment').value
                    }
                };
                
                const ref = await addDoc(collection(db, 'orders'), orderData);
                activeOrderId = ref.id;
                
                document.getElementById('bookingPanel').style.transform = 'translateY(150%)';
                
                listenOrder(activeOrderId);
                
            } catch (error) {
                console.error('Order error:', error);
                alert('Ошибка создания заказа');
            }
        };

        function listenOrder(orderId) {
            orderUnsub = onSnapshot(doc(db, 'orders', orderId), (snap) => {
                const order = snap.data();
                if (!order) return;
                
                if (order.status === 'accepted') {
                    showActiveOrder(order);
                } else if (order.status === 'cancelled' || order.status === 'completed') {
                    resetOrder();
                }
            });
        }

        function showActiveOrder(order) {
            document.getElementById('activeOrderPanel').classList.remove('hidden');
            document.getElementById('chatBtn').classList.remove('hidden');
            
            const info = document.getElementById('activeOrderInfo');
            info.innerHTML = `
                <div class="bg-gradient-to-r from-purple-50 to-blue-50 dark:from-purple-900/20 dark:to-blue-900/20 p-4 rounded-xl">
                    <div class="font-bold text-lg mb-2 text-purple-600">Водитель: ${order.driverName || '...'}</div>
                    <div class="mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-car text-purple-500"></i>
                        ${order.driverCar || '...'} (${order.driverPlate || '...'})
                    </div>
                    <div class="mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-phone text-green-500"></i>
                        ${order.driverPhone || '...'}
                    </div>
                    <div class="flex gap-2">
                        <a href="tel:${order.driverPhone}" class="flex-1 bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-lg text-center font-bold hover:from-green-600 hover:to-green-700 transition transform hover:scale-105">
                            <i class="fa-solid fa-phone mr-2"></i> Позвонить
                        </a>
                        <button onclick="cancelOrder()" class="flex-1 bg-gradient-to-r from-red-500 to-red-600 text-white py-3 rounded-lg font-bold hover:from-red-600 hover:to-red-700 transition transform hover:scale-105">
                            <i class="fa-solid fa-xmark mr-2"></i> Отменить
                        </button>
                    </div>
                </div>
            `;
            
            // Инициализация карты для активного заказа
            initActiveMap(order.points, order.driverLocation);
            
            // Подписка на чат
            subscribeToChat(orderId);
        }

        function initActiveMap(points, driverLocation) {
            const activeMap = L.map('activeMap').setView([points[0].lat, points[0].lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(activeMap);
            
            // Маркеры точек
            points.forEach((pt, i) => {
                const markerIcon = L.divIcon({
                    html: `<div class="w-8 h-8 ${i === 0 ? 'bg-gray-900' : i === points.length-1 ? 'bg-green-500' : 'bg-blue-500'} text-white rounded-full flex items-center justify-center font-bold border-2 border-white shadow-lg">${i+1}</div>`,
                    iconSize: [32, 32]
                });
                L.marker([pt.lat, pt.lng], { icon: markerIcon }).addTo(activeMap);
            });
            
            // Маркер водителя
            if (driverLocation) {
                const driverIcon = L.divIcon({
                    html: '<div class="driver-icon"><i class="fa-solid fa-taxi text-purple-600"></i></div>',
                    iconSize: [44, 44]
                });
                L.marker([driverLocation.lat, driverLocation.lng], { icon: driverIcon }).addTo(activeMap)
                    .bindPopup('Водитель');
            }
        }

        window.cancelOrder = async () => {
            if (!activeOrderId || !confirm('Отменить заказ?')) return;
            
            try {
                await updateDoc(doc(db, 'orders', activeOrderId), { status: 'cancelled' });
                closeActiveOrder();
            } catch (error) {
                console.error('Cancel error:', error);
            }
        };

        window.closeActiveOrder = () => {
            document.getElementById('activeOrderPanel').classList.add('hidden');
            document.getElementById('bookingPanel').style.transform = '';
            document.getElementById('chatBtn').classList.add('hidden');
            activeOrderId = null;
            
            if (orderUnsub) {
                orderUnsub();
                orderUnsub = null;
            }
            
            if (chatUnsub) {
                chatUnsub();
                chatUnsub = null;
            }
        };

        function resetOrder() {
            closeActiveOrder();
            waypoints = [];
            updateMarkers();
        }

        async function checkActiveOrder() {
            if (!currentUser) return;
            
            const q = query(
                collection(db, 'orders'),
                where('clientId', '==', currentUser.id),
                where('status', 'in', ['pending', 'accepted', 'arrived', 'waiting', 'in_progress'])
            );
            
            const snapshot = await getDocs(q);
            
            if (!snapshot.empty) {
                const orderDoc = snapshot.docs[0];
                activeOrderId = orderDoc.id;
                
                document.getElementById('bookingPanel').style.transform = 'translateY(150%)';
                
                const orderData = orderDoc.data();
                if (orderData.status !== 'pending') {
                    showActiveOrder(orderData);
                }
                
                listenOrder(activeOrderId);
            }
        }

        function subscribeToChat(orderId) {
            const chatRef = collection(db, 'orders', orderId, 'chat');
            const q = query(chatRef, orderBy('createdAt', 'asc'));
            
            chatUnsub = onSnapshot(q, (snapshot) => {
                let unread = 0;
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    if (msg.sender === 'driver' && !msg.read) unread++;
                });
                
                const badge = document.getElementById('chatBadge');
                if (unread > 0) {
                    badge.textContent = unread;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            });
        }

        window.openChat = () => {
            document.getElementById('chatContainer').classList.add('visible');
            loadChatMessages();
        };

        window.closeChat = () => {
            document.getElementById('chatContainer').classList.remove('visible');
        };

        async function loadChatMessages() {
            if (!activeOrderId) return;
            
            const chatRef = collection(db, 'orders', activeOrderId, 'chat');
            const q = query(chatRef, orderBy('createdAt', 'asc'));
            
            const snapshot = await getDocs(q);
            const messages = document.getElementById('chatMessages');
            
            if (snapshot.empty) {
                messages.innerHTML = '<div class="text-center text-gray-500 py-8">Нет сообщений</div>';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const isClient = msg.sender === 'client';
                html += `
                    <div class="message ${isClient ? 'message-sent' : 'message-received'}">
                        ${msg.text}
                    </div>`;
            });
            
            messages.innerHTML = html;
            messages.scrollTop = messages.scrollHeight;
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text || !activeOrderId) return;
            
            try {
                await addDoc(collection(db, 'orders', activeOrderId, 'chat'), {
                    text: text,
                    sender: 'client',
                    createdAt: serverTimestamp(),
                    read: false
                });
                
                input.value = '';
                loadChatMessages();
                
            } catch (error) {
                console.error('Send error:', error);
                alert('Ошибка отправки');
            }
        };

        window.locateMe = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => map?.setView([pos.coords.latitude, pos.coords.longitude], 16)
                );
            }
        };

        window.toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('muzaffar_dark', document.documentElement.classList.contains('dark'));
        };
        
        // Загрузка темы
        if (localStorage.getItem('muzaffar_dark') === 'true') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
