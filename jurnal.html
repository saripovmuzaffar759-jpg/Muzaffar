<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Javoni Lyceum · ИИ-Журнал</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Inter", sans-serif;
            background: #0b141f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 212, 255, 0.15) 0%, transparent 30%),
                        radial-gradient(circle at 70% 60%, rgba(150, 50, 255, 0.12) 0%, transparent 35%),
                        radial-gradient(circle at 10% 80%, rgba(255, 100, 100, 0.08) 0%, transparent 40%),
                        #0b141f;
            animation: bgMove 28s infinite alternate;
            z-index: -2;
        }
        @keyframes bgMove {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(5%,3%) rotate(1deg); }
        }
        .card {
            width: 100%;
            max-width: 1500px;
            background: rgba(18, 28, 40, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            animation: float 6s infinite alternate;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }
        h2 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff, #b0ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .subtitle {
            color: #98a9c7;
            border-left: 4px solid #2f80ff;
            padding-left: 20px;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .subjects-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .subject-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #b0d0ff;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            flex: 0 1 auto;
        }
        .subject-btn:hover {
            background: #2f80ff20;
            border-color: #2f80ff;
            color: white;
        }
        .subject-btn.active {
            background: #2f80ff;
            border-color: #2f80ff;
            color: white;
            box-shadow: 0 8px 20px -8px #2f80ff;
        }
        .control-panel {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .input-field {
            flex: 2;
            min-width: 250px;
            background: #1e2b3a;
            border: 1px solid #314a66;
            border-radius: 60px;
            display: flex;
            align-items: center;
            padding: 5px 5px 5px 25px;
            transition: 0.2s;
        }
        .input-field:focus-within {
            border-color: #2f80ff;
            box-shadow: 0 0 0 3px rgba(47,128,255,0.2);
        }
        .input-field i {
            color: #5f7ea0;
            font-size: 1.3rem;
        }
        .input-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 15px;
            font-size: 1.2rem;
            color: white;
            outline: none;
        }
        .input-field input::placeholder {
            color: #5a7795;
            font-weight: 300;
        }
        .action-btn {
            background: linear-gradient(115deg, #1f2f4a, #121f32);
            border: 1px solid #2f80ff66;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 0 25px;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .action-btn:hover {
            background: #1f3a5a;
            border-color: #2f80ff;
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px #2f80ff;
        }
        .action-btn i {
            font-size: 1.2rem;
            color: #b0d0ff;
        }
        .result {
            background: #102030;
            border-radius: 40px;
            padding: 25px;
            display: none;
            margin-top: 20px;
            border: 1px solid #2a4a70;
            animation: fadeSlide 0.4s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .student-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px dashed #2f5580;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 70px;
            height: 70px;
            background: #1f3a5a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #b5d6ff;
            border: 2px solid #3f6a9f;
        }
        .student-name {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #c0d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 25px;
            background: #0a1a28;
            border: 1px solid #2a4a70;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #c9dfff;
        }
        th {
            background: #142c40;
            padding: 15px 12px;
            font-weight: 600;
            border-bottom: 2px solid #2f5580;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #1c3a55;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .error-message {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #301010;
            border: 1px solid #b55a5a;
            border-radius: 60px;
            padding: 20px 30px;
            color: #ffbcbc;
            font-size: 1.1rem;
        }
        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid #3f5f8f;
            border-top-color: #2f80ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: #98b9e6;
            padding: 20px;
            font-size: 1.1rem;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #4f6990;
            font-size: 0.9rem;
            border-top: 1px solid #1e3349;
            padding-top: 20px;
        }
        .footer-note i {
            margin-right: 6px;
        }
        .tab-bar {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            border-bottom: 1px solid #1e3349;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #98a9c7;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn:hover {
            background: #1f2f4a;
            color: white;
        }
        .tab-btn.active {
            background: #2f80ff;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-item {
            background: #1e2f40;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #3f5f8f;
        }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #2f80ff;
            line-height: 1.2;
        }
        .stat-label {
            color: #98b9e6;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .recommendation-list {
            list-style: none;
            padding: 0;
        }
        .recommendation-item {
            background: #1e2f40;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-left: 5px solid;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .rec-emergency { border-color: #ff4d4d; }
        .rec-warning { border-color: #ffaa33; }
        .rec-good { border-color: #33cc99; }
        .rec-icon { font-size: 1.5rem; width: 30px; }
        .rec-text { flex: 1; color: #c9dfff; }
        .topics-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .topic-tag {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.95rem;
            border: 1px solid;
        }
        .topic-critical { background: #ff4d4d30; border-color: #ff4d4d; color: #ffb3b3; }
        .topic-warning { background: #ffaa3330; border-color: #ffaa33; color: #ffd9b3; }
        .topic-good { background: #33cc9930; border-color: #33cc99; color: #b3ffd9; }
        .topic-excellent { background: #2f80ff30; border-color: #2f80ff; color: #b3d9ff; }
        
        .grade-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 5px;
        }
        .grade-1-3 { background: #ff4d4d; color: white; }
        .grade-4-6 { background: #ffaa33; color: white; }
        .grade-7-8 { background: #33cc99; color: white; }
        .grade-9-10 { background: #2f80ff; color: white; }
        
        @media (max-width: 700px) {
            .card { padding: 25px; border-radius: 35px; }
            h2 { font-size: 2rem; }
            .student-name { font-size: 1.6rem; }
            .avatar { width: 55px; height: 55px; font-size: 1.6rem; }
            .tab-btn { font-size: 0.9rem; padding: 8px 15px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-robot"></i> Javoni Lyceum · ИИ-Журнал</h2>
        <div class="subtitle"><i class="fas fa-chart-line"></i> Выберите предмет и введите код ученика</div>

        <!-- Панель выбора предметов -->
        <div class="subjects-bar" id="subjectsBar"></div>

        <!-- Панель управления -->
        <div class="control-panel">
            <div class="input-field">
                <i class="fas fa-key"></i>
                <input type="text" id="codeInput" placeholder="Введите код ученика" autocomplete="off">
            </div>
            <button class="action-btn" id="searchBtn"><i class="fas fa-magnifying-glass"></i> Найти</button>
            <button class="action-btn" id="showAllBtn"><i class="fas fa-table"></i> Все ученики</button>
            <button class="action-btn" id="debugBtn"><i class="fas fa-bug"></i> Диагностика</button>
        </div>

        <!-- Индикатор загрузки -->
        <div id="loading" class="loading-indicator" style="display: none;">
            <div class="loader"></div>
            <span>Загружаем данные...</span>
        </div>

        <!-- Блок результата -->
        <div id="result" class="result"></div>

        <div class="footer-note">
            <i class="fas fa-cloud-arrow-up"></i> Данные из Google Таблицы · ИИ-аналитика для каждого ученика
        </div>
    </div>

    <script>
        (function() {
            // ==================================================================
            // ⚙️ НАСТРОЙКИ
            // ==================================================================
            const SPREADSHEET_ID = '1EwVlRXOyJAV8C46vsfILuQBRlLimIMEe7JkhCqyjfY0';
            
            const subjects = [
                { name: '⚛️ Физика', sheetName: 'физика', gid: '425210832' },
                { name: '📐 Алгебра', sheetName: 'алгебра', gid: '1623574883' },
                { name: '🔨 Крафт', sheetName: 'крафт', gid: '710025517' }
            ];

            const CODE_COLUMN = 0;      // колонка с кодом (A)
            const NAME_COLUMN = 1;       // колонка с именем (B)
            const FIRST_DATA_COLUMN = 2; // первая колонка с данными (C)

            // ==================================================================
            let currentSubjectIndex = 0;
            let students = [];
            let dataHeaders = [];
            let isLoading = false;
            let currentStudent = null;
            let activeTab = 'grades';
            let rawData = '';

            const subjectsBar = document.getElementById('subjectsBar');
            const codeInput = document.getElementById('codeInput');
            const searchBtn = document.getElementById('searchBtn');
            const showAllBtn = document.getElementById('showAllBtn');
            const debugBtn = document.getElementById('debugBtn');
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            function buildSubjectsBar() {
                subjectsBar.innerHTML = '';
                subjects.forEach((subj, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'subject-btn' + (idx === currentSubjectIndex ? ' active' : '');
                    btn.textContent = subj.name;
                    btn.addEventListener('click', () => switchSubject(idx));
                    subjectsBar.appendChild(btn);
                });
            }

            function switchSubject(index) {
                if (index === currentSubjectIndex) return;
                currentSubjectIndex = index;
                document.querySelectorAll('.subject-btn').forEach((btn, i) => {
                    btn.classList.toggle('active', i === index);
                });
                resultDiv.style.display = 'none';
                resultDiv.innerHTML = '';
                codeInput.value = '';
                currentStudent = null;
                loadData();
            }

            async function loadData() {
                const sheetName = subjects[currentSubjectIndex].sheetName;
                isLoading = true;
                loadingDiv.style.display = 'flex';
                resultDiv.style.display = 'none';

                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
                
                try {
                    const response = await fetch(url);
                    
                    if (!response.ok) throw new Error(`Ошибка HTTP: ${response.status}`);
                    
                    const csv = await response.text();
                    rawData = csv;
                    
                    if (csv.length < 10) {
                        showError('Получен пустой ответ от сервера. Проверьте название листа.');
                        return;
                    }
                    
                    parseCSV(csv);
                    
                } catch (e) {
                    console.error('Ошибка загрузки:', e);
                    showError(`Ошибка загрузки: ${e.message}. Проверьте названия листов (должны быть: физика, алгебра, крафт).`);
                } finally {
                    isLoading = false;
                    loadingDiv.style.display = 'none';
                }
            }

            function parseCSV(csv) {
                const lines = csv.trim().split('\n').map(line => 
                    line.split(',').map(cell => cell.trim().replace(/^"(.*)"$/, '$1'))
                );

                if (lines.length < 2) {
                    showError('В таблице меньше 2 строк. Нужны минимум заголовок и один ученик.');
                    return;
                }

                // Заголовки (темы уроков) - первая строка, начиная с колонки C
                dataHeaders = [];
                if (lines.length > 0) {
                    for (let i = FIRST_DATA_COLUMN; i < lines[0].length; i++) {
                        let header = lines[0][i] || `Тема ${i - FIRST_DATA_COLUMN + 1}`;
                        if (header.trim() === '') {
                            header = `Тема ${i - FIRST_DATA_COLUMN + 1}`;
                        }
                        dataHeaders.push(header);
                    }
                }

                // Парсим учеников (со второй строки)
                students = [];
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i];
                    
                    if (row.length < 2) continue;
                    
                    const code = row[CODE_COLUMN]?.trim();
                    const name = row[NAME_COLUMN]?.trim();
                    
                    if (!code || !name || code === '' || name === '') {
                        continue;
                    }

                    const data = [];
                    for (let j = FIRST_DATA_COLUMN; j < row.length; j++) {
                        data.push(row[j] || '');
                    }
                    students.push({ code, name, data });
                }
            }

            function showError(message) {
                resultDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
                resultDiv.style.display = 'block';
            }

            function showDebugInfo() {
                let html = '<div class="error-message" style="background:#1a3344; flex-direction:column; align-items:flex-start;">';
                html += '<h3 style="color:white;"><i class="fas fa-bug"></i> Диагностика</h3>';
                
                html += `<p><strong>Текущий предмет:</strong> ${subjects[currentSubjectIndex].name}</p>`;
                html += `<p><strong>Лист:</strong> ${subjects[currentSubjectIndex].sheetName}</p>`;
                html += `<p><strong>URL загрузки:</strong> https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${subjects[currentSubjectIndex].sheetName}</p>`;
                html += `<p><strong>Статус:</strong> ${isLoading ? 'Загружается...' : 'Готово'}</p>`;
                html += `<p><strong>Найдено учеников:</strong> ${students.length}</p>`;
                html += `<p><strong>Тем (заголовков):</strong> ${dataHeaders.length}</p>`;
                
                if (dataHeaders.length > 0) {
                    html += '<p><strong>Первые 5 тем:</strong></p><ul>';
                    dataHeaders.slice(0, 5).forEach((header, idx) => {
                        html += `<li>${idx + 1}. ${header}</li>`;
                    });
                    if (dataHeaders.length > 5) html += '<li>...</li>';
                    html += '</ul>';
                }
                
                if (students.length > 0) {
                    html += '<p><strong>Пример ученика:</strong></p>';
                    html += '<pre style="background:#0a1a28; padding:10px; border-radius:10px; overflow:auto;">';
                    html += `Код: ${students[0].code}\n`;
                    html += `Имя: ${students[0].name}\n`;
                    html += `Оценки: ${students[0].data.join(', ')}`;
                    html += '</pre>';
                    
                    html += '<p><strong>Доступные коды:</strong> ' + students.slice(0, 10).map(s => s.code).join(', ') + (students.length > 10 ? '...' : '') + '</p>';
                }
                
                if (rawData) {
                    html += '<h4 style="color:white; margin-top:15px;">Первые 3 строки CSV:</h4>';
                    html += '<pre style="background:#0a1a28; padding:10px; border-radius:10px; overflow:auto; font-size:12px;">';
                    const lines = rawData.split('\n').slice(0, 3);
                    lines.forEach((line, index) => {
                        html += `Строка ${index}: ${line}\n`;
                    });
                    html += '</pre>';
                }
                
                html += '</div>';
                
                resultDiv.innerHTML = html;
                resultDiv.style.display = 'block';
            }

            function generateAIAnalysis(student) {
                if (!student || student.data.length === 0) {
                    return {
                        avgGrade: 'Нет оценок',
                        grades1_3: [],
                        grades4_6: [],
                        grades7_8: [],
                        grades9_10: [],
                        recommendations: [{
                            type: 'warning',
                            icon: '📝',
                            text: 'У ученика пока нет оценок по этому предмету.'
                        }],
                        totalGrades: 0
                    };
                }

                const allGrades = [];
                
                student.data.forEach((grade, index) => {
                    const trimmedGrade = String(grade).trim();
                    if (trimmedGrade !== '' && !isNaN(parseFloat(trimmedGrade)) && isFinite(trimmedGrade)) {
                        const numGrade = parseFloat(trimmedGrade);
                        allGrades.push({
                            topic: dataHeaders[index] || `Тема ${index + 1}`,
                            grade: numGrade
                        });
                    }
                });
                
                const grades1_3 = allGrades.filter(g => g.grade >= 1 && g.grade <= 3);
                const grades4_6 = allGrades.filter(g => g.grade >= 4 && g.grade <= 6);
                const grades7_8 = allGrades.filter(g => g.grade >= 7 && g.grade <= 8);
                const grades9_10 = allGrades.filter(g => g.grade >= 9 && g.grade <= 10);
                
                const avgGrade = allGrades.length > 0 
                    ? (allGrades.reduce((a, b) => a + b.grade, 0) / allGrades.length).toFixed(2)
                    : 'Нет оценок';
                
                const recommendations = [];
                
                if (grades1_3.length > 0) {
                    recommendations.push({
                        type: 'emergency',
                        icon: '🚨',
                        text: `Критически низкие оценки (1-3 балла): ${grades1_3.map(g => `${g.topic} (${g.grade})`).join(', ')}`
                    });
                }
                
                if (grades4_6.length > 0) {
                    recommendations.push({
                        type: 'warning',
                        icon: '⚠️',
                        text: `Нужно подтянуть (4-6 баллов): ${grades4_6.map(g => `${g.topic} (${g.grade})`).join(', ')}`
                    });
                }
                
                if (grades7_8.length > 0) {
                    recommendations.push({
                        type: 'good',
                        icon: '👍',
                        text: `Хорошие результаты (7-8 баллов): ${grades7_8.map(g => `${g.topic} (${g.grade})`).join(', ')}`
                    });
                }
                
                if (grades9_10.length > 0) {
                    recommendations.push({
                        type: 'good',
                        icon: '🏆',
                        text: `Отличные результаты (9-10 баллов): ${grades9_10.map(g => `${g.topic} (${g.grade})`).join(', ')}`
                    });
                }
                
                if (avgGrade !== 'Нет оценок') {
                    const avg = parseFloat(avgGrade);
                    if (avg <= 3) {
                        recommendations.push({
                            type: 'emergency',
                            icon: '🎯',
                            text: `Средний балл ${avgGrade}. Нужно срочно исправлять оценки!`
                        });
                    } else if (avg <= 5) {
                        recommendations.push({
                            type: 'warning',
                            icon: '📚',
                            text: `Средний балл ${avgGrade}. Есть куда расти.`
                        });
                    } else if (avg <= 7) {
                        recommendations.push({
                            type: 'good',
                            icon: '👍',
                            text: `Средний балл ${avgGrade}. Хороший результат!`
                        });
                    } else {
                        recommendations.push({
                            type: 'good',
                            icon: '🏆',
                            text: `Средний балл ${avgGrade}. Отличный результат!`
                        });
                    }
                }
                
                return {
                    avgGrade,
                    grades1_3,
                    grades4_6,
                    grades7_8,
                    grades9_10,
                    recommendations,
                    totalGrades: allGrades.length
                };
            }

            function showGradesTab(student) {
                let html = `
                    <div class="student-header">
                        <div class="avatar"><i class="fas fa-user-graduate"></i></div>
                        <span class="student-name">${student.name}</span>
                    </div>
                    
                    <div class="tab-bar">
                        <button class="tab-btn active" onclick="window.switchTab('grades')"><i class="fas fa-list"></i> Оценки и темы</button>
                        <button class="tab-btn" onclick="window.switchTab('ai')"><i class="fas fa-robot"></i> ИИ-Аналитика</button>
                    </div>
                `;
                
                if (dataHeaders.length > 0 && student.data.length > 0) {
                    html += '<div class="table-wrapper"><table><tr>';
                    dataHeaders.forEach(h => html += `<th>${h}</th>`);
                    html += '</tr><tr>';
                    student.data.forEach(v => {
                        html += `<td>${v || '-'}</td>`;
                    });
                    html += '</tr></table></div>';
                    
                    html += '<div style="margin-top: 15px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">';
                    html += '<span><span style="color: #ff4d4d;">●</span> 1-3 (критично)</span>';
                    html += '<span><span style="color: #ffaa33;">●</span> 4-6 (нужно подтянуть)</span>';
                    html += '<span><span style="color: #33cc99;">●</span> 7-8 (хорошо)</span>';
                    html += '<span><span style="color: #2f80ff;">●</span> 9-10 (отлично)</span>';
                    html += '</div>';
                } else {
                    html += '<p style="color:#7f9bc0; text-align:center;">Нет данных об оценках</p>';
                }
                
                return html;
            }
            
            function showAITab(student) {
                const analysis = generateAIAnalysis(student);
                
                let html = `
                    <div class="student-header">
                        <div class="avatar"><i class="fas fa-robot"></i></div>
                        <span class="student-name">ИИ-Аналитика для ${student.name}</span>
                    </div>
                    
                    <div class="tab-bar">
                        <button class="tab-btn" onclick="window.switchTab('grades')"><i class="fas fa-list"></i> Оценки и темы</button>
                        <button class="tab-btn active" onclick="window.switchTab('ai')"><i class="fas fa-robot"></i> ИИ-Аналитика</button>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${analysis.avgGrade}</div>
                            <div class="stat-label">Средний балл</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${analysis.totalGrades}</div>
                            <div class="stat-label">Всего оценок</div>
                        </div>
                    </div>
                `;
                
                if (analysis.grades9_10.length > 0) {
                    html += '<h3 style="color:white; margin:20px 0 10px;">🏆 Отличные результаты (9-10 баллов):</h3>';
                    html += '<div class="topics-container">';
                    analysis.grades9_10.forEach(item => {
                        html += `<span class="topic-tag topic-excellent">${item.topic} <span class="grade-badge grade-9-10">${item.grade}</span></span>`;
                    });
                    html += '</div>';
                }
                
                if (analysis.grades7_8.length > 0) {
                    html += '<h3 style="color:white; margin:20px 0 10px;">👍 Хорошие результаты (7-8 баллов):</h3>';
                    html += '<div class="topics-container">';
                    analysis.grades7_8.forEach(item => {
                        html += `<span class="topic-tag topic-good">${item.topic} <span class="grade-badge grade-7-8">${item.grade}</span></span>`;
                    });
                    html += '</div>';
                }
                
                if (analysis.grades4_6.length > 0) {
                    html += '<h3 style="color:white; margin:20px 0 10px;">⚠️ Нужно подтянуть (4-6 баллов):</h3>';
                    html += '<div class="topics-container">';
                    analysis.grades4_6.forEach(item => {
                        html += `<span class="topic-tag topic-warning">${item.topic} <span class="grade-badge grade-4-6">${item.grade}</span></span>`;
                    });
                    html += '</div>';
                }
                
                if (analysis.grades1_3.length > 0) {
                    html += '<h3 style="color:white; margin:20px 0 10px;">🚨 Критически низкие оценки (1-3 балла):</h3>';
                    html += '<div class="topics-container">';
                    analysis.grades1_3.forEach(item => {
                        html += `<span class="topic-tag topic-critical">${item.topic} <span class="grade-badge grade-1-3">${item.grade}</span></span>`;
                    });
                    html += '</div>';
                }
                
                html += '<h3 style="color:white; margin:20px 0 10px;">💡 Персональные рекомендации:</h3>';
                html += '<div class="recommendation-list">';
                
                analysis.recommendations.forEach(rec => {
                    let recClass = 'rec-good';
                    if (rec.type === 'emergency') recClass = 'rec-emergency';
                    if (rec.type === 'warning') recClass = 'rec-warning';
                    
                    html += `
                        <div class="recommendation-item ${recClass}">
                            <div class="rec-icon">${rec.icon}</div>
                            <div class="rec-text">${rec.text}</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                
                return html;
            }

            function showAllStudents() {
                if (isLoading) {
                    showError('Данные загружаются, подожди...');
                    return;
                }
                if (students.length === 0) {
                    showError('Нет данных для отображения');
                    return;
                }

                let html = `
                    <div class="student-header">
                        <div class="avatar"><i class="fas fa-users"></i></div>
                        <span class="student-name">Все ученики (${students.length})</span>
                    </div>
                `;
                
                html += '<div class="table-wrapper"><table><tr>';
                html += '<th>Код</th><th>Имя</th>';
                dataHeaders.forEach(h => html += `<th>${h}</th>`);
                html += '</tr>';
                
                students.forEach(s => {
                    html += '<tr>';
                    html += `<td>${s.code}</td>`;
                    html += `<td>${s.name}</td>`;
                    s.data.forEach(v => html += `<td>${v || '-'}</td>`);
                    html += '</tr>';
                });
                
                html += '</table></div>';
                
                resultDiv.innerHTML = html;
                resultDiv.style.display = 'block';
            }

            function findStudent() {
                const query = codeInput.value.trim();

                if (isLoading) {
                    showError('Данные загружаются, подожди...');
                    return;
                }

                if (!query) {
                    showError('Введите код ученика');
                    return;
                }

                if (students.length === 0) {
                    showError('Нет данных об учениках. Нажми "Диагностика" чтобы узнать причину.');
                    return;
                }

                const student = students.find(s => s.code === query);
                if (!student) {
                    showError(`Ученик с кодом «${query}» не найден.`);
                    return;
                }

                currentStudent = student;
                activeTab = 'grades';
                resultDiv.innerHTML = showGradesTab(student);
                resultDiv.style.display = 'block';
            }
            
            window.switchTab = function(tab) {
                if (!currentStudent) return;
                activeTab = tab;
                
                if (tab === 'grades') {
                    resultDiv.innerHTML = showGradesTab(currentStudent);
                } else {
                    resultDiv.innerHTML = showAITab(currentStudent);
                }
            };

            // Инициализация
            buildSubjectsBar();
            loadData();

            // Обработчики
            searchBtn.addEventListener('click', findStudent);
            showAllBtn.addEventListener('click', showAllStudents);
            debugBtn.addEventListener('click', showDebugInfo);
            codeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') findStudent();
            });
        })();
    </script>
</body>
</html>
