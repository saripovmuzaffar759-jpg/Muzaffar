        debugLogs.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
        if (debugLogs.length > 30) debugLogs.pop();
        console.log(msg);
    }

    // ПОКАЗАТЬ ВСЕ ШКОЛЫ

        addDebugLog(`Показываем список из ${SCHOOLS_LIST.length} школ`);
        schoolDropdown.innerHTML = SCHOOLS_LIST.map(school => `
            <div class="school-option" data-name="${school.name.replace(/^[^ ]+ /, '')}" data-city="${school.city}">
                <i class="fas fa-school"></i>
                <div>
                    <span class="school-name">${school.name}</span>
                    <span class="school-city">${school.city}</span>
                </div>
            </div>
        `).join('');
        schoolDropdown.classList.add('show');
        
        document.querySelectorAll('.school-option[data-name]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                let name = el.dataset.name;
                const city = el.dataset.city;
                // Убираем эмодзи из имени если есть
                name = name.replace(/[🏫🎓📚🏛️⭐]/g, '').trim();
                selectedSchool = { name, city };
                selectedSchoolNameSpan.innerText = name;
                selectedSchoolCitySpan.innerText = city;
                selectedSchoolChip.style.display = 'block';
                schoolSearch.value = `${name}, ${city}`;
                schoolDropdown.classList.remove('show');
                headerSchoolBadge.innerHTML = `<i class="fas fa-school"></i> ${name}`;
                loginCard.classList.remove('hidden');
                addDebugLog(`Выбрана школа: ${name}`);
            });
        });
    }
    
    // При клике на поле ввода - показываем ВСЕ школы
    searchWrapper.addEventListener('click', (e) => {
        e.stopPropagation();
        showAllSchools();
    });
    
    schoolSearch.addEventListener('click', (e) => {
        e.stopPropagation();
        showAllSchools();
    });
    
    // Закрываем список при клике вне
    document.addEventListener('click', (e) => {
        if (!searchWrapper.contains(e.target) && !schoolDropdown.contains(e.target)) {
            schoolDropdown.classList.remove('show');
        }
    });

    // Загрузка данных с конкретного листа
    async function fetchSheetData(gid) {
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
        addDebugLog(`📥 Загрузка GID: ${gid}`);
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        addDebugLog(`📥 Получено ${text.length} байт для GID ${gid}`);
        return text;
    }

    async function loadAllSubjects() {
        if (!selectedSchool) return;
        loadingState.classList.remove('hidden');
        debugLogs = [];
        addDebugLog(`🚀 Начинаем загрузку всех предметов...`);
        
        for (let subj of SUBJECTS) {
            try {
                const csv = await fetchSheetData(subj.gid);
                if (csv && csv.length > 10) {
                    const parsed = parseCSV(csv);
                    allSubjectsCache[subj.gid] = { 
                        students: parsed.students, 
                        headers: parsed.headers,
                        name: subj.name,
                        icon: subj.icon,
                        rawFirstLines: csv.split('\n').slice(0, 3).join('\n')
                    };
                    addDebugLog(`✅ ${subj.name}: ${parsed.students.length} учеников, тем: ${parsed.headers.length}`);
                    if (parsed.students.length > 0) {
                        addDebugLog(`   Пример: ${parsed.students[0].name} (код: ${parsed.students[0].code})`);
                    }
                } else {
                    allSubjectsCache[subj.gid] = { students: [], headers: [], name: subj.name, icon: subj.icon };
                    addDebugLog(`⚠️ ${subj.name}: пустые данные`);
                }
            } catch(e) {
                addDebugLog(`❌ Ошибка ${subj.name}: ${e.message}`);
                allSubjectsCache[subj.gid] = { students: [], headers: [], name: subj.name, icon: subj.icon };
            }
        }
        loadingState.classList.add('hidden');
        addDebugLog(`🏁 Загрузка завершена`);
    }

    function parseCSV(csv) {
        const lines = csv.split(/\r?\n/);
        const headers = [];
        const students = [];
        
        for (let i = 0; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const row = parseCSVRow(lines[i]);
            if (i === 0) {
                for (let j = 2; j < row.length; j++) {
                    headers.push(row[j] || `Тема ${j-1}`);
                }
            } else {
                if (row.length >= 2 && row[0] && row[0].trim() && row[1] && row[1].trim()) {
                    const data = [];
                    for (let j = 2; j < row.length; j++) {
                        data.push(row[j] || '');
                    }
                    students.push({ code: row[0].trim(), name: row[1].trim(), data });
                }
            }
        }
        return { students, headers };
    }

    function parseCSVRow(line) {
        const result = [];
        let inQuotes = false;
        let current = '';
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') inQuotes = !inQuotes;
            else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
            else current += ch;
        }
        result.push(current);
        return result.map(c => c.replace(/^"|"$/g, '').trim());
    }

    async function login() {
        const code = studentCodeInput.value.trim();
        const id = studentIdInput.value.trim();
        if (!selectedSchool) { alert('Выберите школу'); return; }
        if (!code || !id) { alert('Введите код и ID ученика'); return; }
        
        addDebugLog(`🔑 Поиск: код="${code}", ID="${id}"`);
        await loadAllSubjects();
        
        let foundStudent = null;
        let foundSubject = null;
        for (let subj of SUBJECTS) {
            const data = allSubjectsCache[subj.gid];
            if (data && data.students) {
                const student = data.students.find(s => s.code === code && s.name.toLowerCase().includes(id.toLowerCase()));
                if (student) {
                    foundStudent = student;
                    foundSubject = subj.name;
                    break;
                }
            }
        }
        
        if (!foundStudent) {
            addDebugLog(`❌ Ученик не найден`);
            alert(`Ученик с кодом "${code}" не найден. Нажмите "Диагностика" для проверки.`);
            return;
        }
        
        addDebugLog(`✅ Найден: ${foundStudent.name} в ${foundSubject}`);
        currentUser = { code: foundStudent.code, name: foundStudent.name };
        schoolCard.classList.add('hidden');
        loginCard.classList.add('hidden');
        mainContent.classList.remove('hidden');
        
        studentNameSpan.innerText = foundStudent.name;
        studentCodeSpan.innerText = foundStudent.code;
        studentSchoolSpan.innerText = selectedSchool.name;
        
        renderGradesTable();
    }

    function renderGradesTable() {
        let html = `<div class="scroll-hint"><i class="fas fa-arrows-left-right"></i> Листайте вправо →</div>
                    <div class="table-scroll-wrapper">
                        <table class="subjects-table">
                            <thead>
                                <tr><th>Предмет</th><th>Оценки по темам</th><th>Средний балл</th></tr>
                            </thead>
                            <tbody>`;
        
        for (let subj of SUBJECTS) {
            const data = allSubjectsCache[subj.gid];
            let studentData = data?.students?.find(s => s.code === currentUser.code);
            let gradesHtml = '';
            let avg = '—';
            let numericGrades = [];
            
            if (studentData && studentData.data && data.headers) {
                for (let i = 0; i < studentData.data.length; i++) {
                    const val = studentData.data[i];
                    const num = parseFloat(val);
                    if (!isNaN(num) && num >= 1 && num <= 10) {
                        numericGrades.push(num);
                        let cls = num <= 3 ? 'grade-1-3' : (num <= 6 ? 'grade-4-6' : (num <= 8 ? 'grade-7-8' : 'grade-9-10'));
                        gradesHtml += `<span class="grade-badge ${cls}" title="${data.headers[i]}">${num}</span>`;
                    } else if (val && val.trim() !== '') {
                        gradesHtml += `<span class="grade-badge grade-empty">${val}</span>`;
                    } else {
                        gradesHtml += `<span class="grade-badge grade-empty">—</span>`;
                    }
                }
                if (numericGrades.length > 0) {
                    avg = (numericGrades.reduce((a,b) => a + b, 0) / numericGrades.length).toFixed(1);
                }
            } else {
                gradesHtml = '<span style="color:#8a99b0;">нет оценок</span>';
            }
            
            html += `<tr>
                        <td style="font-weight: 700; white-space: nowrap; background: white;">
                            ${data.icon} ${data.name}
                         </td>
                         <td><div style="display: flex; flex-wrap: wrap; gap: 6px;">${gradesHtml}</div></td>
                        <td style="text-align: center; font-weight: 700;">${avg}</td>
                      </tr>`;
        }
        
        html += `</tbody>
                 </table>
            </div>`;
        
        dynamicContent.innerHTML = html;
    }

    function renderSchedule() {
        dynamicContent.innerHTML = `<iframe src="${SCHEDULE_URL}" style="width:100%; min-height:600px; border:none; border-radius:24px;"></iframe>`;
    }

    function renderAnalytics() {
        let allGrades = [];
        let low = 0, medium = 0, high = 0, excellent = 0;
        let subjectStats = [];
        
        for (let subj of SUBJECTS) {
            const data = allSubjectsCache[subj.gid];
            const studentData = data?.students?.find(s => s.code === currentUser.code);
            let subjGrades = [];
            
            if (studentData && studentData.data) {
                for (let val of studentData.data) {
                    const num = parseFloat(val);
                    if (!isNaN(num) && num >= 1 && num <= 10) {
                        allGrades.push(num);
                        subjGrades.push(num);
                        if (num <= 3) low++;
                        else if (num <= 6) medium++;
                        else if (num <= 8) high++;
                        else excellent++;
                    }
                }
            }
            let subjAvg = subjGrades.length ? (subjGrades.reduce((a,b)=>a+b,0)/subjGrades.length).toFixed(1) : '—';
            subjectStats.push({ name: data.name, icon: data.icon, avg: subjAvg, count: subjGrades.length });
        }
        
        const avgOverall = allGrades.length ? (allGrades.reduce((a,b)=>a+b,0)/allGrades.length).toFixed(1) : '—';
        let recText = avgOverall !== '—' ? (parseFloat(avgOverall) >= 8.5 ? 'Отличная успеваемость!' : (parseFloat(avgOverall) >= 7 ? 'Хороший результат!' : (parseFloat(avgOverall) >= 5 ? 'Можно улучшить!' : 'Требуется внимание!'))) : '';
        
        let html = `<div class="stats-grid">
            <div class="stat-box"><div class="stat-number">${avgOverall}</div><div>Общий средний балл</div></div>
            <div class="stat-box"><div class="stat-number">${allGrades.length}</div><div>Всего оценок</div></div>
            <div class="stat-box"><div class="stat-number">${excellent}</div><div>Отлично (9-10)</div></div>
            <div class="stat-box"><div class="stat-number">${high}</div><div>Хорошо (7-8)</div></div>
            <div class="stat-box"><div class="stat-number">${medium}</div><div>Средне (4-6)</div></div>
            <div class="stat-box"><div class="stat-number">${low}</div><div>Низко (1-3)</div></div>
        </div>
        <div class="recommendation-card"><span style="font-size:1.8rem;">🤖</span><div><strong>ИИ-рекомендация</strong><br>${recText || 'Нет данных для анализа'}</div></div>`;
        dynamicContent.innerHTML = html;
    }

    function renderResults() {
        let subjectAverages = [];
        let allGrades = [];
        
        for (let subj of SUBJECTS) {
            const data = allSubjectsCache[subj.gid];
            const studentData = data?.students?.find(s => s.code === currentUser.code);
            let grades = [];
            if (studentData && studentData.data) {
                for (let val of studentData.data) {
                    let num = parseFloat(val);
                    if (!isNaN(num) && num >= 1 && num <= 10) { grades.push(num); allGrades.push(num); }
                }
            }
            let avg = grades.length ? (grades.reduce((a,b)=>a+b,0)/grades.length).toFixed(1) : '—';
            subjectAverages.push({ name: data.name, icon: data.icon, avg, count: grades.length });
        }
        
        let overall = allGrades.length ? (allGrades.reduce((a,b)=>a+b,0)/allGrades.length).toFixed(1) : '—';
        let html = `<div class="stats-grid">
            <div class="stat-box"><div class="stat-number">${overall}</div><div>Итоговый балл</div></div>
            <div class="stat-box"><div class="stat-number">${allGrades.length}</div><div>Всего оценок</div></div>
        </div>
        <div class="stats-grid">
            ${subjectAverages.map(s => `<div class="stat-box"><div class="stat-number">${s.avg}</div><div>${s.icon} ${s.name}</div><div>${s.count} оценок</div></div>`).join('')}
        </div>`;
        dynamicContent.innerHTML = html;
    }

    function renderDebug() {
        let html = `<div class="scroll-hint"><i class="fas fa-bug"></i> Диагностика</div>
                    <div class="debug-panel">
                        <strong>👤 Пользователь:</strong> ${currentUser ? `${currentUser.name} (${currentUser.code})` : 'Не авторизован'}<br>
                        <strong>🏫 Школа:</strong> ${selectedSchool?.name || '—'}<br>
                        <strong>📊 Всего предметов:</strong> ${SUBJECTS.length}<br><br>
                        <strong>📋 Логи загрузки:</strong><br>${debugLogs.join('<br>')}<br><br>
                        <strong>📁 Данные по предметам:</strong><br>`;
        
        for (let subj of SUBJECTS) {
            const data = allSubjectsCache[subj.gid];
            if (data) {
                html += `🔹 ${data.icon} ${data.name}: ${data.students.length} учеников, ${data.headers.length} тем<br>`;
                if (data.rawFirstLines) {
                    html += `<details><summary>📄 Первые строки CSV</summary><code style="font-size:10px;">${data.rawFirstLines.substring(0, 300)}</code></details>`;
                }
            }
        }
        html += `</div>`;
        dynamicContent.innerHTML = html;
    }

    async function sendTelegramRequest() {
        const parentName = document.getElementById('parentName').value.trim();
        const childName = document.getElementById('childName').value.trim();
        const childCode = document.getElementById('childCode').value.trim();
        const tgUsername = document.getElementById('tgUsername').value.trim();
        const statusDiv = document.getElementById('requestStatus');
        
        if (!parentName || !childName || !childCode || !tgUsername) {
            statusDiv.innerHTML = '<div class="error-msg">❌ Заполните все поля!</div>';
            setTimeout(() => statusDiv.innerHTML = '', 3000);
            return;
        }
        
        const message = `📋 ЗАЯВКА НА УВЕДОМЛЕНИЯ\n\n👨‍👩 Родитель: ${parentName}\n🧑‍🎓 Ребёнок: ${childName}\n🔢 Код: ${childCode}\n📱 Telegram: ${tgUsername}\n🏫 Школа: ${selectedSchool?.name || '—'}`;
        
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text: message })
            });
            if (response.ok) {
                statusDiv.innerHTML = '<div class="success-msg">✅ Заявка отправлена!</div>';
                document.getElementById('parentName').value = '';
                document.getElementById('childName').value = '';
                document.getElementById('childCode').value = '';
                document.getElementById('tgUsername').value = '';
            } else {
                statusDiv.innerHTML = '<div class="error-msg">❌ Ошибка отправки</div>';
            }
        } catch(e) {
            statusDiv.innerHTML = '<div class="error-msg">❌ Ошибка сети</div>';
        }
        setTimeout(() => statusDiv.innerHTML = '', 4000);
    }

    function setActiveTab(active) {
        [showGradesBtn, showScheduleBtn, showAnalyticsBtn, showResultsBtn, showDebugBtn].forEach(btn => btn.classList.remove('active'));
        if (active === 'grades') { showGradesBtn.classList.add('active'); renderGradesTable(); }
        else if (active === 'schedule') { showScheduleBtn.classList.add('active'); renderSchedule(); }
        else if (active === 'analytics') { showAnalyticsBtn.classList.add('active'); renderAnalytics(); }
        else if (active === 'results') { showResultsBtn.classList.add('active'); renderResults(); }
        else if (active === 'debug') { showDebugBtn.classList.add('active'); renderDebug(); }
    }
    
    showGradesBtn.onclick = () => setActiveTab('grades');
    showScheduleBtn.onclick = () => setActiveTab('schedule');
    showAnalyticsBtn.onclick = () => setActiveTab('analytics');
    showResultsBtn.onclick = () => setActiveTab('results');
    showDebugBtn.onclick = () => setActiveTab('debug');
    sendRequestBtn.onclick = sendTelegramRequest;
    loginBtn.onclick = login;
    studentCodeInput.onkeypress = e => { if(e.key === 'Enter') login(); };
    studentIdInput.onkeypress = e => { if(e.key === 'Enter') login(); };
</script>
