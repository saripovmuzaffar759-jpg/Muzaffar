<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZAFFAR 3.0 — Мега загрузчик 100 МБ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 1000px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .logo-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 42px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(255, 0, 102, 0.5);
            transform: rotate(10deg);
            transition: all 0.3s ease;
            animation: float 3s infinite;
        }

        @keyframes float {
            0%, 100% { transform: rotate(10deg) translateY(0); }
            50% { transform: rotate(10deg) translateY(-10px); }
        }

        .logo-text {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .badge {
            background: linear-gradient(135deg, #f9ca24, #f0932b);
            color: #000;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 18px;
            position: absolute;
            top: -15px;
            right: 0;
            transform: rotate(5deg);
            box-shadow: 0 10px 20px rgba(249, 202, 36, 0.4);
            animation: pulse 2s infinite;
            border: 2px solid white;
        }

        @keyframes pulse {
            0%, 100% { transform: rotate(5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        .description {
            color: #fff;
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: center;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            font-weight: 600;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 18px 35px;
            border: none;
            border-radius: 60px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 0, 102, 0.5);
            border-color: white;
        }

        .mode-btn:hover:not(.active) {
            background: rgba(255,255,255,0.4);
            border-color: #ff0066;
            transform: translateY(-3px);
        }

        .input-section {
            display: none;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-section.active {
            display: block;
        }

        .input-group {
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            padding: 35px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .url-input, .name-input, .text-input {
            width: 100%;
            padding: 20px 30px;
            border: 3px solid #e2e8f0;
            border-radius: 60px;
            font-size: 18px;
            transition: all 0.3s ease;
            background: white;
            margin-bottom: 20px;
            font-family: inherit;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .text-input {
            min-height: 250px;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }

        .url-input:focus, .name-input:focus, .text-input:focus {
            outline: none;
            border-color: #ff0066;
            box-shadow: 0 0 0 8px rgba(255, 0, 102, 0.1);
            transform: scale(1.02);
        }

        .file-upload-area {
            border: 5px dashed #ff0066;
            border-radius: 50px;
            padding: 60px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            cursor: pointer;
            transition: all 0.4s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .file-upload-area::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        .file-upload-area:hover {
            border-color: #ff4d4d;
            background: white;
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 0, 102, 0.2);
        }

        .file-upload-icon {
            font-size: 80px;
            color: #ff0066;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .file-upload-text {
            color: #1a1a2e;
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .file-upload-hint {
            color: #4a5568;
            font-size: 18px;
            font-weight: 600;
        }

        .file-info {
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
            border-radius: 60px;
            padding: 20px 30px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            color: white;
            animation: slideIn 0.3s ease;
            font-weight: 600;
        }

        .file-name {
            font-weight: 700;
            word-break: break-all;
            font-size: 18px;
        }

        .file-size {
            background: rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 16px;
        }

        .remove-file {
            background: rgba(0,0,0,0.3);
            color: white;
            border: 2px solid white;
            border-radius: 40px;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .remove-file:hover {
            background: rgba(0,0,0,0.5);
            transform: scale(1.1);
        }

        .btn {
            padding: 20px 40px;
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(255, 0, 102, 0.3);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 0, 102, 0.5);
        }

        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #4834d4, #686de0);
        }

        .result {
            display: none;
            background: linear-gradient(135deg, #fff5f5, #fff);
            padding: 35px;
            border-radius: 40px;
            margin: 25px 0;
            border: 4px solid #ff0066;
            box-shadow: 0 15px 40px rgba(255, 0, 102, 0.3);
            animation: slideUp 0.3s ease;
        }

        .result-title {
            color: #ff0066;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .result-content {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .short-url {
            color: #1a1a2e;
            font-size: 20px;
            font-weight: 600;
            text-decoration: none;
            word-break: break-all;
            flex: 1;
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: rgba(255,0,102,0.05);
            border-radius: 30px;
            border: 2px solid rgba(255,0,102,0.2);
        }

        .short-url:hover {
            color: #ff0066;
            text-decoration: underline;
            border-color: #ff0066;
        }

        .copy-btn {
            padding: 18px 35px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.3);
        }

        .copy-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 184, 148, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin: 35px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            backdrop-filter: blur(10px);
        }

        .stat-card:hover {
            transform: translateY(-10px);
            border-color: #ff0066;
            box-shadow: 0 20px 40px rgba(255, 0, 102, 0.3);
        }

        .stat-icon {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .stat-number {
            font-size: 42px;
            font-weight: 900;
            color: #ff0066;
            display: block;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 16px;
            color: #4a5568;
            font-weight: 700;
        }

        .items-section {
            margin-top: 40px;
        }

        .section-title {
            color: white;
            font-size: 28px;
            margin-bottom: 25px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
        }

        .items-grid::-webkit-scrollbar {
            width: 10px;
        }

        .items-grid::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .items-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
            border-radius: 10px;
        }

        .item-card {
            background: rgba(255,255,255,0.98);
            border-radius: 30px;
            padding: 25px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
        }

        .item-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #ff0066;
            box-shadow: 0 30px 50px rgba(255, 0, 102, 0.3);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-name {
            font-size: 22px;
            font-weight: 800;
            color: #ff0066;
            background: rgba(255,0,102,0.1);
            padding: 8px 20px;
            border-radius: 40px;
        }

        .item-type {
            background: #1a1a2e;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
        }

        .item-preview {
            margin: 15px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            max-height: 120px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
            border: 2px solid #e2e8f0;
        }

        .item-url {
            color: #1a1a2e;
            font-size: 16px;
            font-weight: 500;
            word-break: break-all;
            text-decoration: none;
            display: block;
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,0,102,0.05);
            border-radius: 15px;
            border: 1px solid rgba(255,0,102,0.2);
        }

        .item-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-action {
            background: linear-gradient(135deg, #4834d4, #686de0);
            color: white;
        }

        .download-action {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }

        .delete-action {
            background: linear-gradient(135deg, #eb4d4b, #ff7979);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            padding: 20px 35px;
            border-radius: 60px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            display: none;
            z-index: 1000;
            font-weight: 700;
            font-size: 18px;
            animation: slideInRight 0.3s ease;
            border: 2px solid white;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .error {
            color: white;
            font-size: 18px;
            margin: 20px 0;
            display: none;
            font-weight: 700;
            padding: 20px 30px;
            background: linear-gradient(135deg, #eb4d4b, #ff7979);
            border-radius: 60px;
            border-left: 5px solid white;
            box-shadow: 0 10px 30px rgba(235, 77, 75, 0.4);
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
            margin: 25px 0;
            padding: 35px;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .spinner {
            border: 6px solid rgba(255,255,255,0.3);
            border-top: 6px solid #ff0066;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-container {
            margin: 20px 0;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e2e8f0;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #ff0066, #ff4d4d);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            font-weight: 700;
            color: white;
            font-size: 16px;
        }

        .speed-indicator {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 14px;
            margin-top: 5px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            border: 4px dashed rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            font-size: 20px;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s infinite;
        }

        .chunk-info {
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .logo-text {
                font-size: 36px;
            }
            
            .badge {
                right: -10px;
                font-size: 14px;
                padding: 5px 12px;
            }
            
            .items-grid {
                grid-template-columns: 1fr;
            }
            
            .mode-btn {
                width: 100%;
                justify-content: center;
            }
            
            .file-upload-area {
                padding: 30px;
            }
            
            .file-upload-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">M</div>
                <h1 class="logo-text">MUZAFFAR</h1>
                <div class="badge">🔥 100 МБ</div>
            </div>
            <p class="description">
                🚀 Загружай файлы до 100 МБ | ⚡ Молниеносная скорость | 💾 Без потери качества
            </p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="url">
                <span>🔗</span> Ссылки
            </button>
            <button class="mode-btn" data-mode="file">
                <span>📁</span> Файлы 100МБ
            </button>
            <button class="mode-btn" data-mode="text">
                <span>📝</span> Текст
            </button>
            <button class="mode-btn" data-mode="qrcode">
                <span>📱</span> QR-код
            </button>
        </div>

        <!-- Режим ссылок -->
        <div class="input-section active" id="url-mode">
            <div class="input-group">
                <input type="text" class="name-input" id="urlNameInput" 
                       placeholder="🔖 Название ссылки">
                <input type="url" class="url-input" id="urlInput" 
                       placeholder="🌐 Вставь ссылку">
                <button class="btn" id="createUrlBtn" disabled>✨ Создать короткую ссылку</button>
            </div>
        </div>

        <!-- Режим файлов (100 МБ) -->
        <div class="input-section" id="file-mode">
            <div class="input-group">
                <input type="text" class="name-input" id="fileNameInput" 
                       placeholder="📌 Название файла">
                <div class="file-upload-area" id="fileDropArea">
                    <div class="file-upload-icon">📁</div>
                    <div class="file-upload-text">Бросай файл сюда</div>
                    <div class="file-upload-hint">или нажми для выбора (до 100 МБ)</div>
                    <input type="file" id="fileInput" style="display: none;">
                </div>
                <div class="file-info" id="fileInfo" style="display: none;">
                    <span class="file-name" id="selectedFileName"></span>
                    <span class="file-size" id="selectedFileSize"></span>
                    <button class="remove-file" id="removeFileBtn">✕ Удалить</button>
                </div>
                
                <!-- Прогресс загрузки -->
                <div class="progress-container" id="fileProgress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="fileProgressFill"></div>
                    </div>
                    <div class="progress-text">
                        <span id="fileProgressPercent">0%</span> • 
                        <span id="fileProgressSpeed">0 МБ/с</span> • 
                        <span id="fileProgressRemaining">--</span>
                    </div>
                    <div class="chunk-info" id="chunkInfo"></div>
                </div>
                
                <button class="btn" id="uploadFileBtn" disabled>📤 Загрузить файл</button>
            </div>
        </div>

        <!-- Режим текста -->
        <div class="input-section" id="text-mode">
            <div class="input-group">
                <input type="text" class="name-input" id="textNameInput" 
                       placeholder="📝 Название текста">
                <textarea class="text-input" id="textInput" 
                          placeholder="Пиши текст или код..."></textarea>
                <button class="btn" id="createTextBtn" disabled>💾 Сохранить текст</button>
            </div>
        </div>

        <!-- Режим QR-кода -->
        <div class="input-section" id="qrcode-mode">
            <div class="input-group">
                <input type="text" class="name-input" id="qrNameInput" 
                       placeholder="📱 Название QR">
                <input type="text" class="url-input" id="qrInput" 
                       placeholder="🔗 Текст или ссылка">
                <div class="qrcode" id="qrPreview" style="display: none; text-align: center;">
                    <img id="qrImage" src="" alt="QR Code" style="max-width: 200px; border-radius: 20px;">
                </div>
                <button class="btn" id="createQrBtn" disabled>✨ Создать QR-код</button>
            </div>
        </div>

        <button class="btn btn-secondary" id="clearBtn">🗑️ Очистить всё</button>

        <div class="error" id="errorMessage"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div id="loadingText">Обработка...</div>
        </div>

        <div class="result" id="resultContainer">
            <div class="result-title">
                <span>🎉 Готово! Твоя ссылка:</span>
            </div>
            <div class="result-content">
                <a href="#" class="short-url" id="resultLink" target="_blank"></a>
                <button class="copy-btn" id="copyResultBtn">📋 Копировать</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <span class="stat-number" id="totalItems">0</span>
                <span class="stat-label">Всего</span>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔗</div>
                <span class="stat-number" id="urlCount">0</span>
                <span class="stat-label">Ссылок</span>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📁</div>
                <span class="stat-number" id="fileCount">0</span>
                <span class="stat-label">Файлов</span>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <span class="stat-number" id="textCount">0</span>
                <span class="stat-label">Текстов</span>
            </div>
        </div>

        <div class="items-section">
            <div class="section-title">
                <span>📦 Твои файлы (до 100 МБ)</span>
            </div>
            <div class="items-grid" id="itemsList"></div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        class MuzaffarMega {
            constructor() {
                this.storageKey = 'muzaffar_mega_data';
                this.items = [];
                this.currentMode = 'url';
                this.currentFile = null;
                this.maxFileSize = 100 * 1024 * 1024; // 100 МБ
                this.chunkSize = 1024 * 1024; // Читаем по 1 МБ для прогресса
                
                this.initElements();
                this.initEventListeners();
                this.loadData();
                this.updateStats();
            }

            initElements() {
                // Mode elements
                this.modeBtns = document.querySelectorAll('.mode-btn');
                this.modeSections = {
                    url: document.getElementById('url-mode'),
                    file: document.getElementById('file-mode'),
                    text: document.getElementById('text-mode'),
                    qrcode: document.getElementById('qrcode-mode')
                };

                // URL mode
                this.urlNameInput = document.getElementById('urlNameInput');
                this.urlInput = document.getElementById('urlInput');
                this.createUrlBtn = document.getElementById('createUrlBtn');

                // File mode (100 MB)
                this.fileNameInput = document.getElementById('fileNameInput');
                this.fileDropArea = document.getElementById('fileDropArea');
                this.fileInput = document.getElementById('fileInput');
                this.fileInfo = document.getElementById('fileInfo');
                this.selectedFileName = document.getElementById('selectedFileName');
                this.selectedFileSize = document.getElementById('selectedFileSize');
                this.removeFileBtn = document.getElementById('removeFileBtn');
                this.uploadFileBtn = document.getElementById('uploadFileBtn');
                
                // Progress elements
                this.fileProgress = document.getElementById('fileProgress');
                this.fileProgressFill = document.getElementById('fileProgressFill');
                this.fileProgressPercent = document.getElementById('fileProgressPercent');
                this.fileProgressSpeed = document.getElementById('fileProgressSpeed');
                this.fileProgressRemaining = document.getElementById('fileProgressRemaining');
                this.chunkInfo = document.getElementById('chunkInfo');

                // Text mode
                this.textNameInput = document.getElementById('textNameInput');
                this.textInput = document.getElementById('textInput');
                this.createTextBtn = document.getElementById('createTextBtn');

                // QR mode
                this.qrNameInput = document.getElementById('qrNameInput');
                this.qrInput = document.getElementById('qrInput');
                this.createQrBtn = document.getElementById('createQrBtn');
                this.qrPreview = document.getElementById('qrPreview');
                this.qrImage = document.getElementById('qrImage');

                // Common elements
                this.clearBtn = document.getElementById('clearBtn');
                this.loading = document.getElementById('loading');
                this.loadingText = document.getElementById('loadingText');
                this.errorMessage = document.getElementById('errorMessage');
                this.resultContainer = document.getElementById('resultContainer');
                this.resultLink = document.getElementById('resultLink');
                this.copyResultBtn = document.getElementById('copyResultBtn');
                this.notification = document.getElementById('notification');
                
                // Stats elements
                this.totalItems = document.getElementById('totalItems');
                this.urlCount = document.getElementById('urlCount');
                this.fileCount = document.getElementById('fileCount');
                this.textCount = document.getElementById('textCount');
                
                // Items list
                this.itemsList = document.getElementById('itemsList');
            }

            initEventListeners() {
                // Mode switching
                this.modeBtns.forEach(btn => {
                    btn.addEventListener('click', () => this.switchMode(btn.dataset.mode));
                });

                // URL mode
                this.urlNameInput.addEventListener('input', () => this.validateUrlMode());
                this.urlInput.addEventListener('input', () => this.validateUrlMode());
                this.createUrlBtn.addEventListener('click', () => this.createUrlItem());

                // File mode
                this.fileNameInput.addEventListener('input', () => this.validateFileMode());
                this.fileDropArea.addEventListener('click', () => this.fileInput.click());
                this.fileInput.addEventListener('change', (e) => this.handleFileSelect(e.target.files[0]));
                this.removeFileBtn.addEventListener('click', () => this.removeSelectedFile());
                this.uploadFileBtn.addEventListener('click', () => this.uploadFile());

                // Drag and drop
                this.fileDropArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    this.fileDropArea.classList.add('dragover');
                });

                this.fileDropArea.addEventListener('dragleave', () => {
                    this.fileDropArea.classList.remove('dragover');
                });

                this.fileDropArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.fileDropArea.classList.remove('dragover');
                    const file = e.dataTransfer.files[0];
                    if (file) this.handleFileSelect(file);
                });

                // Text mode
                this.textNameInput.addEventListener('input', () => this.validateTextMode());
                this.textInput.addEventListener('input', () => this.validateTextMode());
                this.createTextBtn.addEventListener('click', () => this.createTextItem());

                // QR mode
                this.qrNameInput.addEventListener('input', () => this.validateQrMode());
                this.qrInput.addEventListener('input', () => this.validateQrMode());
                this.createQrBtn.addEventListener('click', () => this.createQrItem());

                // Common buttons
                this.clearBtn.addEventListener('click', () => this.clearAll());
                this.copyResultBtn.addEventListener('click', () => this.copyResult());
            }

            switchMode(mode) {
                this.currentMode = mode;
                this.modeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
                
                Object.keys(this.modeSections).forEach(key => {
                    this.modeSections[key].classList.toggle('active', key === mode);
                });

                this.hideResult();
                this.hideError();
            }

            validateUrlMode() {
                const name = this.urlNameInput.value.trim();
                const url = this.urlInput.value.trim();
                this.createUrlBtn.disabled = !(name && this.isValidUrl(url));
            }

            validateFileMode() {
                const name = this.fileNameInput.value.trim();
                this.uploadFileBtn.disabled = !(name && this.currentFile);
            }

            validateTextMode() {
                const name = this.textNameInput.value.trim();
                const text = this.textInput.value.trim();
                this.createTextBtn.disabled = !(name && text);
            }

            validateQrMode() {
                const name = this.qrNameInput.value.trim();
                const text = this.qrInput.value.trim();
                this.createQrBtn.disabled = !(name && text);
            }

            isValidUrl(url) {
                try {
                    new URL(url);
                    return true;
                } catch {
                    return false;
                }
            }

            handleFileSelect(file) {
                if (!file) return;

                if (file.size > this.maxFileSize) {
                    this.showError(`Файл слишком большой! Максимум: 100 МБ (твой файл: ${this.formatFileSize(file.size)})`);
                    return;
                }

                this.currentFile = file;
                this.selectedFileName.textContent = file.name;
                this.selectedFileSize.textContent = this.formatFileSize(file.size);
                this.fileInfo.style.display = 'flex';
                this.fileDropArea.style.display = 'none';
                this.validateFileMode();
                
                this.showNotification(`✅ Файл выбран: ${file.name} (${this.formatFileSize(file.size)})`);
            }

            removeSelectedFile() {
                this.currentFile = null;
                this.fileInput.value = '';
                this.fileInfo.style.display = 'none';
                this.fileDropArea.style.display = 'block';
                this.validateFileMode();
                this.hideProgress();
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Б';
                const k = 1024;
                const sizes = ['Б', 'КБ', 'МБ', 'ГБ'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            async uploadFile() {
                const name = this.fileNameInput.value.trim();
                if (!this.currentFile) return;

                this.showProgress();
                this.uploadFileBtn.disabled = true;

                const startTime = Date.now();
                let loadedBytes = 0;

                try {
                    // Читаем файл чанками для отображения прогресса
                    const reader = new FileReader();
                    
                    reader.onload = (e) => {
                        const base64Data = e.target.result;
                        
                        // Считаем скорость
                        const endTime = Date.now();
                        const duration = (endTime - startTime) / 1000; // в секундах
                        const speed = this.currentFile.size / duration / (1024 * 1024); // МБ/с
                        
                        this.fileProgressSpeed.textContent = speed.toFixed(2) + ' МБ/с';
                        this.fileProgressFill.style.width = '100%';
                        this.fileProgressPercent.textContent = '100%';
                        this.fileProgressRemaining.textContent = '0 сек';
                        
                        if (this.currentFile.size > 5 * 1024 * 1024) { // больше 5 МБ
                            this.chunkInfo.textContent = `⚡ Файл ${this.formatFileSize(this.currentFile.size)} загружен за ${duration.toFixed(1)} сек`;
                        }
                        
                        setTimeout(() => {
                            const item = {
                                id: Date.now().toString(),
                                type: 'file',
                                name: name,
                                fileName: this.currentFile.name,
                                fileSize: this.currentFile.size,
                                fileType: this.currentFile.type,
                                data: base64Data,
                                url: URL.createObjectURL(this.currentFile),
                                createdAt: new Date().toISOString()
                            };

                            this.items.unshift(item);
                            this.saveItem(item);
                            
                            this.hideProgress();
                            this.removeSelectedFile();
                            this.fileNameInput.value = '';
                            this.uploadFileBtn.disabled = false;
                            
                        }, 500);
                    };

                    reader.onprogress = (e) => {
                        if (e.lengthComputable) {
                            loadedBytes = e.loaded;
                            const percent = (e.loaded / e.total) * 100;
                            
                            // Скорость
                            const currentTime = Date.now();
                            const elapsed = (currentTime - startTime) / 1000;
                            const currentSpeed = e.loaded / elapsed / (1024 * 1024);
                            
                            // Оставшееся время
                            const remainingBytes = e.total - e.loaded;
                            const remainingTime = remainingBytes / (currentSpeed * 1024 * 1024);
                            
                            this.fileProgressFill.style.width = percent + '%';
                            this.fileProgressPercent.textContent = percent.toFixed(1) + '%';
                            this.fileProgressSpeed.textContent = currentSpeed.toFixed(2) + ' МБ/с';
                            
                            if (remainingTime > 0 && remainingTime < 3600) {
                                this.fileProgressRemaining.textContent = Math.ceil(remainingTime) + ' сек';
                            }
                            
                            if (e.total > 1024 * 1024) { // больше 1 МБ
                                const loadedMB = (e.loaded / (1024 * 1024)).toFixed(1);
                                const totalMB = (e.total / (1024 * 1024)).toFixed(1);
                                this.chunkInfo.textContent = `📦 Загружено: ${loadedMB} МБ из ${totalMB} МБ`;
                            }
                        }
                    };

                    reader.onerror = () => {
                        this.showError('Ошибка при чтении файла');
                        this.hideProgress();
                        this.uploadFileBtn.disabled = false;
                    };

                    reader.readAsDataURL(this.currentFile);

                } catch (error) {
                    this.showError('Не удалось загрузить файл');
                    this.hideProgress();
                    this.uploadFileBtn.disabled = false;
                }
            }

            async createUrlItem() {
                const name = this.urlNameInput.value.trim();
                const url = this.urlInput.value.trim();

                this.showLoading('Создаю короткую ссылку...');

                try {
                    const response = await fetch('https://clck.ru/--', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({ 'url': url })
                    });

                    if (!response.ok) throw new Error('Ошибка сервера');

                    const shortUrl = await response.text();

                    const item = {
                        id: Date.now().toString(),
                        type: 'url',
                        name: name,
                        originalUrl: url,
                        url: shortUrl,
                        createdAt: new Date().toISOString()
                    };

                    this.items.unshift(item);
                    this.saveItem(item);
                    
                    this.urlNameInput.value = '';
                    this.urlInput.value = '';

                } catch (error) {
                    this.showError('Не удалось создать ссылку');
                } finally {
                    this.hideLoading();
                }
            }

            async createTextItem() {
                const name = this.textNameInput.value.trim();
                const text = this.textInput.value.trim();

                this.showLoading('Сохраняю текст...');

                try {
                    const encodedText = btoa(unescape(encodeURIComponent(text)));
                    
                    const item = {
                        id: Date.now().toString(),
                        type: 'text',
                        name: name,
                        content: text,
                        encodedContent: encodedText,
                        url: `data:text/plain;charset=utf-8,${encodeURIComponent(text)}`,
                        createdAt: new Date().toISOString()
                    };

                    this.items.unshift(item);
                    this.saveItem(item);
                    
                    this.textNameInput.value = '';
                    this.textInput.value = '';

                } catch (error) {
                    this.showError('Не удалось сохранить текст');
                } finally {
                    this.hideLoading();
                }
            }

            async createQrItem() {
                const name = this.qrNameInput.value.trim();
                const text = this.qrInput.value.trim();

                this.showLoading('Создаю QR-код...');

                try {
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(text)}`;
                    
                    const item = {
                        id: Date.now().toString(),
                        type: 'qrcode',
                        name: name,
                        content: text,
                        qrUrl: qrUrl,
                        url: qrUrl,
                        createdAt: new Date().toISOString()
                    };

                    this.items.unshift(item);
                    this.saveItem(item);
                    
                    this.qrNameInput.value = '';
                    this.qrInput.value = '';

                } catch (error) {
                    this.showError('Не удалось создать QR-код');
                } finally {
                    this.hideLoading();
                }
            }

            saveItem(item) {
                this.saveToStorage();
                this.updateStats();
                this.renderItems();
                this.showResult(item.url, `${item.name} — готово!`);
                this.showNotification(`✅ ${item.name} сохранено`);
                this.validateUrlMode();
            }

            showResult(url, text) {
                this.resultLink.href = url;
                this.resultLink.textContent = text;
                this.resultContainer.style.display = 'block';
            }

            hideResult() {
                this.resultContainer.style.display = 'none';
            }

            showProgress() {
                this.fileProgress.style.display = 'block';
                this.fileProgressFill.style.width = '0%';
                this.fileProgressPercent.textContent = '0%';
                this.fileProgressSpeed.textContent = '0 МБ/с';
                this.fileProgressRemaining.textContent = '--';
                this.chunkInfo.textContent = '';
            }

            hideProgress() {
                this.fileProgress.style.display = 'none';
            }

            showLoading(text) {
                this.loadingText.textContent = text;
                this.loading.style.display = 'block';
                this.disableButtons(true);
            }

            hideLoading() {
                this.loading.style.display = 'none';
                this.disableButtons(false);
            }

            disableButtons(disable) {
                const btns = [
                    this.createUrlBtn,
                    this.uploadFileBtn,
                    this.createTextBtn,
                    this.createQrBtn,
                    this.clearBtn
                ];
                btns.forEach(btn => btn.disabled = disable);
            }

            showError(message) {
                this.errorMessage.textContent = message;
                this.errorMessage.style.display = 'block';
                setTimeout(() => {
                    this.errorMessage.style.display = 'none';
                }, 5000);
            }

            hideError() {
                this.errorMessage.style.display = 'none';
            }

            showNotification(message) {
                this.notification.textContent = message;
                this.notification.style.display = 'block';
                setTimeout(() => {
                    this.notification.style.display = 'none';
                }, 3000);
            }

            async copyResult() {
                try {
                    await navigator.clipboard.writeText(this.resultLink.href);
                    this.showNotification('📋 Скопировано в буфер!');
                } catch {
                    const textArea = document.createElement('textarea');
                    textArea.value = this.resultLink.href;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    this.showNotification('📋 Скопировано!');
                }
            }

            copyItem(url, name) {
                navigator.clipboard.writeText(url).then(() => {
                    this.showNotification(`📋 "${name}" скопировано`);
                });
            }

            downloadItem(item) {
                if (item.type === 'file' && item.data) {
                    const link = document.createElement('a');
                    link.href = item.data;
                    link.download = item.fileName;
                    link.click();
                    this.showNotification(`⬇️ Скачивание ${item.fileName} началось`);
                } else if (item.type === 'text') {
                    const blob = new Blob([item.content], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `${item.name}.txt`;
                    link.click();
                    URL.revokeObjectURL(url);
                    this.showNotification(`⬇️ Текст сохранен как ${item.name}.txt`);
                }
            }

            deleteItem(id, name) {
                if (confirm(`Удалить "${name}"?`)) {
                    this.items = this.items.filter(item => item.id !== id);
                    this.saveToStorage();
                    this.updateStats();
                    this.renderItems();
                    this.showNotification(`🗑️ "${name}" удалено`);
                }
            }

            clearAll() {
                if (confirm('Очистить всё? Все файлы до 100 МБ будут удалены!')) {
                    this.items = [];
                    this.saveToStorage();
                    this.updateStats();
                    this.renderItems();
                    this.showNotification('🧹 Всё очищено');
                }
            }

            updateStats() {
                const stats = {
                    total: this.items.length,
                    url: this.items.filter(i => i.type === 'url').length,
                    file: this.items.filter(i => i.type === 'file').length,
                    text: this.items.filter(i => i.type === 'text' || i.type === 'qrcode').length
                };
                
                this.totalItems.textContent = stats.total;
                this.urlCount.textContent = stats.url;
                this.fileCount.textContent = stats.file;
                this.textCount.textContent = stats.text;
            }

            renderItems() {
                if (this.items.length === 0) {
                    this.itemsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📦</div>
                            <div style="font-size: 28px; font-weight: 800; margin-bottom: 15px;">Пока пусто</div>
                            <div style="font-size: 18px;">Загрузи файл до 100 МБ или создай ссылку</div>
                        </div>
                    `;
                    return;
                }

                this.itemsList.innerHTML = this.items.map(item => {
                    const typeIcons = {
                        url: '🔗',
                        file: '📁',
                        text: '📝',
                        qrcode: '📱'
                    };
                    
                    const typeNames = {
                        url: 'Ссылка',
                        file: 'Файл',
                        text: 'Текст',
                        qrcode: 'QR'
                    };

                    let preview = '';
                    if (item.type === 'text') {
                        preview = item.content.substring(0, 100) + (item.content.length > 100 ? '...' : '');
                    } else if (item.type === 'file') {
                        preview = `${item.fileName} (${this.formatFileSize(item.fileSize)})`;
                        if (item.fileSize > 10 * 1024 * 1024) {
                            preview += ' 🔥 100 МБ';
                        }
                    } else if (item.type === 'url') {
                        preview = item.originalUrl;
                    } else if (item.type === 'qrcode') {
                        preview = item.content;
                    }

                    const fileSizeClass = item.fileSize > 50 * 1024 * 1024 ? 'style="color: #ff0066; font-weight: 800;"' : '';

                    return `
                        <div class="item-card">
                            <div class="item-header">
                                <span class="item-name">${this.escapeHtml(item.name)}</span>
                                <span class="item-type">${typeIcons[item.type]} ${typeNames[item.type]}</span>
                            </div>
                            <div class="item-preview" ${item.fileSize > 50 * 1024 * 1024 ? 'style="border-color: #ff0066;"' : ''}>
                                ${this.escapeHtml(preview)}
                            </div>
                            <a href="${item.url}" class="item-url" target="_blank">
                                ${this.truncate(item.url, 45)}
                            </a>
                            <div class="item-actions">
                                <button class="action-btn copy-action" onclick="muzaffar.copyItem('${item.url}', '${this.escapeHtml(item.name)}')">
                                    📋 Копировать
                                </button>
                                ${item.type === 'file' || item.type === 'text' ? `
                                    <button class="action-btn download-action" onclick="muzaffar.downloadItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                                        ⬇️ Скачать
                                    </button>
                                ` : ''}
                                <button class="action-btn delete-action" onclick="muzaffar.deleteItem('${item.id}', '${this.escapeHtml(item.name)}')">
                                    🗑️ Удалить
                                </button>
                            </div>
                            ${item.type === 'file' && item.fileSize > 50 * 1024 * 1024 ? 
                                '<div style="margin-top: 10px; font-size: 12px; color: #ff0066; font-weight: 700;">🔥 Большой файл 100 МБ</div>' : ''}
                        </div>
                    `;
                }).join('');
            }

            truncate(text, max) {
                if (!text) return '';
                return text.length > max ? text.substring(0, max) + '...' : text;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            loadData() {
                const saved = localStorage.getItem(this.storageKey);
                if (saved) {
                    try {
                        this.items = JSON.parse(saved);
                    } catch {
                        this.items = [];
                    }
                }
            }

            saveToStorage() {
                localStorage.setItem(this.storageKey, JSON.stringify(this.items));
            }
        }

        let muzaffar;
        document.addEventListener('DOMContentLoaded', () => {
            muzaffar = new MuzaffarMega();
            window.muzaffar = muzaffar;
        });
    </script>
