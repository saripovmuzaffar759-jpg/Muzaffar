
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ помощник • мультичат</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Ubuntu+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff6b35;
            --primary-dark: #e55a2b;
            --secondary: #ff8e53;
            --accent: #ffa726;
            --dark: #1a1a2e;
            --darker: #16213e;
            --light: #f0f0f0;
            --gray: #4a4a6a;
            --sidebar-bg: #0f0f1f;
            --glow: 0 0 20px rgba(255, 107, 53, 0.5);
            --radius: 12px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--darker);
            border-radius: var(--radius);
            box-shadow: var(--glow);
            border: 2px solid var(--primary);
            overflow: hidden;
            display: flex;
            height: 90vh;
        }

        /* Боковая панель с историей */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 2px solid var(--gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: var(--accent);
            font-size: 1.2rem;
        }

        .new-chat-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .new-chat-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--gray);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .chat-item:hover {
            background: rgba(255,107,53,0.2);
            border-color: var(--primary);
        }
        .chat-item.active {
            background: rgba(255,107,53,0.3);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255,107,53,0.5);
        }

        .chat-title {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .delete-chat {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }
        .delete-chat:hover {
            color: var(--error);
            background: rgba(244,67,54,0.2);
        }

        /* Основная область чата */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--darker);
        }

        .chat-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .model-selector {
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .model-selector select {
            background: var(--darker);
            border: 2px solid var(--gray);
            color: var(--light);
            padding: 5px 15px;
            border-radius: 30px;
            font-family: 'Ubuntu Mono', monospace;
            font-weight: bold;
            cursor: pointer;
        }
        .model-selector select:focus {
            border-color: var(--primary);
            outline: none;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bot-message {
            align-self: flex-start;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 0 15px rgba(255,107,53,0.5);
            flex-shrink: 0;
        }

        .bot-message .avatar {
            background: var(--accent);
        }

        .message-content {
            background: rgba(255,255,255,0.1);
            padding: 12px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,107,53,0.3);
            font-family: 'Ubuntu Mono', monospace;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .user-message .message-content {
            background: var(--primary);
            color: white;
            border-color: var(--accent);
        }

        .typing .message-content {
            background: transparent;
            border-color: var(--gray);
            color: var(--gray);
            font-style: italic;
        }

        .input-area {
            padding: 20px;
            border-top: 2px solid var(--primary);
            display: flex;
            gap: 10px;
            background: var(--darker);
        }

        .input-area input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--gray);
            border-radius: 40px;
            color: var(--light);
            font-family: 'Ubuntu Mono', monospace;
            font-size: 1rem;
        }
        .input-area input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 15px rgba(255,107,53,0.3);
        }

        .input-area button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .input-area button:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .footer-note {
            text-align: center;
            padding: 10px;
            color: var(--gray);
            font-size: 0.8rem;
            border-top: 1px solid #2a2a3a;
        }

        /* Стили для скролла */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--darker);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-history" style="margin-right: 8px;"></i>История</h3>
                <button class="new-chat-btn" id="newChatBtn" title="Новый чат">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- Основная область -->
        <div class="main-chat">
            <div class="chat-header">
                <h2 id="chatTitle">Новый чат</h2>
                <div class="model-selector">
                    <label for="modelSelect">Модель:</label>
                    <select id="modelSelect">
                        <option value="openai">GPT (умный)</option>
                        <option value="llama">Llama (быстрый)</option>
                        <option value="mistral">Mistral (средний)</option>
                        <option value="gemini">Gemini (эксп.)</option>
                    </select>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Напиши сообщение..." autofocus>
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="footer-note">
                ⚡ работает через бесплатное API Pollinations · данные хранятся локально
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== КОНСТАНТЫ ==========
            const STORAGE_KEY = 'ai_chats';
            const API_URL = 'https://text.pollinations.ai/';

            // ========== СОСТОЯНИЕ ==========
            let chats = [];                 // массив чатов
            let currentChatId = null;        // id активного чата
            let isLoading = false;           // флаг загрузки ответа

            // ========== DOM ЭЛЕМЕНТЫ ==========
            const chatListEl = document.getElementById('chatList');
            const chatMessagesEl = document.getElementById('chatMessages');
            const chatTitleEl = document.getElementById('chatTitle');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const newChatBtn = document.getElementById('newChatBtn');
            const modelSelect = document.getElementById('modelSelect');

            // ========== ЗАГРУЗКА ИЗ STORAGE ==========
            function loadChats() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    chats = JSON.parse(stored);
                } else {
                    // создаём чат по умолчанию
                    const defaultChat = {
                        id: generateId(),
                        title: 'Новый чат',
                        messages: [
                            { role: 'assistant', content: 'Привет! Я твой личный ИИ. Спроси меня о чём угодно.' }
                        ],
                        createdAt: Date.now()
                    };
                    chats = [defaultChat];
                    currentChatId = defaultChat.id;
                    saveChats();
                }
                // если currentChatId не установлен, берём первый
                if (!currentChatId && chats.length > 0) {
                    currentChatId = chats[0].id;
                }
                renderChatList();
                renderCurrentChat();
            }

            function saveChats() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
            }

            function generateId() {
                return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            }

            // ========== РЕНДЕР СПИСКА ЧАТОВ ==========
            function renderChatList() {
                if (chats.length === 0) {
                    chatListEl.innerHTML = '<div style="text-align:center; color:var(--gray); padding:20px;">Нет чатов</div>';
                    return;
                }
                let html = '';
                chats.sort((a,b) => b.createdAt - a.createdAt).forEach(chat => {
                    const isActive = chat.id === currentChatId;
                    html += `
                        <div class="chat-item ${isActive ? 'active' : ''}" data-chat-id="${chat.id}">
                            <span class="chat-title">${escapeHtml(chat.title)}</span>
                            <button class="delete-chat" onclick="event.stopPropagation(); window.deleteChat('${chat.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `;
                });
                chatListEl.innerHTML = html;

                // добавляем обработчики клика на элементы списка
                document.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const chatId = item.dataset.chatId;
                        switchChat(chatId);
                    });
                });
            }

            // Экранирование для безопасности
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if(m === '&') return '&amp;';
                    if(m === '<') return '&lt;';
                    if(m === '>') return '&gt;';
                    if(m === '"') return '&quot;';
                    return m;
                });
            }

            // ========== ПЕРЕКЛЮЧЕНИЕ ЧАТА ==========
            function switchChat(chatId) {
                const chat = chats.find(c => c.id === chatId);
                if (!chat) return;
                currentChatId = chatId;
                renderChatList(); // обновляем активный класс
                renderCurrentChat();
            }

            // ========== РЕНДЕР ТЕКУЩЕГО ЧАТА ==========
            function renderCurrentChat() {
                const chat = chats.find(c => c.id === currentChatId);
                if (!chat) {
                    chatMessagesEl.innerHTML = '';
                    chatTitleEl.textContent = 'Нет чата';
                    return;
                }
                chatTitleEl.textContent = chat.title;
                let html = '';
                chat.messages.forEach(msg => {
                    const sender = msg.role === 'user' ? 'user' : 'bot';
                    const avatarIcon = sender === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
                    html += `
                        <div class="message ${sender}-message">
                            <div class="avatar">${avatarIcon}</div>
                            <div class="message-content">${escapeHtml(msg.content)}</div>
                        </div>
                    `;
                });
                chatMessagesEl.innerHTML = html;
                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
            }

            // ========== НОВЫЙ ЧАТ ==========
            function createNewChat() {
                const newChat = {
                    id: generateId(),
                    title: 'Новый чат',
                    messages: [
                        { role: 'assistant', content: 'Привет! Я твой личный ИИ. Спроси меня о чём угодно.' }
                    ],
                    createdAt: Date.now()
                };
                chats.push(newChat);
                saveChats();
                currentChatId = newChat.id;
                renderChatList();
                renderCurrentChat();
            }

            // ========== УДАЛЕНИЕ ЧАТА ==========
            window.deleteChat = function(chatId) {
                if (chats.length === 1) {
                    alert('Нельзя удалить последний чат. Создайте новый.');
                    return;
                }
                chats = chats.filter(c => c.id !== chatId);
                if (currentChatId === chatId) {
                    currentChatId = chats[0].id;
                }
                saveChats();
                renderChatList();
                renderCurrentChat();
            };

            // ========== ОТПРАВКА СООБЩЕНИЯ ==========
            async function sendMessage() {
                const text = userInput.value.trim();
                if (!text || isLoading) return;

                const chat = chats.find(c => c.id === currentChatId);
                if (!chat) return;

                // добавляем сообщение пользователя
                chat.messages.push({ role: 'user', content: text });
                userInput.value = '';
                renderCurrentChat();

                // если это первое сообщение пользователя, обновляем заголовок чата
                if (chat.messages.filter(m => m.role === 'user').length === 1) {
                    chat.title = text.slice(0, 30) + (text.length > 30 ? '…' : '');
                }

                // показываем индикатор печатания
                showTypingIndicator();
                isLoading = true;
                sendBtn.disabled = true;

                try {
                    // готовим историю для отправки (исключаем индикатор)
                    const history = chat.messages.map(m => ({
                        role: m.role,
                        content: m.content
                    }));

                    const model = modelSelect.value;
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: history,
                            model: model
                        })
                    });

                    if (!response.ok) throw new Error('Ошибка сети');
                    const answer = await response.text();

                    // удаляем индикатор
                    removeTypingIndicator();

                    // добавляем ответ ассистента
                    chat.messages.push({ role: 'assistant', content: answer });
                    saveChats();
                    renderCurrentChat();

                } catch (error) {
                    console.error(error);
                    removeTypingIndicator();
                    chat.messages.push({ role: 'assistant', content: 'Извините, что-то пошло не так. Попробуйте ещё раз.' });
                    saveChats();
                    renderCurrentChat();
                } finally {
                    isLoading = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }
            }

            function showTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.classList.add('message', 'bot-message', 'typing');
                typingDiv.id = 'typingIndicator';
                typingDiv.innerHTML = `
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-content">...</div>
                `;
                chatMessagesEl.appendChild(typingDiv);
                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
            }

            function removeTypingIndicator() {
                const typing = document.getElementById('typingIndicator');
                if (typing) typing.remove();
            }

            // ========== ИНИЦИАЛИЗАЦИЯ ==========
            loadChats();

            // Обработчики
            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            newChatBtn.addEventListener('click', createNewChat);
        })();
    </script>
</body>
</html>
