<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeShare - Публикатор кода с репозиторием</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .editor-container {
            margin-bottom: 20px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .language-selector {
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }

        .preview-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 20px;
            font-family: 'Courier New', 'Monaco', monospace;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            resize: vertical;
            background: #fafafa;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-outline {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .short-link-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .link-display {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .link-display input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            min-width: 200px;
        }

        .preview-frame {
            margin-top: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        .preview-header {
            background: #f7f7f7;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
        }

        .history-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            width: 250px;
            font-size: 14px;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }

        .repo-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
            cursor: pointer;
        }

        .repo-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .repo-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .repo-preview {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            margin: 10px 0;
            padding: 10px;
            background: #f7f7f7;
            border-radius: 6px;
            max-height: 80px;
            overflow: hidden;
        }

        .repo-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        .repo-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .small-btn {
            padding: 5px 12px;
            font-size: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .small-btn:hover {
            background: #667eea;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .repo-item {
            animation: slideIn 0.3s ease-out;
        }

        .repo-grid::-webkit-scrollbar {
            width: 8px;
        }

        .repo-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .repo-grid::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .main-card, .history-section {
                padding: 20px;
            }
            
            .repo-grid {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                justify-content: center;
            }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <h1>📝 CodeShare</h1>
            <p class="subtitle">Публикатор кода с репозиторием и встроенным превью</p>
            
            <div class="editor-container">
                <div class="editor-header">
                    <select id="language" class="language-selector">
                        <option value="html">HTML</option>
                        <option value="javascript">JavaScript</option>
                        <option value="css">CSS</option>
                        <option value="text">Plain Text</option>
                    </select>
                    <label class="preview-toggle">
                        <input type="checkbox" id="showPreview"> Показать превью
                    </label>
                </div>
                <textarea id="code" placeholder="Введите ваш HTML/CSS/JS код здесь..."></textarea>
            </div>
            
            <div id="previewContainer" class="preview-frame" style="display: none;">
                <div class="preview-header">
                    <strong>👁️ Живое превью</strong>
                    <button class="small-btn" onclick="refreshPreview()">Обновить</button>
                </div>
                <iframe id="preview" srcdoc="<html><body style='padding:20px'>Предпросмотр появится здесь</body></html>"></iframe>
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="createAndShowLink()">
                    🔗 Создать ссылку
                </button>
                <button class="btn btn-secondary" onclick="saveToRepository()">
                    💾 Сохранить в репозиторий
                </button>
                <button class="btn btn-outline" onclick="clearEditor()">
                    🗑️ Очистить
                </button>
            </div>
            
            <div id="shortLinkSection" class="short-link-section" style="display: none;">
                <strong>✨ Ваша ссылка:</strong>
                <div class="link-display">
                    <input type="text" id="shortLinkInput" readonly>
                    <button class="btn btn-outline" onclick="copyShortLink()">📋 Копировать</button>
                    <button class="btn btn-primary" onclick="openInNewWindow()">🌐 Открыть в новом окне</button>
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: #666;">
                    💡 Совет: ссылка содержит весь код внутри себя и работает без интернета
                </div>
            </div>
        </div>
        
        <div class="history-section">
            <div class="history-header">
                <h2>📚 Репозиторий кода</h2>
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 Поиск по репозиторию..." onkeyup="searchRepository()">
            </div>
            <div id="repoGrid" class="repo-grid">
                <div class="empty-state">
                    🎉 Нет сохраненных сниппетов<br>
                    Создайте первый сниппет, нажав "Сохранить в репозиторий"!
                </div>
            </div>
        </div>
    </div>

    <script>
        let repository = [];
        
        function loadData() {
            const saved = localStorage.getItem('codeRepository');
            if (saved) {
                repository = JSON.parse(saved);
            }
            renderRepository();
        }
        
        function saveData() {
            localStorage.setItem('codeRepository', JSON.stringify(repository));
        }
        
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        
        function createAndShowLink() {
            const code = document.getElementById('code').value;
            if (!code.trim()) {
                showNotification('Пожалуйста, введите код!', 'error');
                return;
            }
            
            // Создаем полноценный HTML документ
            let fullHtml = code;
            const language = document.getElementById('language').value;
            
            // Если это не полный HTML, оборачиваем в базовую структуру
            if (language === 'html' && !code.match(/<html|<body/i)) {
                fullHtml = `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeShare Snippet</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
            background: white;
        }
    </style>
</head>
<body>
    ${code}
</body>
</html>`;
            } else if (language === 'javascript') {
                fullHtml = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <h3>JavaScript код выполнен:</h3>
    <div id="output"></div>
    <script>
        try {
            ${code}
        } catch(e) {
            document.getElementById('output').innerHTML = '<pre style="color:red">Ошибка: ' + e.message + '</pre>';
        }
    <\/script>
</body>
</html>`;
            } else if (language === 'css') {
                fullHtml = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>${code}</style>
</head>
<body>
    <h1>Пример CSS</h1>
    <p>Это демонстрация вашего CSS кода</p>
    <button>Кнопка</button>
</body>
</html>`;
            }
            
            // Кодируем для data URL
            const dataUrl = "data:text/html;charset=utf-8," + encodeURIComponent(fullHtml);
            
            // Показываем ссылку
            document.getElementById('shortLinkInput').value = dataUrl;
            document.getElementById('shortLinkSection').style.display = 'block';
            
            // Прокручиваем к ссылке
            document.getElementById('shortLinkSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            showNotification('✅ Ссылка создана!', 'success');
            
            // Автоматически открываем превью если включено
            if (document.getElementById('showPreview').checked) {
                document.getElementById('preview').srcdoc = fullHtml;
            }
        }
        
        function openInNewWindow() {
            const url = document.getElementById('shortLinkInput').value;
            if (url) {
                // Создаем новое окно с кодом
                const newWindow = window.open();
                if (newWindow) {
                    newWindow.document.write('<html><head><title>CodeShare Preview</title></head><body>');
                    newWindow.document.write('<div style="padding:20px; font-family:monospace">Загрузка кода...</div>');
                    newWindow.document.write('</body></html>');
                    
                    // Декодируем URL и вставляем код
                    const decodedUrl = decodeURIComponent(url.split(',')[1]);
                    newWindow.location.href = url;
                } else {
                    showNotification('❌ Браузер заблокировал всплывающее окно. Разрешите всплывающие окна для этого сайта.', 'error');
                }
            }
        }
        
        function copyShortLink() {
            const input = document.getElementById('shortLinkInput');
            input.select();
            input.setSelectionRange(0, 99999);
            
            try {
                navigator.clipboard.writeText(input.value).then(() => {
                    showNotification('📋 Ссылка скопирована в буфер обмена!', 'success');
                }).catch(() => {
                    // Fallback
                    document.execCommand('copy');
                    showNotification('📋 Ссылка скопирована!', 'success');
                });
            } catch (err) {
                document.execCommand('copy');
                showNotification('📋 Ссылка скопирована!', 'success');
            }
        }
        
        function refreshPreview() {
            const code = document.getElementById('code').value;
            const language = document.getElementById('language').value;
            
            let fullHtml = code;
            if (language === 'html' && !code.match(/<html|<body/i)) {
                fullHtml = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    ${code}
</body>
</html>`;
            } else if (language === 'javascript') {
                fullHtml = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <div id="output"></div>
    <script>
        try {
            ${code}
        } catch(e) {
            document.getElementById('output').innerHTML = '<pre style="color:red">Error: ' + e.message + '</pre>';
        }
    <\/script>
</body>
</html>`;
            } else if (language === 'css') {
                fullHtml = `<!DOCTYPE html>
<html>
<head><style>${code}</style></head>
<body>
    <h1>CSS Demo</h1>
    <p>Your CSS styles applied</p>
</body>
</html>`;
            }
            
            document.getElementById('preview').srcdoc = fullHtml;
        }
        
        function saveToRepository() {
            const code = document.getElementById('code').value;
            if (!code.trim()) {
                showNotification('Пожалуйста, введите код для сохранения!', 'error');
                return;
            }
            
            const language = document.getElementById('language').value;
            let title = prompt('Введите название для сниппета:', 'Мой сниппет ' + (repository.length + 1));
            
            if (title === null) return;
            if (!title.trim()) {
                title = 'Сниппет от ' + new Date().toLocaleString();
            }
            
            const snippet = {
                id: generateId(),
                code: code,
                language: language,
                title: title,
                createdAt: new Date().toISOString(),
                preview: code.substring(0, 100) + (code.length > 100 ? '...' : '')
            };
            
            repository.unshift(snippet);
            saveData();
            renderRepository();
            showNotification('✅ Сниппет сохранен в репозиторий!', 'success');
        }
        
        function renderRepository() {
            const grid = document.getElementById('repoGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = repository;
            if (searchTerm) {
                filtered = repository.filter(item => 
                    item.title.toLowerCase().includes(searchTerm) || 
                    item.code.toLowerCase().includes(searchTerm) ||
                    item.language.toLowerCase().includes(searchTerm)
                );
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">📭 Нет сниппетов для отображения</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(item => `
                <div class="repo-item" onclick="loadToEditor('${item.id}')">
                    <div class="repo-title">📄 ${escapeHtml(item.title)}</div>
                    <div class="repo-meta">
                        <span>🏷️ ${item.language}</span>
                        <span>📅 ${new Date(item.createdAt).toLocaleString()}</span>
                    </div>
                    <div class="repo-preview">${escapeHtml(item.preview)}</div>
                    <div class="repo-actions" onclick="event.stopPropagation()">
                        <button class="small-btn" onclick="copyToClipboard('${item.id}')">📋 Копировать</button>
                        <button class="small-btn" onclick="loadAndCreateLink('${item.id}')">🔗 Ссылка</button>
                        <button class="small-btn" onclick="deleteSnippet('${item.id}')">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        
        function loadToEditor(id) {
            const snippet = repository.find(item => item.id === id);
            if (snippet) {
                document.getElementById('code').value = snippet.code;
                document.getElementById('language').value = snippet.language;
                showNotification(`📂 Загружен: ${snippet.title}`, 'info');
                document.querySelector('.main-card').scrollIntoView({ behavior: 'smooth' });
                
                // Обновляем превью если включено
                if (document.getElementById('showPreview').checked) {
                    refreshPreview();
                }
            }
        }
        
        function loadAndCreateLink(id) {
            loadToEditor(id);
            setTimeout(() => {
                createAndShowLink();
            }, 100);
        }
        
        function copyToClipboard(id) {
            const snippet = repository.find(item => item.id === id);
            if (snippet) {
                navigator.clipboard.writeText(snippet.code).then(() => {
                    showNotification('📋 Код скопирован!', 'success');
                });
            }
        }
        
        function deleteSnippet(id) {
            if (confirm('Вы уверены, что хотите удалить этот сниппет?')) {
                repository = repository.filter(item => item.id !== id);
                saveData();
                renderRepository();
                showNotification('🗑️ Сниппет удален', 'info');
            }
        }
        
        function searchRepository() {
            renderRepository();
        }
        
        function clearEditor() {
            if (confirm('Очистить редактор?')) {
                document.getElementById('code').value = '';
                document.getElementById('shortLinkSection').style.display = 'none';
                if (document.getElementById('showPreview').checked) {
                    document.getElementById('preview').srcdoc = '<html><body style="padding:20px">Код очищен</body></html>';
                }
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.background = type === 'error' ? '#fed7d7' : type === 'success' ? '#c6f6d5' : '#bee3f8';
            notification.style.color = type === 'error' ? '#c53030' : type === 'success' ? '#22543d' : '#2c5282';
            notification.innerHTML = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.3s';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // Показываем/скрываем превью
        document.getElementById('showPreview').addEventListener('change', function(e) {
            const container = document.getElementById('previewContainer');
            if (e.target.checked) {
                container.style.display = 'block';
                refreshPreview();
            } else {
                container.style.display = 'none';
            }
        });
        
        // Загрузка примеров
        function loadExamples() {
            if (repository.length === 0) {
                const examples = [
                    {
                        title: '🎨 Красивый градиент',
                        code: '<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px; border-radius: 20px; text-align: center; color: white;">\n  <h1>Привет, мир!</h1>\n  <p>Это пример HTML кода</p>\n  <button onclick="alert(\'Привет!\')" style="padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer;">Нажми меня</button>\n</div>',
                        language: 'html'
                    },
                    {
                        title: '📊 JavaScript Пример',
                        code: '// Простой калькулятор\nfunction calculate(operation, a, b) {\n    switch(operation) {\n        case "add": return a + b;\n        case "subtract": return a - b;\n        case "multiply": return a * b;\n        case "divide": return b !== 0 ? a / b : "Ошибка";\n        default: return "Неизвестная операция";\n    }\n}\n\nconsole.log(calculate("add", 10, 5)); // 15\nconsole.log(calculate("multiply", 4, 3)); // 12',
                        language: 'javascript'
                    }
                ];
                
                examples.forEach(ex => {
                    repository.push({
                        id: generateId(),
                        code: ex.code,
                        language: ex.language,
                        title: ex.title,
                        createdAt: new Date().toISOString(),
                        preview: ex.code.substring(0, 100)
                    });
                });
                saveData();
                renderRepository();
            }
        }
        
        // Инициализация
        loadData();
        loadExamples();
        
        // Автосохранение
        let autoSaveTimeout;
        document.getElementById('code').addEventListener('input', () => {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                localStorage.setItem('tempCode', document.getElementById('code').value);
                if (document.getElementById('showPreview').checked) {
                    refreshPreview();
                }
            }, 500);
        });
        
        // Восстановление кода
        const tempCode = localStorage.getItem('tempCode');
        if (tempCode && !document.getElementById('code').value) {
            if (confirm('Найден несохраненный код. Восстановить?')) {
                document.getElementById('code').value = tempCode;
            }
        }
    </script>
